<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IB History SL">
<title>IB History SL — Final Exam Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f14;--bg2:#13171f;--bg3:#1a1f2b;--bg4:#222838;
  --text:#e8e6e1;--text2:#a09d96;--text3:#6b6860;
  --accent:#c9a84c;--accent2:#e8c96a;--accent-dim:#3d3420;
  --green:#4ade80;--green-dim:#0d2818;--red:#f87171;--red-dim:#2d1216;
  --blue:#60a5fa;--blue-dim:#121d2e;--orange:#fb923c;
  --cold-war:#5b8def;--auth-states:#e06c50;--reconquest:#50b87a;
  --radius:10px;--radius-lg:16px;
  --font-display:'Crimson Pro',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,button,textarea{font-family:inherit;font-size:inherit}
input{font-size:16px!important}
button{cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::selection{background:var(--accent);color:var(--bg)}

.app-wrap{max-width:900px;margin:0 auto;padding:0 16px 100px}
@media(min-width:640px){.app-wrap{padding:0 24px 40px}}

.header{text-align:center;padding:28px 0 8px;position:relative}
.header h1{font-family:var(--font-display);font-size:1.9rem;font-weight:700;letter-spacing:-0.02em;color:var(--accent2)}
.header p{color:var(--text2);font-size:.82rem;margin-top:4px;letter-spacing:.03em;text-transform:uppercase}

.tab-bar{display:flex;gap:4px;justify-content:center;padding:12px 0 20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:99px;font-size:.82rem;font-weight:600;color:var(--text2);transition:all .2s;position:relative;letter-spacing:.01em}
.tab-btn:hover{color:var(--text);background:var(--bg3)}
.tab-btn.active{color:var(--bg);background:var(--accent);box-shadow:0 2px 12px #c9a84c33}
.tab-btn .dot{position:absolute;top:4px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);display:none;box-shadow:0 0 6px var(--red)}
.tab-btn .dot.show{display:block;animation:pulse 2s infinite}

.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--accent-dim)}
.card-title{font-family:var(--font-display);font-size:1.15rem;font-weight:600;margin-bottom:6px}
.card-sub{color:var(--text2);font-size:.85rem;line-height:1.5}
.card-tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.btn{padding:10px 20px;border-radius:var(--radius);font-weight:600;font-size:.85rem;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:var(--bg);box-shadow:0 2px 8px #c9a84c22}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{border:1px solid var(--bg4);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent-dim);color:var(--text)}
.btn-correct{background:var(--green);color:#000}
.btn-wrong{background:var(--red);color:#000}
.btn-sm{padding:6px 14px;font-size:.78rem}

.mode-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.mode-btn{padding:7px 16px;border-radius:var(--radius);font-size:.78rem;font-weight:600;color:var(--text3);border:1px solid var(--bg4);transition:all .2s;position:relative}
.mode-btn:hover{color:var(--text2);border-color:var(--text3)}
.mode-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.mode-btn .srs-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 6px var(--orange)}

.cat-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.cat-chip{padding:5px 14px;border-radius:99px;font-size:.75rem;font-weight:600;border:1px solid var(--bg4);color:var(--text3);transition:all .2s}
.cat-chip:hover{color:var(--text2)}
.cat-chip.active{color:#fff;border-color:transparent}

.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem}

.flashcard{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;cursor:pointer;transition:all .3s;position:relative;text-align:center;user-select:none}
.flashcard:hover{border-color:var(--accent-dim);box-shadow:0 4px 20px #0003}
.flashcard .label{position:absolute;top:12px;left:16px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.flashcard .counter{position:absolute;top:12px;right:16px;font-size:.75rem;color:var(--text3);font-family:var(--font-mono)}
.flashcard .question{font-family:var(--font-display);font-size:1.25rem;font-weight:600;line-height:1.4;max-width:600px}
.flashcard .answer{font-size:.95rem;line-height:1.6;color:var(--text2);max-width:600px}
.flashcard .flip-hint{position:absolute;bottom:12px;font-size:.7rem;color:var(--text3);letter-spacing:.03em}
.flashcard .srs-badge{position:absolute;bottom:12px;right:16px;font-size:.65rem;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.03em}

/* Split progress bar */
.split-progress{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:16px;background:var(--bg4);gap:1px}
.split-progress .seg{height:100%;transition:all .3s ease;min-width:0}
.split-progress .seg:first-child{border-radius:3px 0 0 3px}
.split-progress .seg:last-child{border-radius:0 3px 3px 0}

.stat-ring{width:140px;height:140px;position:relative;margin:0 auto 20px}
.stat-ring svg{transform:rotate(-90deg)}
.stat-ring .value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stat-ring .value .num{font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--accent2)}
.stat-ring .value .label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-family:var(--font-display);font-size:1.6rem;font-weight:700}
.stat-card .label{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

.type-input{width:100%;padding:12px 16px;background:var(--bg2);border:2px solid var(--bg4);border-radius:var(--radius);color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
.type-input:focus{border-color:var(--accent)}
.type-input.correct{border-color:var(--green);background:var(--green-dim)}
.type-input.wrong{border-color:var(--red);background:var(--red-dim)}

.expandable{cursor:pointer}
.expandable .chevron{transition:transform .2s;display:inline-block;margin-left:6px;font-size:.7em}
.expandable.open .chevron{transform:rotate(180deg)}

.due-banner{background:linear-gradient(135deg,var(--accent-dim),var(--bg2));border:1px solid var(--accent-dim);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:.85rem;cursor:pointer;transition:border-color .2s}
.due-banner:hover{border-color:var(--accent)}
.due-banner .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.results-overlay{text-align:center;padding:40px 20px}
.results-overlay .score{font-family:var(--font-display);font-size:3rem;font-weight:700;margin:12px 0}
.results-overlay .msg{color:var(--text2);margin-bottom:24px}

.exam-q{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.exam-q .q-text{font-family:var(--font-display);font-size:1.05rem;line-height:1.5;margin-bottom:10px}
.exam-q textarea{width:100%;min-height:120px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px;color:var(--text);font-size:.9rem;resize:vertical;outline:none}
.exam-q textarea:focus{border-color:var(--accent)}

.timer-display{font-family:var(--font-mono);font-size:2.5rem;font-weight:700;text-align:center;color:var(--accent2);margin:16px 0}

/* Criteria section */
.criteria-section{margin-bottom:20px}
.criteria-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.criteria-card h3{font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--accent2)}
.criteria-card h4{font-family:var(--font-display);font-size:.95rem;font-weight:600;margin:12px 0 6px;color:var(--text)}
.criteria-card p,.criteria-card li{font-size:.85rem;color:var(--text2);line-height:1.6}
.criteria-card ul{padding-left:18px;margin:4px 0 8px}
.criteria-card li{margin-bottom:3px}
.band-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);margin-bottom:4px;font-size:.82rem}
.band-row .band-label{font-weight:700;min-width:60px;font-family:var(--font-mono);font-size:.78rem}
.band-row .band-desc{color:var(--text2);flex:1}

/* SRS schedule */
.srs-card-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);margin-bottom:6px;font-size:.82rem}
.srs-card-row .srs-q{flex:1;color:var(--text)}
.srs-card-row .srs-meta{color:var(--text3);font-family:var(--font-mono);font-size:.72rem;flex-shrink:0}
.srs-card-row .srs-status{padding:2px 8px;border-radius:99px;font-size:.68rem;font-weight:600;flex-shrink:0}

@media(max-width:639px){
  .header{padding:16px 0 4px}
  .header h1{font-size:1.4rem}
  .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bg4);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:100;justify-content:space-around;flex-wrap:nowrap;gap:2px}
  .tab-btn{padding:6px 10px;font-size:.7rem}
  .app-wrap{padding-top:calc(env(safe-area-inset-top) + 12px);padding-bottom:90px}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.slide-up{animation:slideUp .4s ease}

/* Story timeline */
.story-wrap{max-width:720px;margin:0 auto}
.story-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--accent2);margin-bottom:4px}
.story-topic-tag{display:inline-block;padding:3px 12px;border-radius:99px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:20px}
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--bg4)}
.tl-event{position:relative;margin-bottom:24px;animation:fadeIn .4s ease both}
.tl-event:nth-child(1){animation-delay:.05s}.tl-event:nth-child(2){animation-delay:.1s}.tl-event:nth-child(3){animation-delay:.15s}
.tl-event:nth-child(4){animation-delay:.2s}.tl-event:nth-child(5){animation-delay:.25s}.tl-event:nth-child(6){animation-delay:.3s}
.tl-event:nth-child(7){animation-delay:.35s}.tl-event:nth-child(8){animation-delay:.4s}
.tl-dot{position:absolute;left:-26px;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);background:var(--bg)}
.tl-year{font-family:var(--font-mono);font-size:.78rem;font-weight:600;color:var(--accent);margin-bottom:4px;letter-spacing:.02em}
.tl-text{font-size:.9rem;color:var(--text2);line-height:1.75;font-family:var(--font-display);font-weight:400}
.tl-text strong{color:var(--text);font-weight:600}
.story-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useContext,createContext,useMemo,useCallback}=React;

// ─── SOUND EFFECTS ───
const SFX={
  _ctx:null,
  _getCtx(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx},
  _play(freq,dur,type='sine',vol=.12){try{const c=this._getCtx(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.stop(c.currentTime+dur)}catch(e){}},
  flip(){this._play(800,.08);setTimeout(()=>this._play(1200,.06),40)},
  correct(){this._play(523,.1);setTimeout(()=>this._play(659,.1),80);setTimeout(()=>this._play(784,.15),160)},
  wrong(){this._play(300,.15,'square',.08);setTimeout(()=>this._play(220,.2,'square',.06),100)},
  complete(){this._play(523,.12);setTimeout(()=>this._play(659,.12),100);setTimeout(()=>this._play(784,.12),200);setTimeout(()=>this._play(1047,.25),300)},
  tap(){this._play(600,.04,'sine',.06)}
};

// ─── CLOUD SYNC (Google Apps Script) ───
const CloudSync={
  _urlKey:'ib_history_cloud_url',
  _statusKey:'ib_history_cloud_status',
  getUrl(){try{return localStorage.getItem(this._urlKey)||''}catch(e){return''}},
  setUrl(url){try{localStorage.setItem(this._urlKey,url)}catch(e){}},
  getStatus(){try{return JSON.parse(localStorage.getItem(this._statusKey)||'{}')}catch(e){return{}}},
  _setStatus(s){try{localStorage.setItem(this._statusKey,JSON.stringify(s))}catch(e){}},

  async push(data){
    const url=this.getUrl();if(!url)return{ok:false,error:'No sync URL set'};
    try{
      const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',data:data}),redirect:'follow'});
      // Apps Script redirects — if we get a response at all, try to parse
      let result;
      try{result=await resp.json()}catch(e){result={success:resp.ok}}
      if(result.success||resp.ok){this._setStatus({lastPush:Date.now(),ok:true});return{ok:true}}
      return{ok:false,error:'Server returned error'}
    }catch(e){this._setStatus({lastPush:Date.now(),ok:false,error:e.message});return{ok:false,error:e.message}}
  },

  async pull(){
    const url=this.getUrl();if(!url)return{ok:false,error:'No sync URL set'};
    try{
      const resp=await fetch(url+'?action=load',{redirect:'follow'});
      const text=await resp.text();
      if(!text||text==='{}')return{ok:true,data:null,empty:true};
      const data=JSON.parse(text);
      if(data.attempts||data.srs){this._setStatus({lastPull:Date.now(),ok:true});return{ok:true,data}}
      return{ok:true,data:null,empty:true}
    }catch(e){return{ok:false,error:e.message}}
  },

  isConfigured(){return!!this.getUrl()},
};

// ─── DATA ───
const TOPICS={
  coldWar:{label:"Cold War",color:"var(--cold-war)",icon:"❄️"},
  authStates:{label:"Authoritarian States",color:"var(--auth-states)",icon:"⚔️"},
  reconquest:{label:"Reconquest & Conquest",color:"var(--reconquest)",icon:"🌎"}
};

const CATEGORIES={
  cw_origins:{label:"Origins 1945-47",topic:"coldWar",color:"#5b8def"},
  cw_containment:{label:"Containment in Asia",topic:"coldWar",color:"#4c7bd4"},
  cw_crises:{label:"Key Crises",topic:"coldWar",color:"#3d6aba"},
  cw_policy:{label:"US Foreign Policy",topic:"coldWar",color:"#6e9cf5"},
  cw_end:{label:"End of Cold War",topic:"coldWar",color:"#83aef7"},
  au_muss_rise:{label:"Mussolini: Rise",topic:"authStates",color:"#e06c50"},
  au_muss_power:{label:"Mussolini: In Power",topic:"authStates",color:"#d45a3e"},
  au_peron_rise:{label:"Perón: Rise",topic:"authStates",color:"#e8845e"},
  au_peron_power:{label:"Perón: In Power",topic:"authStates",color:"#d4724c"},
  au_castro_rise:{label:"Castro: Rise",topic:"authStates",color:"#f09070"},
  au_castro_power:{label:"Castro: In Power",topic:"authStates",color:"#c4563a"},
  rc_islamic:{label:"Islamic Iberia",topic:"reconquest",color:"#50b87a"},
  rc_reconquest:{label:"The Reconquest",topic:"reconquest",color:"#40a568"},
  rc_expulsions:{label:"Expulsions",topic:"reconquest",color:"#60c88a"},
  rc_mexico:{label:"Conquest of Mexico",topic:"reconquest",color:"#389258"},
  rc_peru:{label:"Conquest of Peru",topic:"reconquest",color:"#70d89a"},
  rc_colonial:{label:"Colonial Systems",topic:"reconquest",color:"#48b070"}
};

// Each card gets a unique ID for SRS tracking
const CARDS=[
  // ═══ COLD WAR: ORIGINS ═══
  {id:"cw1",q:"What was the Iron Curtain speech?",a:"Churchill's speech at Fulton, Missouri (March 1946) warning that a Soviet 'iron curtain' had descended from Stettin to Trieste. Initially poorly received in the USA. Stalin responded by comparing Churchill to Hitler, calling it a 'call to arms.' Partly prompted by Kennan's Long Telegram. It crystallized the Western view of Soviet expansion.",cat:"cw_origins"},
  {id:"cw2",q:"What was Kennan's Long Telegram?",a:"An 8,000-word analysis sent February 1946 from the US Embassy in Moscow, warning that the Soviet Union was inherently expansionist and must be contained. It argued the USSR would expand wherever it faced no resistance but back down when confronted. It alarmed Washington and became the intellectual foundation of US containment policy for decades.",cat:"cw_origins"},
  {id:"cw3",q:"What was the state of the USSR after WWII?",a:"Devastated: 27 million Soviet citizens and soldiers killed — more than any other nation. Nearly 70,000 villages destroyed by Nazi Germany. Everything from the borders to Moscow lay in ruins. Stalin's 5-year plan shattered. Yet Stalin was at the peak of his power. He warned that capitalism made future wars 'inevitable' — the West interpreted this as a prediction of World War Three.",cat:"cw_origins"},
  {id:"cw4",q:"What were Soviet methods to impose rule in Eastern Europe?",a:"Leaders of opposing parties simply 'disappeared.' Anyone suspected of straying from communism was arrested, including German POWs. The USSR shifted the whole of Poland westward as 'compensation' for the German invasion route. Soviet troops seized Polish homes; Poles in turn seized German homes. Across Europe, 12 million Germans were expelled. In the Soviet zone of Germany, the Red Army looted homes and hunted down women, even as Stalin ordered soldiers to feed Berliners.",cat:"cw_origins"},
  {id:"cw5",q:"What was the Truman Doctrine (1947)?",a:"Announced March 1947 when Britain informed Washington it could no longer support Greece and Turkey — both at risk of falling to communism. Congress approved $400 million in aid. It established a clear US commitment to contain communism anywhere in the world and marked the definitive ideological split between US democracy and Soviet communism. It set the tone for all future US Cold War engagements.",cat:"cw_origins"},
  {id:"cw6",q:"What was the Marshall Plan?",a:"US economic aid program (announced June 1947, operational 1948). 17 countries participated, requesting $20 billion. Logic: hungry, unemployed people turn to communism — feed them and give them jobs. Stalin saw it as undermining Soviet influence; he ordered Eastern bloc countries to refuse and established COMECON (Council for Mutual Economic Assistance, 1949) as a counter — but it never matched American generosity.",cat:"cw_origins"},
  {id:"cw7",q:"How did the Marshall Plan affect individual countries?",a:"France: $2.7 billion after cracking down on communist strikes (1947). Greece: nearly $700 million — US projects included importing mules to replace farm animals. Italy: massive CIA campaign defeated communists in 1948 elections (letters from Italian-Americans, covert funding). Czechoslovakia: initially agreed but Stalin forced withdrawal; communists seized government 1948. Yugoslavia: Tito accepted $150 million after breaking with Stalin — a major Cold War victory for the US.",cat:"cw_origins"},
  {id:"cw8",q:"What was COMECON?",a:"Council for Mutual Economic Assistance (1949) — Soviet counter to the Marshall Plan. Promoted economic integration among communist countries, but functioned more as a tool of Soviet control than genuine cooperation. Never matched the Marshall Plan's scale or effectiveness.",cat:"cw_origins"},
  {id:"cw9",q:"What was the role of the CIA in the early Cold War?",a:"The CIA sought authority for covert operations worldwide. In Italy's 1948 elections, they funded anti-communist campaigns and supported Christian Democrats. CIA operations became a cornerstone of US strategy — later overthrowing governments in Iran (1953) and Guatemala (1954) considered too left-wing. This marked a shift from open diplomacy to secret intervention.",cat:"cw_origins"},
  {id:"cw10",q:"What happened in Iran during the early Cold War?",a:"During WWII, Soviet and British troops jointly occupied Iran for oil. The Shah was replaced by his son. After the war, Britain withdrew but Stalin refused to leave. International pressure eventually forced Soviet withdrawal, but the crisis convinced Truman that Stalin aimed for world domination. It was an early test of Soviet expansionism outside Europe.",cat:"cw_origins"},
  {id:"cw40",q:"What were Soviet negotiation tactics?",a:"Deliberate strategy: stubborn negotiators exhausted opponents and extracted information. Then Stalin personally intervened with a friendly smile, appearing reasonable by comparison. This 'good cop/bad cop' approach was used repeatedly at post-war conferences.",cat:"cw_origins"},
  {id:"cw42",q:"What were the different views on Germany's future?",a:"Soviet view: keep Germany weak and divided to prevent future threats, extracting reparations to rebuild the USSR. US view: a strong, reunited Germany was essential for Western European recovery — a weak Germany would create a power vacuum. This fundamental disagreement led directly to Germany's partition and the Berlin crises.",cat:"cw_origins"},
  // ═══ COLD WAR: CONTAINMENT IN ASIA ═══
  {id:"cw11",q:"What was NSC-68?",a:"National Security Council Report 68 (April 1950) — tripled the US defence budget and called for massive military buildup to contain the Soviets globally. Led to SEATO (Southeast Asia Treaty Organization). The Korean War, starting two months later, ensured NSC-68 was implemented in full. It shifted US strategy from diplomatic containment to militarized containment.",cat:"cw_containment"},
  {id:"cw12",q:"Why did Truman call Korea 'the Greece of the Far East'?",a:"Just as $400 million saved Greece from communism in Europe (Truman Doctrine), Korea was equally critical in Asia. The comparison signaled the Cold War had gone global — containment was now a worldwide commitment, not just a European policy.",cat:"cw_containment"},
  {id:"cw13",q:"What was the significance of the Korean War (1950-53)?",a:"(1) First armed conflict between capitalist and communist forces. (2) Globalized the Cold War beyond Europe. (3) One of first instances of the UN leading a military coalition. (4) Massively increased US military spending. As Charles 'Chip' Bohlen claimed: 'It was the Korean War and not World War Two that made us a world military-political power.' David Reynolds wrote: the decisions Truman made 'redefined the Cold War.'",cat:"cw_containment"},
  {id:"cw14",q:"How successful was US containment in Korea?",a:"Partially — at enormous cost. Prevented further invasion of South Korea, but approximately 2.5 million Korean civilians died. The peninsula remained divided at roughly the same line. It enabled the rise of China as a major communist power. The war ended in armistice (1953), not a peace treaty — technically the war never ended.",cat:"cw_containment"},
  {id:"cw15",q:"How did Japan fit into US containment strategy?",a:"Occupied by the US after WWII, Japan was rebuilt as a capitalist democracy. Never at risk of communism — its booming economy brought nationalist rather than communist movements. The 1952 American-Japanese Security Treaty formalized US protection, allowing Japan to develop economically without a large military. It became the protector of capitalism in Asia and a crucial counterweight to China.",cat:"cw_containment"},
  {id:"cw16",q:"What was the Formosa Resolution?",a:"After Chinese bombardment of Taiwan (1953), Congress authorized 'whatever military action deemed necessary' to defend Taiwan. Eisenhower explicitly threatened nuclear weapons against China. Textbook brinkmanship — and it worked. Taiwan remained non-communist, proving nuclear deterrence could work where conventional means might not.",cat:"cw_containment"},
  {id:"cw17",q:"Why was the Vietnam War a failure for US containment?",a:"Gulf of Tonkin Resolution (1964) gave unlimited presidential military authority. Operation Rolling Thunder: 30,000 civilian casualties. First uncensored televised war — images of napalm reached American living rooms, sparking massive protests. The US lost and withdrew 1973. The Domino Theory came true: Laos and Cambodia fell to communism in 1975. But the war did relieve Chinese pressure from Malaysia, Thailand, and Singapore.",cat:"cw_containment"},
  {id:"cw44",q:"What was the Domino Theory?",a:"If one country fell to communism, neighbours would follow like dominoes. Used by Eisenhower and Johnson to justify Southeast Asian intervention. Partially came true: Vietnam fell 1975, Laos and Cambodia followed within months. But Thailand, Malaysia, and Singapore resisted — suggesting the theory was too simplistic.",cat:"cw_containment"},
  {id:"cw46",q:"How did the Korean War redefine the Cold War?",a:"Before Korea: Cold War was primarily European political/economic competition. After Korea: global military confrontation. US military budget tripled, SEATO created, America committed to worldwide military bases. As Reynolds wrote: Truman's decisions 'redefined the Cold War' — it went from cold to hot in the East.",cat:"cw_containment"},
  // ═══ COLD WAR: KEY CRISES ═══
  {id:"cw18",q:"What caused the Berlin Crisis (1958-61)?",a:"Three interlocking problems: (1) Brain drain — skilled workers crossed freely to West Berlin for higher pay in identical positions. (2) Economic exploitation — West Berliners bought cheap goods in East Berlin, causing scarcity for East Berliners. (3) Military — FRG (West Germany) in NATO with tactical nuclear weapons, alarming Khrushchev. Over 300,000 people had fled. Khrushchev demanded Western troop withdrawal and Berlin as a 'Free City.' Geneva and Paris Conferences produced no resolution.",cat:"cw_crises"},
  {id:"cw19",q:"Why was the Berlin Wall built (August 1961)?",a:"Khrushchev was compelled by the economic crisis — over 300,000 had fled East Berlin, the brain drain was unsustainable. Overnight, the Wall went up. Despite economic damage, it achieved its goals: the GDR's existence was assured, and Western powers implicitly recognized East Germany by tolerating the Wall. It became the defining symbol of the Cold War — an admission communism couldn't compete if people were free to choose.",cat:"cw_crises"},
  {id:"cw20",q:"What was the impact of the Berlin Crisis?",a:"German-American relations suffered; Berlin relied more on France. The Wall was a massive propaganda loss for communism worldwide. But it resolved the Berlin question — Germany was no longer a constant pressure point in US-Soviet relations. Kennedy appeared weak initially, which emboldened Khrushchev to act in Cuba.",cat:"cw_crises"},
  {id:"cw21",q:"What were the three causes of the Cuban Missile Crisis?",a:"(1) Cuban Revolution (1959): Castro overthrew US-backed Batista and established a communist regime 90 miles from Florida — a direct challenge to US influence. Cuba grew closer to USSR, extending the Soviet sphere to the American continent. (2) Bay of Pigs failure (April 1961): Kennedy's modified CIA invasion was a disaster. It strengthened Castro and made Kennedy look weak to Khrushchev. (3) Soviet missiles: October 1962, US U-2 planes discovered nuclear missile construction sites in Cuba — placed in response to US missiles in Turkey.",cat:"cw_crises"},
  {id:"cw22",q:"How was Kennedy viewed after the Cuban Missile Crisis?",a:"Two historiographical views: ORTHODOX — calm and decisive, chose naval blockade ('quarantine' to avoid legal implications of war) over invasion or airstrikes. REVISIONIST — reckless and self-interested, provoked the crisis through Bay of Pigs and escalated unnecessarily when private diplomacy might have worked sooner.",cat:"cw_crises"},
  {id:"cw23",q:"What were the impacts of the Cuban Missile Crisis?",a:"(1) Direct hotline between Washington and Moscow established. (2) Limited Test Ban Treaty (1963). (3) Nuclear Non-Proliferation Treaty. (4) Khrushchev humiliated domestically; contributed to his removal 1964. (5) China-USSR split deepened — China saw Soviet retreat as proof they were 'no longer a revolutionary state.' (6) US promised not to invade Cuba. (7) Arms race escalated but world became more secure through arms control.",cat:"cw_crises"},
  {id:"cw48",q:"How close did the Cuban Missile Crisis come to nuclear war?",a:"For 13 days (Oct 16-28, 1962) — the closest humanity has come to nuclear war. Soviet ships sailed toward the US blockade. A US U-2 was shot down over Cuba. Kennedy used 'quarantine' to avoid formal war implications. Deal: Soviets remove Cuba missiles, US quietly removes Turkey missiles and promises not to invade Cuba. The Berlin Crisis was more propaganda-focused; Cuba was existential.",cat:"cw_crises"},
  // ═══ COLD WAR: US FOREIGN POLICY ═══
  {id:"cw25",q:"What was Eisenhower's New Look policy?",a:"A shift from Truman's approach: rather than preparing for direct confrontation (NSC-68), Eisenhower aimed to stop communism spreading — expecting the Soviet system would collapse on its own if denied expansion. Key: massive reliance on nuclear weapons to show direct conflict meant Mutually Assured Destruction (MAD). Cheaper than maintaining conventional forces everywhere.",cat:"cw_policy"},
  {id:"cw26",q:"Compare Eisenhower's New Look with Truman's Containment.",a:"SHARED: both assisted anti-communist forces, both used military power defensively. TRUMAN ONLY: prepared for potential direct confrontation (NSC-68). EISENHOWER ADDITIONS: (1) SEATO to encircle USSR in Asia. (2) CIA covert ops (Iran 1953, Guatemala 1954). (3) Massively increased nuclear reliance as cheaper deterrent. (4) Brinkmanship. (5) Expected communism would collapse if contained.",cat:"cw_policy"},
  {id:"cw27",q:"Define Brinkmanship.",a:"Secretary of State Dulles's strategy: advance to the very edge of war without crossing it — using massive nuclear threats to force adversaries to back down. The cartoon from your notes shows Uncle Sam reluctant as Dulles pushes him to the brink — aware that 'going over the edge leads to certain death.' Applied directly when Eisenhower threatened China with nuclear weapons over Taiwan.",cat:"cw_policy"},
  {id:"cw28",q:"Define Roll-back.",a:"Dulles's proposition going beyond containment — actually liberating communist countries in Europe through war. Never carried out due to nuclear war risk, though the US aided counter-Soviet movements. The gap between the rhetoric of roll-back and the reality of containment showed Cold War tough talk had limits.",cat:"cw_policy"},
  {id:"cw29",q:"What was Massive Retaliation?",a:"If any country (specifically China over Taiwan) committed aggression, the US would respond with overwhelming nuclear force. This made conventional buildup less necessary (the 'New Look' was partly about cutting military costs) but raised every confrontation's stakes to potential nuclear annihilation. The logical extension of brinkmanship — making the threat so terrifying no one would test it.",cat:"cw_policy"},
  // ═══ COLD WAR: END ═══
  {id:"cw30",q:"What was Perestroika?",a:"'Restructuring' — Gorbachev's policy (launched 1985) to reform the failing Soviet economy. Under Brezhnev, roughly 25% of GDP went to military spending, draining the civilian economy. Perestroika aimed to introduce limited market mechanisms, decentralize planning, and reduce the military burden. Part of Gorbachev's 'new thinking' prioritizing Soviet citizens' well-being over global communist expansion.",cat:"cw_end"},
  {id:"cw31",q:"What was Glasnost?",a:"'Openness' (1986) — the principle that every area of the regime should be open to public scrutiny and criticism. For the first time, Soviet citizens could openly discuss failures and compare their system to capitalism. A double-edged sword: it allowed reform but also unleashed criticism that undermined the regime's legitimacy. Gorbachev saw it as essential to reform; it became the instrument of the USSR's destruction.",cat:"cw_end"},
  {id:"cw32",q:"What was Gorbachev's impact on the Cold War?",a:"Transformative. Introduced 'new thinking' to undo Stalin's legacy. Reduced military spending. Signed the INF Treaty (1987). Most critically: abandoned the Brezhnev Doctrine, replacing it with the 'Sinatra Doctrine' (1988, after 'My Way') — Eastern European countries could choose their own path. He would not send tanks to crush protests. This single decision sealed the Soviet empire's fate.",cat:"cw_end"},
  {id:"cw33",q:"What was Reagan's role in ending the Cold War?",a:"Called the USSR an 'evil empire' and dramatically increased military spending, forcing Soviets into an arms race they couldn't afford. His SDI ('Star Wars,' 1983) proposed space-based missile defence — undermining MAD and leaving the USSR vulnerable, forcing Gorbachev to negotiate. Then proved a surprisingly good negotiator, willing to reverse his anti-communist rhetoric for genuine progress.",cat:"cw_end"},
  {id:"cw35",q:"What role did the Soviet economy play in ending the Cold War?",a:"Central. Under Brezhnev, approximately 25% of GDP went to military — vs ~6% in the US. Gorbachev inherited a drained economy: scarce consumer goods, falling technology, inefficient command system. He had no choice but to negotiate, reform, and reduce military spending. Without the economic crisis, there would have been no Perestroika, no Glasnost, and no end to the Cold War.",cat:"cw_end"},
  {id:"cw36",q:"What happened in Eastern Europe in 1989?",a:"Revolution swept the continent. People near Western borders watched Western TV and saw the contrast. When Gorbachev made clear the Red Army wouldn't intervene (Sinatra Doctrine), it was the green light. Country after country threw off communist rule. The Berlin Wall fell in November 1989 — destroyed by ordinary people with hammers. The most powerful symbol of the Cold War ended.",cat:"cw_end"},
  {id:"cw37",q:"What was the impact of the USSR's collapse (1991)?",a:"(1) Capitalism appeared to triumph. (2) International politics became 'uni-polar' — USA the sole superpower. (3) Cuba lost Soviet subsidies → devastating 'Special Period.' (4) African regimes dependent on Soviet aid collapsed. (5) Former Soviet states gained independence but faced economic chaos. (6) The ideological framework since 1945 evaporated.",cat:"cw_end"},
  {id:"cw38",q:"Compare Gorbachev and Reagan.",a:"SIMILARITIES: both saw nuclear dangers — even discussed eliminating weapons entirely. Both worked through summits (1985-88). Both reversed previous positions for compromises. CONTRASTS: Reagan started hardline, softened; Gorbachev started conciliatory. Gorbachev's actions driven by internal economic necessity; Reagan could maintain spending. Gorbachev's impact was larger — reforms led to USSR collapse. But both essential: Reagan created pressure, Gorbachev responded with transformation not escalation.",cat:"cw_end"},
  {id:"cw51",q:"What was SDI and why did it matter?",a:"Strategic Defence Initiative ('Star Wars,' 1983) — proposed space-based missile defence against Soviet ICBMs. Whether it would work was almost irrelevant: it undermined MAD by suggesting one side could survive nuclear exchange. The USSR couldn't afford a counter-system. SDI essentially forced the Soviets to negotiate because they couldn't compete technologically or financially.",cat:"cw_end"},
  {id:"cw53",q:"What were the key Reagan-Gorbachev summits?",a:"Multiple summits 1985-88. Both men made mistakes but were determined to reach a conclusion. The INF Treaty (1987) was the key achievement — eliminating all intermediate-range nuclear weapons from Europe. Reynolds noted both were prepared to 'reverse their previous positions.' The personal chemistry between them was a crucial factor in ending the Cold War.",cat:"cw_end"},
  // ═══ MUSSOLINI: RISE ═══
  {id:"mu1",q:"How weak was Italian parliamentary government before WWI?",a:"Extremely weak. Based on the 1848 Statuto, the king could appoint ministers and declare war. Over 30 governments came and went between 1871-1914 — averaging a new government every 18 months. Voting rights initially limited to just 2% of population; voter turnout only ~50% even after reforms. Corruption through 'transformism' — politicians switching alliances to stay in power — destroyed public trust. Italy was a democracy in name but an oligarchy in practice.",cat:"au_muss_rise"},
  {id:"mu2",q:"What was Italy's economy like before WWI?",a:"Deeply divided. Northern industries grew: textiles, chemicals, steel — coal output reached 3.6 million tons by 1913. But the south remained desperately poor and agricultural. Six million Italians emigrated seeing no future. 80% of the population were impoverished peasants, crippling the domestic market. Per capita income rose modestly but Italy lagged behind all other major European powers in productivity.",cat:"au_muss_rise"},
  {id:"mu3",q:"How did Italy seek great power status (1870-1914)?",a:"Through diplomacy and colonialism with limited success. Joined the Triple Alliance (1882). Gained Eritrea (1885), Somalia, and Libya (1911). But the defeat at Adowa (1896) against Ethiopia was humiliating — one of the few times an African army defeated a European power. Agreements with France (1900, 1902) allowed minor expansion. Italy remained the weakest great power with expensive colonies and dependence on stronger allies.",cat:"au_muss_rise"},
  {id:"mu4",q:"What factors contributed to Italian Fascism after WWI?",a:"A perfect storm: ECONOMIC — inflation, 2 million unemployed by late 1919, savings destroyed. POLITICAL — proportional representation led to weak coalitions; over 30 governments in 40 years had already destroyed faith in democracy. SOCIAL — the 'Red Biennium' (1919-20) saw strikes and factory occupations terrifying the middle class. NATIONALIST — the 'mutilated victory' at Versailles: 600,000 dead but Italy received far less territory than promised. Returning soldiers felt cheated.",cat:"au_muss_rise"},
  {id:"mu5",q:"What was the 'mutilated victory'?",a:"Italy entered WWI expecting territorial rewards (Treaty of London, 1915). After 600,000 dead, Versailles gave far less than promised — South Tyrol and Trieste gained, but Fiume and Dalmatia denied. Nationalists coined 'vittoria mutilata' and blamed weak democratic politicians. This grievance poisoned Italian politics and fueled radical movements like Fascism.",cat:"au_muss_rise"},
  {id:"mu6",q:"How did Mussolini use propaganda in his rise?",a:"Former socialist journalist who edited Avanti! before breaking with the left in 1914 over WWI. Founded Il Popolo d'Italia, spreading nationalism and anti-communism. Used Roman symbols — the fasces (bundle of rods with axe) — for power imagery. Started the Fasci di Combattimento in 1919. By 1921, a deal with liberal politician Giolitti gave the Fascists 35 parliamentary seats and a veneer of legitimacy.",cat:"au_muss_rise"},
  {id:"mu7",q:"What was the March on Rome (October 1922)?",a:"More propaganda than military operation. Blackshirt squads converged on Rome, but the real drama was at the royal palace. King Victor Emmanuel III could have declared martial law — the army would have obeyed. But he feared civil war and doubted his own position. Instead, he invited Mussolini to form a government. At 39, the former journalist became PM. The march was mythologized as glorious seizure of power — in truth a bluff that worked because the king, army, Church, and industrialists allowed it.",cat:"au_muss_rise"},
  {id:"mu15",q:"How did Mussolini use violence in his rise?",a:"Blackshirt squads (squadristi) attacked socialist offices, beat opponents, destroyed printing presses, murdered rivals. He maintained a dual strategy: legal parliamentary work to gain elite support + illegal street violence to keep radical Fascists loyal. Industrialists and landowners funded the squads because they broke strikes. Not random violence — targeted political terrorism making Fascism seem like the only force capable of restoring order.",cat:"au_muss_rise"},
  // ═══ MUSSOLINI: IN POWER ═══
  {id:"mu8",q:"What was the Acerbo Law (1923)?",a:"Whichever party got at least 25% of votes received two-thirds of parliamentary seats. Mussolini justified it as ensuring 'stable government' after decades of weak coalitions. Supported by liberals and Catholics — out of fear, and naive hopes of controlling Mussolini within the system. Effectively rigged every future election through legal means.",cat:"au_muss_power"},
  {id:"mu9",q:"What was the Matteotti Crisis (1924)?",a:"Socialist deputy Giacomo Matteotti publicly denounced Fascist election fraud with documented evidence. Days later, kidnapped and murdered by Fascist thugs. Opposition withdrew from parliament ('Aventine Secession') — but this backfired: the King and elites backed Mussolini over chaos. From 1925-26, Mussolini declared himself dictator, banned all opposition, censored the press, created the OVRA secret police, made himself accountable only to the King.",cat:"au_muss_power"},
  {id:"mu10",q:"What was Corporativism?",a:"State-controlled 'corporations' combining employers, workers, and government in each economic sector. Claimed to replace class struggle with national unity. In practice: overwhelmingly favored businesses, unions banned, wages controlled, strikes illegal. Professor Duggan noted the regime 'focused on Mussolini personally, not a clear ideology' — mixing force, propaganda, and opportunism without true totalitarian structure.",cat:"au_muss_power"},
  {id:"mu11",q:"What were the Lateran Accords (1929)?",a:"Perhaps Mussolini's greatest diplomatic success — ending decades of Church-state hostility. CHURCH GAINED: Vatican City as sovereign state, 750 million lire compensation, Catholicism as state religion, mandatory religious education, control over marriages/family law. FASCISTS GAINED: Church endorsement (ending Catholic opposition), control over appointments and youth organizations. Won over millions of traditional rural Italians instantly.",cat:"au_muss_power"},
  {id:"mu13",q:"Evaluate Mussolini's economic policies.",a:"Changed over time. 1922-25: free-market (budget balancing, privatization). 1925-29: interventionist (currency revaluation/'Battle for the Lira,' tariffs, self-sufficiency drives). Post-1929: Depression hit hard, Italy arguably never fully recovered under Mussolini. 'Battle for Grain' boasted self-sufficiency but raised costs, neglected other crops. GDP growth averaged only 1.5% annually — below pre-war levels. Autarky (self-sufficiency) led to inefficiency. War preparation wasted scarce resources.",cat:"au_muss_power"},
  {id:"mu14",q:"Evaluate Fascism's impact on Italy.",a:"FOR CHANGE: infrastructure modernization (railways, highways), IRI nationalized key industries (steel production rose 50%), Dopolavoro leisure organization was genuinely popular, literacy improved, Pontine Marshes drained creating jobs. AGAINST: class divisions persisted, South remained poor, women confined to domestic roles, 'Battle for Births' failed to raise birth rates, GDP growth below pre-war levels, propaganda was 'essentially rhetoric and blather' — exaggerating success, hiding failure.",cat:"au_muss_power"},
  {id:"mu17",q:"What was the Fascist Grand Council?",a:"Created 1923 as the top advisory body of the Fascist Party. Supposed to merge party and state by advising on policy and appointments. In practice, rubber-stamped Mussolini's decisions. Ironically, it was the Grand Council that voted to remove Mussolini in July 1943 when the war turned decisively against Italy.",cat:"au_muss_power"},
  {id:"mu18",q:"How did Mussolini use 'battles' as propaganda?",a:"Named economic policies 'battles' to frame them as heroic national struggles: 'Battle for Grain' (food self-sufficiency — partial success, high cost), 'Battle for Births' (tax breaks for large families, penalties for bachelors — largely failed), 'Battle for the Lira' (currency revaluation — hurt exports). Military language made peacetime economics feel heroic. But as the textbook notes: 'essentially rhetoric and blather.'",cat:"au_muss_power"},
  // ═══ PERÓN: RISE ═══
  {id:"pe1",q:"What was Argentina like before Perón?",a:"Built on agricultural exports — between 1872-1895, cultivated pampas land expanded 15-fold. Buenos Aires became the 'Paris of South America.' But about 2-3% owned 95% of the land. Upper class lived in French-designed Barrio Norte mansions; immigrants lived in conventillos — tenements housing up to 350 people in cramped rooms. Argentine elites learned French/English to seem 'civilized' and looked down on the working class, who created their own culture: tango, popular theatre.",cat:"au_peron_rise"},
  {id:"pe12",q:"What was the 'Infamous Decade'?",a:"Began with a 1930 military coup during the Great Depression. Commodity prices collapsed, imports dried up. Corrupt autocratic rule followed. Industrial development began to reduce import dependency, but inequality, corruption, and a broken political system deepened. People lost faith in democracy itself — creating the conditions for Perón's populist message.",cat:"au_peron_rise"},
  {id:"pe2",q:"What was the GOU?",a:"Group of United Officers (Grupo de Oficiales Unidos) — a secret society of young nationalist, anti-communist, ultra-Catholic military officers including Colonel Perón (1943). Aims: end corruption, restore the constitution, strengthen industry, maintain WWII neutrality, prevent communism by improving workers' conditions from above. Key belief: controlled reform from the top prevents revolution from below.",cat:"au_peron_rise"},
  {id:"pe3",q:"How did Perón benefit from the Labour Department?",a:"After the 1943 coup, appointed head of the Labour Department (then Secretary of Labour and Welfare). Before him, no laws protecting workers' rights existed — to employers' advantage. Perón changed everything: paid vacations, severance pay, minimum wages, pensions. His genius: 'He was using them, not the reverse' (Source C). Workers feared losing their gains if Perón was removed — union support became personal loyalty.",cat:"au_peron_rise"},
  {id:"pe4",q:"How was Perón influenced by European fascism?",a:"Admired Mussolini's organizational methods and ability to control masses. Observations of post-Civil War Spain reinforced his belief in strong leadership — expressed in his manual 'Conducción Política.' Like Mussolini: used corporatist structures, state-controlled unions, nationalist rhetoric. Unlike Mussolini: built his base from the working class not the middle class, and avoided systematic political violence.",cat:"au_peron_rise"},
  {id:"pe5",q:"What happened on 17 October 1945?",a:"The event that changed Argentina. Military elites arrested Perón on 9 October. Eight days later, a massive spontaneous demonstration of workers — the descamisados ('shirtless ones') — filled Buenos Aires demanding his release. One worker: it was 'the awakening of the workers' conscience.' First time Argentina's working class acted as a unified political force. Perón was released → path to presidency opened. 17 October became sacred in Peronist mythology.",cat:"au_peron_rise"},
  {id:"pe13",q:"What was Argentine society's 'civilization vs barbarism' divide?",a:"Elites considered Europe 'civilized' and their own working class 'barbaric.' Between 1870-1930, millions of Italian and Spanish immigrants transformed demographics. After 1930, nationalist movements rose. The cultural divide between cosmopolitan elites and the working poor was exactly what Perón exploited — empowering marginalized workers through nationalism and social justice.",cat:"au_peron_rise"},
  // ═══ PERÓN: IN POWER ═══
  {id:"pe7",q:"How did Perón consolidate power?",a:"Despite decisive 1946 victory (all senators except two, 2/3 of Deputies, every governorship but Corrientes), he felt insecure. Step 1: dissolved all parties → single Partido Justicialista under his control. Step 2: impeached 3 Supreme Court justices, appointed loyalists. Step 3: 110 publications closed (1943-46) via fake inspections and paper supply disruption. Step 4: police disrupted opposition meetings; Radical leaders expelled or jailed.",cat:"au_peron_power"},
  {id:"pe8",q:"What was the Eva Perón Foundation (FEP)?",a:"By late 1940s, surpassed most government ministries. Assets exceeded $200 million; 14,000 employees. Distributed vast goods to the poor — housing, food, medical care. Eva personally attended families. But also a tool of political control: benefits flowed through Peronist channels; recipients understood their improved lives depended on Perón staying in power. Both genuine charity and calculated politics.",cat:"au_peron_power"},
  {id:"pe9",q:"What were Perón's economic policies?",a:"'Purely statist' (Source O). Nationalized: Central Bank (1946), railways, telecommunications, foreign trade via IAPI monopoly on grain exports. Import Substitution Industrialization (ISI): tariffs, subsidies, state credits for domestic industry. IAPI captured agricultural profits to fund urban industrialization — taxing farmers to pay for factories. Prices controlled, rents frozen, subsidized bakeries and utilities. Public employment and regulations grew 'oppressive, leaving little room for private autonomy.'",cat:"au_peron_power"},
  {id:"pe16",q:"How did Perón control the press?",a:"110 publications closed (1943-46). Fake inspections as harassment. Paper supplies disrupted to hinder critical newspapers. In 1951, shut La Prensa (Argentina's most prestigious newspaper), used official radio to counter its editorials, then reopened it under pro-Perón direction. Secretariat of Information controlled messaging. Argentina went from Latin America's freest press to one of its most controlled.",cat:"au_peron_power"},
  {id:"pe20",q:"What was Eva Perón's role and legacy?",a:"Emotional face of Peronism — defender of the poor, ran the FEP, personally delivered goods. Her 'La razón de mi vida' (1951) became required school reading. But complex legacy: demanded women's 'absolute fidelity' to Perón (Source H), said 'a woman's true place is in the home' — granting political rights but preserving patriarchal society. Died 1952 aged 33; her death removed a key pillar of Perón's popular support.",cat:"au_peron_power"},
  {id:"pe19",q:"How did Perón use education?",a:"Committee mandated new textbooks with Peronist messages — no criticism allowed. Ministry required aligned teacher's guides. Teachers trained to transmit Peronist doctrine. Eva's 'La razón de mi vida' mandatory reading. Education became a tool for creating the next generation of Peronists — not just learning, but indoctrination.",cat:"au_peron_power"},
  {id:"pe10",q:"Why did Perón fall in 1955?",a:"Economic decline after 1951: inflation soared, shortages appeared, ISI gains evaporated. Church turned against him. Armed forces alienated by personality cult and authoritarianism. After Eva's death (1952), lost his most effective connection to the masses. La Prensa shut 1951 showed growing repression. Bombing of presidential palace June 1955 showed depth of opposition. Military coup 16 September 1955; Perón fled into exile until 1973.",cat:"au_peron_power"},
  // ═══ CASTRO: RISE ═══
  {id:"ca1",q:"Who was José Martí?",a:"Cuban poet, journalist, revolutionary — founded the Cuban Revolutionary Party, launched the 1895 War of Independence against Spain. Killed in battle; his martyrdom inspired Cuba's independence (1902). The undisputed national hero: his vision of anti-colonial, anti-imperialist nationalism was later claimed by both Castro and his opponents. Martí's ideas were the intellectual bedrock of Cuban identity.",cat:"au_castro_rise"},
  {id:"ca2",q:"What was Cuba's economy and society before 1959?",a:"Sugar-dominated monoculture — US companies (United Fruit, Esso, Texaco, Cuban Electric Co.) controlled sugar, oil, utilities, telecom. The Platt Amendment (1901-1934) gave the US rights to intervene and secured Guantánamo. High per capita income but 200,000 peasant families had no land, 17% unemployment, seasonal sugar work left most rural workers idle for months. Cuban nationalism was inherently anti-American due to this long dependency.",cat:"au_castro_rise"},
  {id:"ca3",q:"Who was Batista after 1952?",a:"'Two Batistas': first term (1940-44) was a successful populist who legalized trade unions and the Communist Party. The second (after his 1952 coup) was 'lazy and corrupt' — failed to curb corruption while engaging in it. Meyer Lansky and American organized crime ran Havana as a 'Latin Las Vegas' under his protection. In 1957, caught misusing US defence weapons against internal opponents → US arms embargo was 'a severe psychological blow.'",cat:"au_castro_rise"},
  {id:"ca4",q:"What was the Moncada Assault (26 July 1953)?",a:"140 rebels led by Castro attacked Cuba's second-largest barracks to seize weapons and spark uprising. Failed: loss of surprise, strong resistance — nearly all killed or captured. But Castro's trial speech 'History Will Absolve Me' identified Cuba's crises with statistics (landlessness, starvation, housing inequality, corruption, educational neglect) and offered bold reforms. Became a revolutionary manifesto. The 26th of July Movement took its name; its red-and-black flag symbolized revolutionary blood and mourning for martyrs.",cat:"au_castro_rise"},
  {id:"ca5",q:"What was the Granma expedition (December 1956)?",a:"~80 rebels aboard the overloaded yacht Granma, returning from Mexican exile. Everything went wrong: delays, mechanical failures, swamp landing, lost supplies, devastating ambush at Alegría de Pío. Only 12 survivors — including Fidel, Raúl Castro, Che Guevara (Argentine doctor recruited in Mexico), and Camilo Cienfuegos — regrouped in the Sierra Maestra to form the Rebel Army.",cat:"au_castro_rise"},
  {id:"ca6",q:"How did Batista contribute to the revolution's success?",a:"His brutality was his worst enemy: mass torture and killings after Moncada and Granma alienated the entire population. Failed to address landlessness (200,000 families without land), poverty, 17% unemployment. Relied on military force not political solutions. Arms embargo 1957 was devastating. By 1958, army morale collapsed. Nearly every social class backed the revolution — either for its program or as the most effective anti-Batista force (Source C).",cat:"au_castro_rise"},
  {id:"ca24",q:"What were conditions in pre-revolutionary Havana?",a:"Meyer Lansky — the mob's strategic architect — ran Havana's gambling empire cooperating with Batista. The real 1946 Havana Conference (depicted in 'The Godfather Part II') saw crime bosses planning Cuban operations. Deep entanglement of organized crime, corrupt government, and foreign business represented everything the revolutionaries opposed — and illustrated why Cuban nationalism was inherently anti-American.",cat:"au_castro_rise"},
  {id:"ca14",q:"What was the role of women in the revolution?",a:"Key figures: Vilma Espín (led urban support, later founded Cuban Women's Federation), Haydée Santamaría (Moncada veteran, spread Castro's speech, founded Casa de las Américas; suicide 1980), Celia Sánchez (arranged Granma logistics, founded women's 'Mariana Grajales' military unit). They wielded influence through urban coordination, arms smuggling, propaganda, and post-revolutionary policy.",cat:"au_castro_rise"},
  // ═══ CASTRO: IN POWER ═══
  {id:"ca7",q:"How did Castro consolidate power (1959-62)?",a:"Removed batistianos and liberals, crushed provincial revolts. Radical reforms eliminated the old elite. When revolutionary hero Huber Matos criticized communist influence and tried to resign → arrested for treason, sentenced to 20 years in show trial. Demonstrated zero tolerance for dissent even from revolutionary credentials. Declared himself Marxist-Leninist December 1961. Founded PCC to centralize all control.",cat:"au_castro_power"},
  {id:"ca8",q:"What were Castro's main reforms (1959-62)?",a:"LAND: limited ownership; state owned 70% by 1963. NATIONALIZATION: all foreign businesses, sugar mills, banks. URBAN: rents cut 50% (1959), later abolished. Currency reform (1962) wiped non-state savings. LITERACY (1961): 170,000 volunteer brigadistas; illiteracy dropped from ~23% to 4%. More schools in 3 years than previous 58. Private schools nationalized after Bay of Pigs. FMC (Federation of Cuban Women) created 1960.",cat:"au_castro_power"},
  {id:"ca9",q:"How did the Bay of Pigs strengthen Castro?",a:"April 1961 CIA invasion was a humiliating US defeat. For Castro: (1) validated warnings about US imperialism, (2) rallied entire population behind revolution as national survival, (3) justified crackdowns on opposition as fighting 'imperialist agents,' (4) accelerated embrace of communism and USSR ties. Castro's stature as a leader who defeated the superpower became cornerstone of revolutionary mythology.",cat:"au_castro_power"},
  {id:"ca11",q:"What was Castro's treatment of opposition?",a:"Multi-layered: CDRs (1960) — surveillance in every workplace/block, 1/3 population enrolled by 1963. UMAP camps (1965-68): ~25,000 in forced labour — dissidents, homosexuals, religious objectors, youth imitating US culture. Show trials (Matos, Padilla). 'Within the Revolution, everything; against the Revolution, nothing.' All media state-controlled since 1960s. Emigration as safety valve: Mariel Boatlift (1980) — 125,000+ left; Castro released prisoners onto boats, called emigrants 'scum.'",cat:"au_castro_power"},
  {id:"ca12",q:"Why did Castro embrace communism by December 1961?",a:"(1) US hostility (embargo, Bay of Pigs) forced him to seek Soviet protection. (2) Soviet aid required ideological alignment. (3) Liberals/moderates left → PSP (Communist Party) filled vacuum with administrative experience and USSR connections. (4) Che Guevara pushed radicalization. (5) Marxism-Leninism justified one-party rule. Note: in February 1959, Castro explicitly denied being communist — either hadn't committed yet or was strategically concealing intentions.",cat:"au_castro_power"},
  {id:"ca10",q:"What was the Special Period (from 1991)?",a:"USSR collapse ended Soviet trade, subsidies, oil, technicians overnight. Castro declared 'a special period in peacetime.' Severe food shortages, large ration cuts, gasoline/electricity in short supply. Disease spread (optic neuropathy from malnutrition). Long blackouts, restricted transport. Response: cooperatives replaced state farms, foreign investment/tourism opened, US dollar legalized (1993), farmers' markets and limited self-employment allowed.",cat:"au_castro_power"},
  {id:"ca13",q:"To what extent did Castro achieve full authoritarian rule?",a:"FOR: one-party state (PCC); Castro held all key positions (head of state, government, party, military). National Assembly: rubber stamp, met days per year. CDR surveillance (1/3 enrolled). UMAP camps. Total media control. State economy. Education as indoctrination. Cult of personality. QUALIFICATIONS: no mass terror/purges like Stalin. Emigration as safety valve. Genuine popular support via education/healthcare. Pragmatic Special Period adaptations. More adaptive than 'full authoritarian' suggests.",cat:"au_castro_power"},
  // ═══ RECONQUEST: ISLAMIC IBERIA ═══
  {id:"rc1",q:"Why was the Muslim conquest of Iberia so easy in 711?",a:"Division among the Goths — the Germanic rulers since Rome's decline — caused by kingship struggles. The Moors defeated Roderic, the last Gothic king, and swept across nearly the entire peninsula in just a few years. The conquest's speed reflected Visigothic weakness rather than overwhelming Muslim military strength.",cat:"rc_islamic"},
  {id:"rc2",q:"What were the Moors' contributions to Iberia?",a:"Transformative for Western Europe: new irrigation/water-lifting devices, new crops (sugar, cotton, silk), paper and glass. Córdoba became one of Europe's largest cities. Mathematics (algebra, the zero), medicine, philosophy (Aristotle translations), architecture (the Alhambra, Great Mosque of Córdoba). The Islamic golden age preserved classical knowledge that Christian Europe had lost.",cat:"rc_islamic"},
  {id:"rc3",q:"What was 'La Convivencia'?",a:"Claimed period of religious harmony between Muslims, Christians, and Jews. Bernard Lewis: a 'golden age' — despite second-class citizenship, non-Muslims were still citizens with rights, exceptional by medieval standards. David Nirenberg: violence was 'central and systematic' — e.g., the 1066 organized massacre of Jews in Granada. Truth lies between: tolerance was real but conditional, and deteriorated significantly over time.",cat:"rc_islamic"},
  {id:"rc4",q:"How were non-Muslims treated in Islamic Spain?",a:"Better than expected: not in separate districts, not slaves, could practice faith (restricted), could earn a living. BUT: must acknowledge Islamic superiority, pay increased taxes (jizya), avoid blasphemy, not convert Muslims, wear special badge, not carry weapons, not own Muslim slaves, not marry Muslim women (Muslim men could marry non-Muslim women). Oppression increased over time; by later periods, Christians couldn't display faith publicly. The 1066 massacre shows tolerance had limits.",cat:"rc_islamic"},
  {id:"rc5",q:"Why was the Caliphate's breakup significant?",a:"Internal conflicts collapsed the Caliphate of Córdoba into numerous taifas — small, competing kingdoms individually too weak to resist. This was the critical turning point: Christian kingdoms could consolidate and launch the Reconquest. Unity was briefly restored by General Yusuf bin Tashfin with African forces, but internal rebellions in 1144-45 shattered Muslim unity permanently.",cat:"rc_islamic"},
  // ═══ THE RECONQUEST ═══
  {id:"rc6",q:"What was the Reconquest?",a:"Centuries-long Christian campaign to reclaim Iberia from Muslim rule. St. James's tomb discovery gave Christians a warrior patron saint. Early stages saw political opportunism — El Cid fought for both sides. By the 13th century, Muslim territory reduced to the small Kingdom of Granada. Final conquest under Ferdinand and Isabella in 1492.",cat:"rc_reconquest"},
  {id:"rc7",q:"How did the Reconquest shape Spanish culture?",a:"Centuries of warfare made war almost a Castilian way of life, creating a large class of warrior-nobles (hidalgos) with contempt for manual labour. Sheep favoured over agriculture because constant raids made farmland vulnerable — the powerful Mesta guild dominated. 'The frontier wars against the Moors had bred a race of gentlemen proud of their Christian blood but without a penny. Their one resource was to go to the wars.' This mentality was directly transferred to the New World.",cat:"rc_reconquest"},
  {id:"rc8",q:"What did Ferdinand and Isabella achieve — and fail?",a:"ACHIEVED: unified Spain, conquered Granada (1492), sponsored Columbus. FAILED: favoured aristocracy — by 1500, 2-3% owned 95% of land. 80% were impoverished peasants, crippling the domestic market. Limited industry (mainly iron and cloth) meant production never reached England's level. New World gold/silver led to dependence on extraction over industrial development. The empire was born 'half-crippled.'",cat:"rc_reconquest"},
  {id:"rc36",q:"What was the Ottoman Empire's impact on exploration?",a:"The Ottoman capture of Constantinople (1453) controlled key trade routes to Asia. Ottoman taxes and blockages forced European nations to seek alternative routes. Columbus's 1492 voyage was a direct response. The Ottoman threat also sharpened Christian-Muslim identities, reinforcing Spain's religious zealotry — the expulsions partly a reaction to the Ottoman 'enemy at the gates.'",cat:"rc_reconquest"},
  // ═══ EXPULSIONS ═══
  {id:"rc10",q:"When and why was the Spanish Inquisition established?",a:"1478, by Ferdinand and Isabella. Primary purpose: ensure religious orthodoxy in the newly unified kingdom. Targeted conversos — Jews/Muslims who converted but were suspected of secretly practicing. The ideology of 'limpieza de sangre' (purity of blood) demanded a Spain cleansed of non-Christian elements. The Inquisition had jurisdiction over baptized Christians — hence pressure to convert, then investigation of converts.",cat:"rc_expulsions"},
  {id:"rc11",q:"Who was Cardinal Cisneros?",a:"Isabella's confessor — key architect of religious persecution after 1492. Organized mass forced conversions of Muslims and ordered the burning of over 5,000 priceless Arabic manuscripts — an irreplaceable cultural catastrophe. When his agent was assassinated, it gave the Crown an excuse to revoke the Treaty of Granada entirely. His actions directly triggered the First Rebellion of the Alpujarras (1499-1500).",cat:"rc_expulsions"},
  {id:"rc12",q:"What happened to the Jews in 1492?",a:"The Edict accused Jews of enticing Christians back to Judaism — 'instructing them in ceremonies, performing circumcisions, providing prayer books, telling them there is no other law or truth.' Previous measures (banishing from Andalusia) had failed. Jews chose conversion or exile. Their loss crippled Spain: dominant in trade, finance, tax collection, medicine. As Fuentes wrote, the empire was born 'half-crippled' — expelling the people who could have managed it.",cat:"rc_expulsions"},
  {id:"rc37",q:"What were the Alpujarras Rebellions?",a:"FIRST (1499-1500): triggered by Cisneros's forced conversions and book-burning, violating the Treaty of Granada. Agent's assassination gave Crown excuse to revoke all promises. Muslims: exile or baptism. SECOND (1567): Philip II banned Arabic, Islamic religion, dress, customs — erasing Moorish identity. Don John razed Galera: salt on ruins, 2,500 slaughtered including 400 women and children.",cat:"rc_expulsions"},
  {id:"rc13",q:"When were the Moriscos expelled?",a:"Philip III's decree 4 April 1609, deportations from October. Majority settled on the Maghrib coast. The Moriscos had outwardly conformed to Christianity but secretly maintained their festivals and rituals — this 'refusal to renounce their cultural identity' was what Old Christians found most offensive. Their numbers were growing; some became successful merchants — adding fear and envy to religious hatred.",cat:"rc_expulsions"},
  {id:"rc15",q:"What was 'limpieza de sangre'?",a:"'Purity of blood' — ideology demanding Spain be free of non-Christian racial elements. Even generations after conversion, descendants of Jews/Muslims were considered suspect. The Inquisition investigated conversos' sincerity; wealth was often seized under heresy accusations. This went beyond religion into racial thinking, foreshadowing later European racial theories. Religious minorities could never truly be accepted.",cat:"rc_expulsions"},
  // ═══ CONQUEST OF MEXICO ═══
  {id:"rc16",q:"Who was Hernán Cortés?",a:"Born in Extremadura (Spain's poorest region). Enrolled at Salamanca's law faculty aged 14 — his legal training proved as important as military skill: every letter to Charles V was a carefully crafted legal argument. Had permission from Governor Velázquez to explore and trade — but NOT colonize. After defying Velázquez, returning empty-handed meant death. His plan: conquer Mexico fast and secure Charles V's backing to outweigh Velázquez's grievances.",cat:"rc_mexico"},
  {id:"rc17",q:"What was the Prophecy of Quetzalcoatl?",a:"The feathered serpent god was prophesied to return in a specific calendar year to reclaim his rule. 1519 — when Cortés arrived — corresponded to that year. The prophecy described a fair-skinned, bearded figure from the east, matching Cortés. Whether Moctezuma truly believed Cortés was Quetzalcoatl is debated, but the psychological impact of myth meeting reality was devastating for the Aztec response.",cat:"rc_mexico"},
  {id:"rc18",q:"Describe Tenochtitlán.",a:"One of the world's greatest cities in 1519. Built on a salt lake, 250,000+ inhabitants. Cortés described wide streets — half land, half canals. Marketplace comparable to Salamanca: 60,000 daily traders in sections for gold, silver, feathers, vegetables, pottery. Items sold by number and size, not weight. 40 towers (some taller than Seville's cathedral). Chapultepec aqueduct for fresh water. Bernal Díaz: the soldiers wondered 'whether what we saw was real.'",cat:"rc_mexico"},
  {id:"rc19",q:"Who was Malintzin (La Malinche)?",a:"One of 20 enslaved women given to Cortés after a Tabasco battle (1519). Fluent in Nahuatl and Mayan — became Cortés's interpreter, advisor, and key to all communication with the Aztecs and potential allies. Without her, he couldn't have negotiated with Moctezuma's emissaries or recruited the Tlaxcalans. Most controversial figure in Mexican history — seen as both traitor and survivor.",cat:"rc_mexico"},
  {id:"rc20",q:"Why did the Tlaxcalans ally with Cortés?",a:"The Aztecs maintained perpetual 'flower wars' with the Tlaxcalans — ritual conflicts providing human sacrifices. This was 'so hateful' that when Cortés arrived, the Tlaxcalans became his most loyal allies. They provided the crucial military manpower that made the siege of Tenochtitlán possible — Cortés's few hundred Spaniards could never have conquered the empire alone.",cat:"rc_mexico"},
  {id:"rc41",q:"What was the Night of Sorrows (Noche Triste)?",a:"1520: after the Spanish massacred Aztec nobles during a festival, a revolt drove Cortés out via the Tacuba Causeway. Many Spaniards drowned under the weight of stolen gold. Moctezuma died — Cortés says killed by arrows and stones from his own people; Díaz says a single stone strike. The Aztecs' ritualistic warfare — prioritizing live capture over killing — prevented them from destroying the Spanish when they had the chance. Cortés returned in 1521; the city fell 13 August after siege, disease, and starvation.",cat:"rc_mexico"},
  {id:"rc39",q:"What were Aztec codices and The Broken Spears?",a:"Codices: manuscripts by Aztecs, Mayas, and early colonial indigenous peoples. Most burned by conquistadors and churchmen — only ~40 survive. 'The Broken Spears' compiles indigenous accounts of the Conquest from the conquered perspective. It records omens: a pillar of fire, the Temple of Huitzilopochtli struck by lightning, Lake Texcoco boiling, a woman's voice wailing at night. Equal in historical value to Spanish sources.",cat:"rc_mexico"},
  // ═══ CONQUEST OF PERU ═══
  {id:"rc23",q:"Who was Francisco Pizarro?",a:"Ambitious, illiterate soldier from Extremadura. Unlike law-educated Cortés, he couldn't sign his own name. His Cajamarca force included 51-76 literate men (30-45%) with notaries handling administration. Unequal reward distribution strained his partnership with Diego de Almagro. The image: gritty, wealth-obsessed opportunists — skilled but brutal — led by an uneducated commander whose poor alliances led to civil war among the conquerors themselves.",cat:"rc_peru"},
  {id:"rc24",q:"How did Peru's situation favour the Spanish?",a:"Two catastrophes before Pizarro arrived: (1) Smallpox — brought by earlier European contact — swept through the population, killing Emperor Huayna Capac himself. (2) Devastating civil war between his sons: Atahualpa (north) vs Huáscar (south). Divided loyalties, depleted resources, fragmented empire. Pizarro's timing was as important as his technology.",cat:"rc_peru"},
  {id:"rc25",q:"What happened at Cajamarca (November 1532)?",a:"History's most audacious ambush. Pizarro lured Atahualpa to the plaza. Fray Valverde demanded Christianity and submission, presenting a Bible. Atahualpa discarded it (La Vega notes interpreter Felipillo badly distorted Valverde's speech). Valverde signaled the attack: 168 Spaniards with cannons, cavalry, and steel slaughtered thousands of lightly armed Incas. Atahualpa captured, offered a room of gold as ransom — then executed by garroting after accepting baptism (1533). Sources broadly agree on strangulation.",cat:"rc_peru"},
  {id:"rc26",q:"What were the 'Post-Conquest Troubles'?",a:"Revealed conquistadors' true nature. Manco (puppet ruler) rebelled 1536. Pizarro vs Almagro feud: Almagro strangled 1538; his 'knights of the cape' assassinated Pizarro 1541. Gonzalo Pizarro revolted against the New Laws, killed Viceroy Blasco Núñez Vela 1546, briefly ruled Peru — defeated by Gasca 1548. Shows conquistadors driven by personal gain, not loyalty to Spain.",cat:"rc_peru"},
  {id:"rc27",q:"How did 'a handful of Spaniards' win two empires?",a:"Five factors — ALL needed: (1) Superior technology: steel, guns, horses. (2) Indigenous alliances: Tlaxcalans vs Aztecs, rival Inca factions. (3) Disease: smallpox devastated both empires — possibly killing more than fighting. (4) Centralized rule: capturing the divine ruler paralyzed the entire command structure. (5) Religious/cultural misunderstandings: Quetzalcoatl prophecy, ritual warfare prioritizing capture. Remove any single factor and the conquests might have failed.",cat:"rc_peru"},
  {id:"rc43",q:"What was the Inca civilization like?",a:"Largest pre-Columbian empire — Tawantinsuyu ('Four Quarters'), Ecuador to Chile. 25,000+ miles of roads, suspension bridges. No writing: quipus (knotted strings) for records. No money: labour tax. No slavery as Europeans knew it. Mastered high-altitude farming: terraced fields, irrigation. Sapa Inca: divine ruler, descendant of sun god Inti, absolute power. Army of tens of thousands — but slings, clubs, bronze weapons were fatally outmatched by Spanish steel.",cat:"rc_peru"},
  // ═══ COLONIAL SYSTEMS ═══
  {id:"rc28",q:"What was the Encomienda system?",a:"Backbone of colonial exploitation. Encomenderos granted authority over indigenous groups — required labour/tribute/goods in exchange for supposed protection and Christian instruction. Legally not slavery, but the distinction was often meaningless. Mirrored feudal arrangements from the Reconquista transplanted to a new continent. The Mita system in the Andes went further — rotational mine labour that frequently killed workers.",cat:"rc_colonial"},
  {id:"rc29",q:"Who was Bartolomé de Las Casas?",a:"Arrived 1502 as colonist and encomendero. In 1514, dramatic conversion after witnessing atrocities and hearing a sermon denouncing the encomienda. Became Dominican friar, 'Protector of the Indians.' Wrote 'A Short Account of the Destruction of the Indies' (1542) documenting colonial horrors. Influenced the New Laws (1542-43). Debated Sepúlveda at Valladolid (1550-51). His mature position: indigenous people should be free subjects of the Crown, evangelized peacefully.",cat:"rc_colonial"},
  {id:"rc30",q:"What were the New Laws (1542-43)?",a:"Enacted under Charles V, heavily influenced by Las Casas. Key: encomiendas could NOT be inherited (ending their permanence), indigenous enslavement banned, labour burdens reduced. Las Casas briefly appointed 'Protector of the Indians.' BUT: Gonzalo Pizarro led a rebellion in Peru (1544-48), killing the Viceroy. The Crown was forced to weaken enforcement — revealing the limits of reform when those profiting had armies.",cat:"rc_colonial"},
  {id:"rc31",q:"What was the Valladolid Debate (1550-51)?",a:"Intellectual climax of the colonial moral crisis. Sepúlveda (citing Aristotle): indigenous peoples were 'natural slaves,' justifying conquest/forced conversion. Las Casas: they were rational humans with inherent rights deserving peaceful evangelization. Sepúlveda backed by colonial elites (encomenderos). Las Casas by Dominican/Franciscan missionaries and parts of the Crown. No clear winner declared, but Las Casas's arguments planted seeds of modern human rights discourse.",cat:"rc_colonial"},
  {id:"rc34",q:"How was the Conquest connected to the Reconquest?",a:"Direct continuation. Carlos Fuentes: Reconquista's focus on domination/exclusion became the template. 'The frontier wars against the Moors had bred a race of gentlemen proud of their Christian blood but without a penny.' Cortés compared indigenous architecture to Granada. Extremaduran poverty drove men abroad. The trinity: God, Gold, Glory. The encomienda echoed Reconquista feudalism. The Requerimiento (legal demand for submission) mirrored crusading ideology.",cat:"rc_colonial"},
  {id:"rc33",q:"What was the Black Legend?",a:"'Leyenda negra' — narrative of unique Spanish cruelty. Ironically fueled by Las Casas's own writings, translated by Spain's Protestant rivals (England, Netherlands) as anti-Spanish propaganda. Las Casas described atrocities to reform the system, not destroy it. The Black Legend served English/Dutch imperial interests by portraying their colonialism as more 'civilized' by comparison.",cat:"rc_colonial"},
  {id:"rc35",q:"What was the Church's role in the colonies?",a:"Complex. Initial friars — shaped by Cisneros's reforms — were elite, driven by missionary zeal. Some (Vasco de Quiroga, Las Casas) envisioned utopian indigenous communities. But reformist attitudes clashed with encomenderos' exploitation. Under the patronato, the Spanish Crown had absolute authority over colonial clergy — the Church served the state. Power rivalled royalty under Habsburgs (1516-1700), later curbed by Bourbons.",cat:"rc_colonial"},
  {id:"rc45",q:"What did Burkhart observe about indigenous Christianity?",a:"The Aztecs 'were able to become just Christians enough to get by in the colonial setting without compromising their basic ideological and moral orientation.' They adopted Christian practices to navigate the system while preserving core beliefs. The Day of the Dead — merging Aztec rituals honoring Mictecacihuatl (death goddess) with All Saints' Day — is living proof the conquered were never truly conquered in spirit.",cat:"rc_colonial"},
