    {year:"1950–53",text:"The Korean War — the first armed conflict between capitalist and communist forces, and one of the first UN-led military coalitions. The cost was staggering: approximately 2.5 million Korean civilians died. As Charles 'Chip' Bohlen claimed: 'It was the Korean War and not World War Two that made us a world military-political power.' The result was ambiguous: South Korea was saved but the peninsula remained divided at roughly the same line, and a new communist power — China — had entered the world stage. The war ended in armistice (1953), not a peace treaty."},
    {year:"1952–54",text:"Japan, occupied and rebuilt by the US since 1945, was formalized as an American protector of capitalism in Asia through the 1952 Security Treaty. When China bombarded Taiwan, the Formosa Resolution authorized military action, and Eisenhower threatened nuclear weapons — textbook brinkmanship that worked. Meanwhile, in Indochina, Ho Chi Minh led a communist-nationalist movement against French colonial rule. The French were defeated at Dien Bien Phu (1954). The Geneva Conference agreed: French withdrawal, temporary division at the 17th parallel, and 'free elections' in 1956. Crucially, the US did not sign the Geneva Accords."},
    {year:"1964–73",text:"Vietnam proved containment had limits. The Gulf of Tonkin Resolution gave the president unlimited military authority. Operation Rolling Thunder unleashed devastating bombing — 30,000 civilian casualties. But Vietnam was the first uncensored televised war: images of napalm and burning villages reached American living rooms, sparking massive domestic protests. The US was fighting not just the Viet Cong but its own public opinion."},
    {year:"1975",text:"America lost the Vietnam War. The Domino Theory — dismissed by critics as simplistic — partially came true: Laos and Cambodia fell to communism within months of Saigon's fall. Yet there was a silver lining: the war had relieved Chinese pressure from Malaysia, Thailand, and Singapore, which all remained non-communist. Containment in Asia was a story of partial success and spectacular failure — Korea saved, Japan thriving, Taiwan defended, but Vietnam lost and dominoes falling."}
  ]
},
cw_crises:{
  title:"On the Brink: Berlin and Cuba",
  events:[
    {year:"1949–57",text:"Germany's division created two starkly different realities. West Germany experienced an 'economic miracle' — larger population, greater industrial output, Marshall Aid, and rising living standards. East Germany suffered forced collectivization, rapid socialization, and massive economic problems. In June 1953, East German workers rioted against poor conditions — Soviet tanks were sent in to crush the protests, a brutal reminder of how communist rule was maintained. The contrast between the two Germanys drove a relentless brain drain: over 300,000 skilled workers had fled to the West by the late 1950s."},
    {year:"1958",text:"Berlin was a wound that wouldn't heal. The city sat deep inside communist East Germany, split into Western and Eastern zones. Skilled workers crossed freely into West Berlin for higher pay and better lives. West Berliners, meanwhile, crossed east to buy goods at cheap communist prices, creating shortages for actual East Berliners. For Khrushchev, this was unsustainable — the brain drain threatened the very existence of East Germany."},
    {year:"1958–59",text:"Khrushchev demanded the withdrawal of Western troops from Berlin and proposed making it a 'Free City.' He was also worried about nuclear weapons — West Germany (FRG) was in NATO and had been equipped with tactical nuclear weapons. The Geneva Conference and Paris Conference both attempted to resolve the crisis, but neither produced any conclusive outcome. The superpowers were at a deadlock."},
    {year:"Aug 1961",text:"Khrushchev and East German leader Walter Ulbricht acted. On 13 August, barbed wire appeared overnight between East and West Berlin, quickly replaced by permanent concrete. The Wall would divide families, friends, and a city for 28 years. It was an admission of failure: the communist system couldn't compete with capitalism if people were free to choose. In October 1961, the crisis escalated further when US and Soviet tanks faced off directly at Checkpoint Charlie for 16 hours — the closest direct military confrontation between the two superpowers. The standoff eventually de-escalated, but it demonstrated how quickly Berlin could spiral into war. The Wall achieved its goal: East Germany's existence was assured, and Western powers, by tolerating it, implicitly recognized the GDR. German-American relations suffered, and Berlin increasingly relied on France. The Wall became the defining symbol of the Cold War — a propaganda loss for communism that highlighted the weakness of the entire Soviet bloc."},
    {year:"1959",text:"Meanwhile, 90 miles from Florida, Fidel Castro had overthrown the US-backed dictator Batista and established a communist-aligned regime in Cuba. This was no distant satellite state — this was in America's backyard, a direct challenge to US influence in the Western hemisphere."},
    {year:"Apr 1961",text:"Kennedy inherited a CIA plan to invade Cuba using trained Cuban exiles. He modified it — fatally removing US air support — and the Bay of Pigs invasion was a humiliating disaster. The failure had three consequences: it strengthened Castro, who now had proof of American aggression to justify his crackdowns; it made Kennedy look weak, particularly to Khrushchev; and it pushed Cuba deeper into the Soviet embrace."},
    {year:"Oct 1962",text:"American U-2 spy planes photographed Soviet nuclear missile sites being constructed in Cuba. The missiles could reach most major US cities within minutes. Kennedy's response was a naval blockade — he called it a 'quarantine' to avoid the legal implications of an act of war. For thirteen days, the world stood on the brink of nuclear annihilation. Soviet ships carrying more missiles sailed toward the blockade line. The Cuban Missile Crisis was the closest humanity has ever come to nuclear war."},
    {year:"Late Oct 1962",text:"A deal was struck. The Soviets would remove their missiles from Cuba; the US would quietly remove its missiles from Turkey and promise not to invade Cuba. The orthodox view credits Kennedy as calm and decisive; the revisionist view calls him reckless and self-interested. Khrushchev was humiliated. China's relations with the USSR deteriorated further — they saw Soviet retreat as proof the USSR was no longer truly revolutionary. But the crisis bore fruit: a hotline was established between Washington and Moscow, and the Limited Test Ban Treaty and Nuclear Non-Proliferation Treaty soon followed. The world was more secure — but the arms race escalated."}
  ]
},
cw_policy:{
  title:"How America Fought the Cold War",
  events:[
    {year:"1947–53",text:"Under Truman, the strategy was straightforward: containment. The US would assist any force resisting communism, use military power to protect vulnerable areas, and set up alliances to shield countries from Soviet influence. The Truman Doctrine, Marshall Plan, NATO, and the Korean War intervention were all expressions of this policy. NSC-68 provided the intellectual framework, calling for massive military spending to contain Soviet expansion."},
    {year:"1953–61",text:"Eisenhower inherited containment but transformed it. His 'New Look' policy was built on a key insight: the US couldn't afford to fight limited wars everywhere. Instead, it would rely on the threat of nuclear weapons — what became known as massive retaliation. The idea was simple: make the Soviets understand that any aggression would be met with overwhelming nuclear force, creating mutually assured destruction (MAD). This was cheaper than maintaining huge conventional forces, and it kept the peace through terror."},
    {year:"1953–61",text:"Eisenhower's Secretary of State, John Foster Dulles, advocated 'brinkmanship' — advancing to the very edge of war without crossing it, using nuclear threats to force adversaries to back down. He also proposed 'roll-back' — actually liberating communist countries in Europe through war — though this was never carried out. The CIA became Eisenhower's secret weapon, conducting covert operations to overthrow governments deemed too left-wing, including in Iran and Guatemala. SEATO was established to encircle the Soviet Union in Asia."},
    {year:"Comparison",text:"Both Truman and Eisenhower shared the same goal: stop communism from spreading. Both assisted anti-communist forces and used military power defensively. But where Truman prepared for potential direct confrontation (NSC-68), Eisenhower's New Look specifically avoided it, betting everything on nuclear deterrence and covert operations. Eisenhower expected that if denied opportunities to expand, the Soviet system would eventually collapse on its own — a prediction that would take another 30 years to come true."}
  ]
},
cw_end:{
  title:"The Cold War Ends (1985–1991)",
  events:[
    {year:"Early 1980s",text:"Ronald Reagan entered office with the most hardline anti-Soviet stance in decades. He called the USSR an 'evil empire' and dramatically increased military spending, forcing the Soviets into an arms race they couldn't afford. His Strategic Defence Initiative (SDI) — nicknamed 'Star Wars' — proposed a space-based missile shield that would make Soviet nuclear weapons obsolete. Historians D. Deudney and G.J. Ikenberry argued that SDI brought the arms race to a phase where the USA had a 'decisive technological advantage' — Reagan's military and psychological pressure forced the USSR to abandon expansionism abroad. Whether or not SDI would actually work was almost irrelevant; it undermined the concept of Mutually Assured Destruction and left the USSR terrifyingly vulnerable."},
    {year:"1985",text:"Mikhail Gorbachev came to power in the USSR and everything changed. Unlike his predecessors, Gorbachev recognized that the Soviet system was failing. Under Brezhnev, roughly 25% of GDP had gone to military spending, draining the civilian economy. Gorbachev inherited a declining, exhausted nation. His response was radical: Perestroika (restructuring the economy) and Glasnost (openness to public scrutiny and criticism). For the first time, Soviet citizens could openly discuss what wasn't working — and compare their system to capitalism."},
    {year:"1985–88",text:"Reagan and Gorbachev met at multiple summits. Both men saw the dangers of nuclear weapons — they even discussed the radical 'zero option' of eliminating nuclear weapons entirely. Reagan started with a very hardline position; Gorbachev started by being conciliatory. But both were prepared to reverse their previous positions to reach compromises. The result was the INF Treaty of 1987, eliminating all intermediate-range nuclear weapons from Europe. Reagan proved a better negotiator than anyone expected, willing to set aside his 'evil empire' rhetoric when genuine progress was possible. The personal chemistry between them was a crucial factor — both were determined to reach a conclusion."},
    {year:"1988",text:"Gorbachev abandoned the Brezhnev Doctrine — the policy that the USSR would use force to keep satellite states communist. In its place came what was jokingly called the 'Sinatra Doctrine' (after Frank Sinatra's 'My Way'): Eastern European countries could now choose their own political path. Gorbachev would not send tanks to crush protests. This single decision sealed the fate of the Soviet empire."},
    {year:"1989",text:"The dominoes fell, but this time in reverse. Across Eastern Europe, satellite states erupted in protest. People who had lived under communist rule for 40 years had watched Western living standards through border television and knew what they were missing. State-controlled industries were inefficient, products were shoddy, and shelves were bare. When Gorbachev made clear the Red Army wouldn't intervene, it was the green light. Country after country threw off communist rule. The Berlin Wall fell in November — the most powerful symbol of the Cold War destroyed by ordinary people with hammers."},
    {year:"1991",text:"The Soviet Union itself dissolved. Gorbachev's reforms had unleashed forces he couldn't control — Glasnost allowed criticism that undermined the system, while Perestroika failed to revive the economy fast enough. Capitalism appeared to have triumphed. International politics became 'uni-polar' — the USA was the only superpower left standing. Cuba lost its Soviet subsidies and plunged into the 'Special Period' of severe hardship. African regimes that had depended on Soviet aid collapsed. The Cold War was over."},
    {year:"Legacy",text:"Who ended the Cold War? Reagan's supporters credit his military pressure, which bankrupted the Soviets. Gorbachev's supporters point to his courage in reforming a failing system and choosing peace over force. The truth is that both were essential: Reagan created the pressure, and Gorbachev responded not with escalation but with transformation. Both saw the dangers of nuclear weapons, both worked through summits, and both were willing to reverse their positions. But Gorbachev's impact was larger — his decisions led directly to the collapse of the USSR and the end of the Cold War."}
  ]
},
au_muss_rise:{
  title:"From Chaos to Fascism: Mussolini's Rise (1871–1922)",
  events:[
    {year:"1871–1914",text:"Italy was unified on paper but broken in practice. Parliamentary government was weak — the 1848 Statuto gave the king broad powers, and only 2% of the population could vote. Voter turnout was only about 50% even after reforms, allowing elites to control politics. Corruption was endemic through 'transformism,' where political leaders constantly switched alliances to stay in power — over 30 governments came and went, averaging a new government every 18 months. The north developed industries in textiles, chemicals, and steel — coal output reached 3.6 million tons by 1913 — while the south remained desperately poor and agricultural. Six million Italians emigrated because they saw no future at home. Italy joined the Triple Alliance in 1882 and tried to build an empire — gaining Eritrea (1885), Somalia, and Libya (1911) — but the humiliating defeat at Adowa in 1896 against Ethiopia showed the world that Italy was the weakest of the great powers."},
    {year:"1915–18",text:"Italy entered World War I hoping for territorial rewards. The cost was enormous, and when the peace came, Italy received far less than promised. The 'mutilated victory' at Versailles became a national grievance that poisoned Italian politics for years."},
    {year:"1919–20",text:"Post-war Italy was in crisis. Two million soldiers returned to find no jobs. Prices soared while wages stagnated. The 'Red Biennium' of 1919-1920 saw waves of strikes and factory occupations as workers demanded better conditions. In the countryside, landless peasants seized farms. For the Italian middle class, elites, and business owners, it looked like communist revolution was imminent — and they were terrified."},
    {year:"1919–21",text:"Into this chaos stepped Benito Mussolini. A former socialist journalist who had run the newspaper Avanti! before breaking with the left, he founded the Fasci di Combattimento in 1919. His genius was positioning fascism as the answer to everyone's fears. Using his newspaper Il Popolo d'Italia, he spread nationalism and anti-communism. He adopted Roman symbols like the fasces to project unity and power. His blackshirt squads violently attacked socialists, broke strikes, and destroyed leftist offices — winning the gratitude of industrialists and landowners who funded him. By 1921, a deal with the liberal politician Giolitti gave the Fascists 35 seats in parliament."},
    {year:"Oct 1922",text:"The March on Rome was more theatre than military operation. Mussolini's blackshirts converged on the capital, but the real drama was in the royal palace. King Victor Emmanuel III could have declared martial law and crushed the march, but he feared civil war and doubted the army's loyalty. Instead, he invited Mussolini to form a government. At 39, the former journalist was Prime Minister of Italy. The march was later mythologized through propaganda as a glorious seizure of power, but in truth it was a bluff that worked because the establishment let it."}
  ]
},
au_muss_power:{
  title:"Il Duce: Mussolini's Italy (1922–1943)",
  events:[
    {year:"1922–24",text:"Mussolini was Prime Minister but not yet dictator. He led a coalition government under the existing constitution, with few Fascists in his cabinet. The King retained formal authority as head of state, appointing the prime minister — while Parliament was sidelined and local power rested with appointed podestas (mayors). Mussolini needed support from the King, army, business, and Church, any of whom could remove him. His strategy was dual: legal parliamentary maneuvers to win elite support, combined with street violence to intimidate opponents. The Acerbo Law of 1923 rigged the electoral system — whichever party got 25% of the vote would receive two-thirds of parliamentary seats. It was supported by liberals and Catholics out of fear of Fascist violence, and naive hopes of controlling Mussolini within the system."},
    {year:"Jun 1924",text:"Socialist deputy Giacomo Matteotti publicly denounced Fascist election fraud. Days later, he was kidnapped and murdered by Fascist thugs. The opposition withdrew from parliament in protest — the 'Aventine Secession' — but this backfired. The King and elites chose to back Mussolini over chaos, and the opposition lost its platform."},
    {year:"1925–26",text:"Mussolini moved decisively. He declared a dictatorship, banned all opposition parties, censored the press, created a secret police, and made himself accountable only to the King. As Professor Christopher Duggan noted, the regime focused on Mussolini personally rather than any clear ideology — it was a mix of force, propaganda, and opportunism. The Fascist Grand Council, created in 1923, theoretically advised on policy but in practice rubber-stamped whatever Mussolini decided."},
    {year:"1926–34",text:"The 'Corporate State' organized Italy's economy into 22 sector corporations — each containing employers, workers, and state representatives under Fascist control. The Charter of Labour (1927) formalized this corporatist system, forcing collaboration within corporations as Fascism's supposed solution to class warfare. Unions were banned, strikes outlawed, and class conflict supposedly replaced by national unity. In reality, corporativism overwhelmingly favoured businesses and enforced state dominance over workers. Mussolini called his economic programs 'battles' — the Battle for Grain (food self-sufficiency), the Battle for Births (tax breaks for large families), the Battle for the Lira (currency revaluation through the 'Quota 90' policy). The language of war made economic policy feel heroic, but results were mixed at best. Youth groups like the Balilla were created for indoctrination, while the Institute for Roman Studies glorified ancient Rome and censorship aligned media and arts with Fascist values."},
    {year:"1929",text:"The Lateran Accords with the Catholic Church were perhaps Mussolini's greatest diplomatic achievement. The Church gained Vatican City as an independent state, 750 million lire in compensation for the lost Papal States, Catholicism as Italy's official religion, religious education mandatory in schools, and control over marriages and family law. In return, the Fascists gained the Church's endorsement and control over Church appointments and youth organizations — ending decades of Catholic opposition and winning over millions of traditional rural Italians. The relationship had evolved from initial hostility over anticlericalism and control of youth groups to full alliance, as the Church saw Fascism as a competitive force against communism."},
    {year:"1930s",text:"The Great Depression hit Italy hard. The IRI (Institute for Industrial Reconstruction) nationalized key industries, stabilized banking after the 1930s crash, and fostered growth in heavy industry — steel production rose by 50%. Public works like draining the Pontine Marshes created land reclamation and jobs, while railways and highways boosted employment. The Dopolavoro leisure organization was genuinely popular, providing recreation for ordinary workers, and compulsory education raised literacy rates. But the bigger picture was grim: GDP growth averaged only 1.5% annually, well below pre-war levels. Autarky (self-sufficiency) led to inefficiency and shortages, and reliance on foreign trade contradicted self-sufficiency goals. Class divisions persisted — the South remained poor, women were confined to domestic roles, and war preparation wasted increasingly scarce resources. Mussolini's image as a dynamic, infallible leader was built through propaganda, but by the 1930s, as one assessment put it, the regime became 'rigid and isolated, relying on bluff and lies rather than substance' — Fascism promised revolution but brought little structural change."}
  ]
},
au_peron_rise:{
  title:"The Rise of Perón (1930–1946)",
  events:[
    {year:"1880–1930",text:"Argentina was the success story of Latin America. General Roca subdued Amerindian tribes in Patagonia and crushed Buenos Aires' last insurrection, federalizing the city and building coalitions with the army, governors, and landowners. Built on a booming agricultural export economy — between 1872 and 1895, cultivated land expanded 15-fold in the pampas' agricultural revolution — Buenos Aires transformed into the 'Paris of South America.' The 'so-called oligarchy' was an educated, progressive elite of liberals tied to Social Darwinism, Positivism, landowning interests, and British capital, about 2-3% of the population owning 95% of the land. They lived in French-designed mansions in Barrio Norte. Meanwhile, European immigrants — millions of Italians and Spaniards — lived in crowded conventillos, tenements housing up to 350 people in cramped, poorly ventilated rooms. The gap between rich and poor was enormous, and it was growing."},
    {year:"1930–43",text:"The Great Depression shattered everything. A military coup toppled Argentina's democratic government, beginning what became known as the 'Infamous Decade' — a period of corrupt autocratic rule. Commodity prices collapsed, imports dried up, and people lost faith in the political system. Some industrial development began as Argentina tried to reduce its dependence on imports, but the fundamental problems — inequality, corruption, a broken political system — only deepened."},
    {year:"1943",text:"A military coup brought the GOU (Group of United Officers) to power — a secret lodge of young nationalist, anti-communist, ultra-Catholic officers including Colonel Juan Perón. They aimed to end corruption, restore the constitution, strengthen industry, maintain neutrality in WWII, and prevent communist infiltration of the working class. Crucially, they believed that improving workers' conditions from above would prevent communism from spreading from below — a strategy that would define Perón's entire political career."},
    {year:"1943–45",text:"Perón was appointed head of the Labour Department, which soon became the Secretary of Labour and Welfare. It was the perfect platform. He used the position to implement real reforms — paid vacations, severance pay, minimum wages, pensions — that directly improved millions of workers' lives. The genius of Perón's approach was that he made unions dependent on him personally. Workers understood that if Perón fell, their new rights might disappear with him. His experiences in Europe had taught him well — he admired Mussolini's organizational methods and learned practical ways to control and mobilize the masses."},
    {year:"9–17 Oct 1945",text:"Perón's growing power alarmed the military establishment and industrial elites. On 9 October, they had him arrested. But they underestimated what he had built. Eight days later, on 17 October 1945, a massive spontaneous demonstration of workers filled the streets of Buenos Aires demanding Perón's release. It was the awakening of Argentina's working-class political consciousness — a moment that changed the country forever. Perón was released, and the path to the presidency was open."},
    {year:"Feb 1946",text:"Perón won a decisive election victory. His coalition took all national senators except two, a two-thirds majority in the Chamber of Deputies, and every provincial governorship but one. The mandate was overwhelming, but Perón knew his position was still not fully secure — he lacked complete endorsement from all sectors of the armed forces and the civilian establishment."}
  ]
},
au_peron_power:{
  title:"Perón in Power (1946–1955)",
  events:[
    {year:"1946–47",text:"Perón moved swiftly to consolidate control. He dissolved all the parties that had supported his campaign and replaced them with a single party under his personal command — the Partido Justicialista. He purged the Supreme Court by impeaching three justices and appointing loyal replacements. The Secretariat of Information was established to control media; between 1943 and 1946, 110 publications were forced to close through fake inspections and disrupted paper supplies. Civil servants were required to join the Peronist Party. Criminal laws against dissent were passed, and participants in illegal strikes were punished. Opposition existed in name, but Radical leaders were expelled or jailed, and police disrupted opposition meetings."},
    {year:"1946–49",text:"Economically, Perón nationalized everything he could: the Central Bank (1946), railways, telecommunications, and foreign trade through the IAPI (Argentine Institute for Promotion of Trade) monopoly on exports. He pursued Import Substitution Industrialization (ISI), protecting domestic industries with tariffs and subsidies while using grain export profits to fund urban industrialization. Wages rose with minimum wages and annual bonuses implemented, prices were controlled, rents were frozen, and subsidized bakeries and utilities made life tangibly better for the working class. His corporatist system maintained capitalism under state oversight, mirroring Mussolini's Charter of Labour (1927) which regulated labour and capital to reduce extreme wealth disparities. It was a purely statist policy — the government dominated every aspect of economic life."},
    {year:"Late 1940s",text:"Eva Perón became the emotional face of the regime. Through the Eva Perón Foundation (FEP) — which surpassed most government ministries in size, with assets exceeding $200 million and 14,000 employees — she personally delivered goods to the poor, attended to families, and built low-cost homes and free hospitals for the working class. Visual propaganda portrayed Perón and Evita as saviours of the working class, with Evita depicted personally attending to families while buried in paperwork, embodying her inexhaustible, hands-on engagement. Her autobiographical manifesto 'La razón de mi vida' (1951) glorified Peronism and defined women's role as loyal supporters of Perón within the home. The FEP was a tool of political control as much as charity, but its impact on the lives of ordinary Argentines was real."},
    {year:"1949",text:"The 1949 Constitution allowed presidential re-election, nationalized public services and energy sources, enabled state intervention in trade, and emphasized social rights and state-protected family institutions. New textbooks conveyed Peronist messages through nationalist rhetoric with no criticism allowed. Teachers were required to transmit Peronist doctrine. Media was state-controlled through the Secretariat of Information, rallies were staged with massive attendance, and official radio was used to counter critical editorials."},
    {year:"1951",text:"The economy began to turn. Inflation rose, shortages appeared, and the easy gains of the early years evaporated. In 1951, Perón shut down La Prensa, one of Argentina's most prestigious newspapers, using official radio to counter its editorials before reopening it under pro-Perón direction. The regime's authoritarianism was becoming harder to disguise."},
    {year:"1955",text:"Economic decline after 1951 brought inflation and shortages that hurt workers, the middle class, and landowners alike. The Church, armed forces, and political parties — all alienated by Perón's authoritarianism and the cult of Eva (who had died in 1952) — formed an opposition coalition. Perón attacked the Church and repressed remaining freedoms. After a bombing of the presidential palace in June 1955, a military coup on 16 September overthrew him. Perón fled into exile, not returning until 1973."}
  ]
},
au_castro_rise:{
  title:"Revolution in Cuba (1952–1959)",
  events:[
    {year:"Before 1952",text:"Cuba was a paradox: high per capita income but deep inequality. The economy was a sugar-dominated monoculture, with US companies like United Fruit, Esso, and Texaco controlling key sectors. The Platt Amendment (1901-1934) had granted America the right to intervene in Cuba's internal affairs and secured the Guantánamo naval base, creating a semi-colonial relationship. As historian Hugh Thomas noted, Cuban nationalism was defined as anti-Americanism due to this long and ambiguous association — the US had secured Cuba's independence from Spain in 1898 but then limited its sovereignty through multiple interventions. José Martí — the poet, journalist, and revolutionary who launched Cuba's 1895 independence war — remained the national hero whose ideals Castro would later claim to embody."},
    {year:"1940s–50s",text:"American organized crime, led by Meyer Lansky, turned Havana into a 'Latin Las Vegas' of casinos, nightclubs, and vice — the mob essentially ran the entertainment economy. Batista's first term (1940-44) had been relatively populist, but after his 1952 military coup — overthrowing the elected government after a period of retirement — 'the second Batista' was lazy and corrupt. Driven by election fears and army demands, he failed to curb corruption while engaging in it himself. Unemployment hit 17%, rural poverty was extreme, and 200,000 peasant families had no land at all."},
    {year:"26 Jul 1953",text:"Fidel Castro, a young lawyer who had been running for Congress when Batista's coup cancelled elections, turned to armed revolution. His attack on the Moncada barracks with 140 rebels was meant to seize weapons and spark a nationwide uprising. It failed catastrophically — most attackers were killed or captured. But Castro's trial speech, 'History Will Absolve Me,' identified Cuba's crises with statistics and specific reform promises, transforming a courtroom defense into a revolutionary manifesto. The 26th of July Movement was born."},
    {year:"Dec 1956",text:"After exile in Mexico, Castro returned aboard the overloaded yacht Granma with about 80 armed rebels. Everything went wrong — delays, mechanical failures, a swamp landing that cost them their supplies, then a devastating ambush at Alegría de Pío. Only 12 survivors regrouped in the Sierra Maestra mountains. Among them were Raúl Castro, Che Guevara (an Argentine doctor who had joined in Mexico), and Camilo Cienfuegos."},
    {year:"1957–58",text:"From the Sierra Maestra, the rebels waged guerrilla warfare on their own terms — fighting on familiar, rugged terrain with unpaid but ideologically motivated soldiers who treated captured enemies humanely. Women like Vilma Espín, Haydée Santamaría, and Celia Sánchez played crucial roles in urban coordination, arms smuggling, and propaganda. The 26th of July Movement used bombings, sabotage of power infrastructure, and assassinations to destabilize Batista's regime. Castro's image as an approachable leader connected to the peasantry won him cross-class support."},
    {year:"1958–59",text:"Batista's own brutality sealed his fate. Mass torture and killings after Moncada and Granma had alienated the population. His army, demoralized and corrupt, began to crumble. In 1957, the US imposed an arms embargo after discovering Batista was misusing weapons meant for hemispheric defense. By late 1958, the question was not whether Batista would fall but when. On January 1, 1959, he fled. Castro and Cienfuegos entered Havana in triumph — signaling the end of tyranny and the dawn of a new Cuba."}
  ]
},
au_castro_power:{
  title:"Castro's Cuba (1959–Present)",
  events:[
    {year:"1959–60",text:"Castro moved fast. He removed Batista supporters and liberals from government, crushed revolts in the provinces, and implemented radical reforms. The Agrarian Reform redistributed land until the state owned 70% by 1963. Foreign businesses, sugar mills, and banks were nationalized. Rents were cut 50%, then later abolished entirely. When revolutionary commander Huber Matos criticized the growing communist influence, he was arrested for treason and sentenced to 20 years in a show trial — demonstrating that dissent, even from revolutionary heroes, would not be tolerated."},
    {year:"1960–61",text:"US-Cuba relations deteriorated rapidly as nationalization of American property provoked Washington. A commercial embargo was imposed, diplomatic relations broken, and the CIA planned an invasion. The Committees for the Defence of the Revolution (CDRs) were established — surveillance committees in every workplace and neighborhood block, with a third of the population enrolled by 1963. The literacy campaign of 1961 deployed 170,000 teachers to rural areas, dropping illiteracy from 23% to 4% — more schools were built in three years than in the previous 58. But education also became a tool for ideological formation."},
    {year:"Apr 1961",text:"The Bay of Pigs invasion was a humiliating American defeat and a propaganda triumph for Castro. It validated his warnings about US imperialism, rallied the population behind the revolution, and justified crackdowns on internal opposition. It accelerated Cuba's embrace of the USSR — Soviet economic aid, oil, machinery, and military equipment began flowing in."},
    {year:"Dec 1961",text:"Castro publicly declared himself a Marxist-Leninist — a dramatic reversal from February 1959, when he had explicitly denied it: 'the thinking of the movement is not communist thinking.' He had presented the revolution as nationalist and democratic, staying deliberately vague about ideology. The shift was partly pragmatic: US hostility (embargo, Bay of Pigs) forced him to seek Soviet protection, and Soviet aid required ideological alignment. Liberals and moderates had been removed; the PSP (Communist Party) dominated government. The Bay of Pigs victory emboldened him — no reason to maintain ambiguity anymore. Che Guevara's influence pushed toward a vision of the 'new man' who works for collective good rather than personal gain, where individuals should feel 'more complete, with much more internal richness' — an inspiring but ultimately impractical ideal that led to absenteeism and low productivity."},
    {year:"1962",text:"The Cuban Missile Crisis showed Cuba was a pawn in superpower politics. The Soviets removed their missiles without consulting Castro — a bitter disappointment. But the US promise not to invade secured Cuba's survival, and Soviet subsidies continued for nearly three decades."},
    {year:"1960s–70s",text:"Castro's Cuba became a one-party state with total media control since the 1960s. Castro's speeches — long, passionate, instructing — were broadcast constantly. Every policy was framed in military language: harvests were 'battles,' plans were 'liberation campaigns.' ICAIC (the film institute, 1959) and UNEAC (writers/artists union) were created to control cultural production — the film PM was censored in 1961 for showing 'decadent' Afro-Cuban dancing. Castro's 'Words to the Intellectuals' speech declared: 'Within the Revolution, everything; against the Revolution, nothing.' The UMAP camps (1965-68) sent 25,000 people — dissidents, homosexuals, religious objectors, youth imitating US culture — to forced labour. The Padilla Affair in 1971, when a poet was arrested, tortured, and forced into public confession for critical poetry, launched the 'grey years' where artists feared creating anything potentially counter-revolutionary. Afro-Cubans (~50% of the population) faced pre-revolution discrimination; the revolution claimed to eradicate racial inequality, but very few non-whites held positions of power within the PCC or government."},
    {year:"1980",text:"The Mariel Boatlift revealed the regime's cracks. Over 125,000 Cubans fled via the port of Mariel. Castro used emigration as a safety valve — releasing prisoners and mentally ill people onto the boats and calling all emigrants 'scum.' It was repressive but pragmatic: letting dissatisfied people leave prevented the pressure from building to revolution."},
    {year:"1991–",text:"The collapse of the USSR was catastrophic. Soviet trade, subsidies, oil, and technicians all vanished overnight. Castro declared 'a special period in peacetime.' Severe food shortages, energy crises, and disease followed. In response, Cuba opened to foreign investment and tourism, legalized the US dollar (1993), allowed limited self-employment, and converted state farms to cooperatives. The revolution survived through adaptation — but the pure socialist vision was gone."}
  ]
},
rc_islamic:{
  title:"When the Moors Ruled Iberia (711–1492)",
  events:[
    {year:"711",text:"The Muslim conquest of Iberia was shockingly easy — despite the difficult conquest of North Africa, where Berber resistance and internal Muslim divisions had slowed progress for decades (revealing a divided but goal-driven Muslim world). Our knowledge of the conquest is limited: no contemporary Arabic accounts survive, and later sources focus more on interesting stories than careful ordering of events. Tariq ibn Ziyad crossed the Strait of Gibraltar with approximately 7,000 men, mostly Berber troops. Roderick, the last Gothic king, had a far larger army of 20,000 to 40,000 men — but he was in the north fighting a Basque rebellion when Tariq crossed. By the time Roderick marched south, it was too late. Historians debate the reasons for success: collaboration with local populations, including Jews and disaffected Christians who saw Muslims as liberators from Visigothic oppression, along with Gothic internal power struggles over the kingship, fatally weakened them. Within a few years, the Moors controlled nearly the entire peninsula."},
    {year:"756–1031",text:"The Iberian Peninsula became the westernmost tip of the Umayyad Caliphate of Damascus. When the Umayyads were overthrown by the Abbasids in 750, a survivor — Abd ar-Rahman I — fled to al-Andalus, seized power in 756, and proclaimed himself emir. He founded an independent dynasty that survived until the 11th century, distancing al-Andalus from the Abbasid Caliphs in Baghdad. Under this independent Umayyad rule, Córdoba became one of the largest and most sophisticated cities in Europe — a German visitor in the 10th century called it 'the ornament of the world.'"},
    {year:"8th–10th C",text:"Al-Andalus became one of the most advanced civilizations in the world. The Moors introduced new irrigation and water-lifting devices, new crops (sugar, cotton, silk), paper, and glass. They rebuilt Córdoba and introduced new irrigation technology; their trade network brought new fruit and grew agriculture, allowing the city to amass huge wealth. The Great Mosque of Córdoba combined Islamic and later Christian elements in a stunning architectural testament. Architecture (the Alhambra used Pythagorean geometry in its ground plan), mathematics (algebra, the zero), medicine, and philosophy (translations of Aristotle) all flourished. The transfer of knowledge from Islamic Spain to Christian Europe was so significant that without it, the Renaissance might never have happened."},
    {year:"Reality",text:"The 'La Convivencia' — the idea of religious harmony between Muslims, Christians, and Jews — was real but complicated. Non-Muslims were treated better than most conquered peoples: they weren't confined to ghettos, weren't slaves, could practice their faith and earn a living. But they had to acknowledge Islamic superiority, pay extra taxes (jizya), wear a special badge, couldn't carry weapons, and couldn't marry Muslim women. Bernard Lewis called it a 'golden age'; David Nirenberg argued violence was 'central and systematic' — the 1066 massacre of Jews in Granada being a stark example. Oppression increased over time."},
    {year:"1031–1212",text:"The Caliphate collapsed into numerous taifas — small, competing kingdoms that were individually weak. The Christian kingdoms exploited this fragmentation. Twice, North African warriors were called in: the Almoravids in 1086 (after the fall of Toledo) and the Almohads in 1147 (after the fall of Lisbon). Both temporarily restored Muslim military strength, but internal rebellions in 1144-45 shattered any remaining unity. The Battle of Las Navas de Tolosa in 1212 — a coalition of Christian kingdoms defeating Muslim forces — broke Muslim military power permanently. Córdoba and Seville fell soon after."},
    {year:"1252–1492",text:"By 1252, the Kingdom of Granada was the only remaining Muslim state — ruled by the Nasrid dynasty as a tributary vassal of Castile, paying tribute mostly in gold. The Alhambra palace complex was built during this period. Bettany Hughes's documentary revealed that the Moorish period 'has been systematically written out of history' — around 300,000 Muslims were expelled after the fall of Granada and approximately 1 million books were burned. The image of Moors as 'barbaric, savage, uncivilized' has persisted since the Crusades, despite their extraordinary cultural and scientific achievements."}
  ]
},
rc_reconquest:{
  title:"The Reconquest and Spain's Transformation",
  events:[
    {year:"9th C",text:"The discovery of St. James's tomb in northwestern Spain gave the Christian kingdoms a warrior patron saint and a rallying cry. The Reconquest became not just a military campaign but a crusade. War became almost a Castilian way of life, creating a large class of warrior-nobles (hidalgos) who regarded manual labour with contempt. Because constant warfare made farmland vulnerable, mobile property like sheep was favoured over agriculture — the powerful Mesta guild dominated the economy. 'The frontier wars against the Moors had bred a race of gentlemen proud of their Christian blood but without a penny, whose one resource was to go to the wars.'"},
    {year:"1212",text:"The Battle of Las Navas de Tolosa was the decisive turning point — a coalition of Christian kingdoms defeated Muslim forces, breaking Muslim military power permanently. Soon after, Córdoba and Seville fell to Christian armies. By 1252, the only remaining Muslim state was the Kingdom of Granada. Christian kingdoms were dominant but divided: Castile was ruled by powerful land-holding nobles, while Aragon was governed by merchants who gained power through Mediterranean trade. In the early Reconquest, political opportunism was rampant — the legendary El Cid fought for both Christian and Muslim rulers."},
    {year:"1232–1391",text:"The Nasrid Kingdom of Granada survived by diplomacy, not strength. 'Its foundation was laid by consent, not force' — Muhammad I agreed to become Castile's tributary vassal in 1232, paying tribute in gold and offering military support. Castilian kings often preferred the tribute revenue over the expense of conquest. During the 'golden years' (1333-91), rulers Yusuf I and Muhammad V maintained peace through diplomacy while silk trade and North African commerce brought wealth. Muhammad V adorned the Alhambra with stucco, tiles, and poetry — using Pythagorean geometry in its design. In 1406, Granada even supplied troops for a joint operation with Castile against the Marinids. But in the early 15th century, stability eroded as Nasrid rulers faced rebellions by kin, leading to coups and assassinations. Externally, Castile's 1410 capture of Antequera showed growing Christian power, though Castilian disunity under John II often delayed further attacks. Granada survived by exploiting Christian rivalries and paying tribute, but its borders shrank."},
    {year:"1450s–60s",text:"External events accelerated the collapse. The Ottoman capture of Constantinople (1453) revived crusading interest across Europe and sharpened Christian-Muslim identities. At the court of Enrique IV of Castile, Islamophile tastes (Mudéjar arts, Muslim customs) provoked a reaction — the Sentence of Medina del Campo (1465) ended Muslim toleration in Castile. Meanwhile, Portugal opened direct sea trade routes to Sub-Saharan Africa, bypassing Granada and weakening its Genoese banking connections. Granada's economic and strategic importance was fading."},
    {year:"1469–92",text:"The marriage of Ferdinand and Isabella (1469) created a unified Christian force. But modern historians criticize them for favouring the aristocracy — by 1500, about 2-3% owned 95% of the land, 80% were impoverished peasants, and Spain's industry never reached England's level. Christian noble rivalries sometimes outweighed Holy War: in 1471, the Duke of Medina Sidonia's capture of Alhama sparked jealousy from the Marquess of Cádiz, delaying broader Christian momentum."},
    {year:"1482–1492",text:"Boabdil's rebellion against his father Abu'l-Hasan Ali in 1482 was the fatal blow — he allied with Castile, splitting Granada's forces when unity was essential. Ferdinand and Isabella systematically conquered key towns: Ronda (1485), Málaga (1487), then besieged Granada itself. 'As so often in the 15th century, Granada showed it could defend itself against outside attack but not against internal dissension.' When Boabdil surrendered, his mother allegedly said: 'Do not cry as a woman over what you could not defend like a man.' Three world-changing events in 1492: the fall of Granada, the expulsion of the Jews, and Columbus's voyage."}
  ]
},
rc_expulsions:{
  title:"Purging the Peninsula: The Expulsions (1478–1609)",
  events:[
    {year:"1478",text:"The Spanish Inquisition was established by Ferdinand and Isabella with a singular purpose: ensure religious orthodoxy in the newly unified kingdom. Its primary targets were conversos — Jews and Muslims who had converted to Christianity, often under pressure, but were suspected of secretly practicing their former religions. The ideology of 'limpieza de sangre' (purity of blood) took hold, demanding a Spain purified of all non-Christian elements."},
    {year:"1491",text:"The Treaty of Granada, signed on November 25, 1491 between Boabdil and Ferdinand and Isabella, formally ended the Reconquista by securing the surrender of the Emirate of Granada. Also known as the Capitulations of Granada, it promised Muslims the preservation of their mosques and religious institutions, the use of their language, and the right to follow their own laws and customs — the first four articles practically stated that Muslims should keep their religious freedom and not lose their livelihood. It seemed like a generous peace designed to integrate the Muslim population. It would prove to be a lie — its promises were undermined within a decade."},
    {year:"1492",text:"The Edict of Expulsion of the Jews gave Spain's Jewish population an impossible choice: convert to Christianity or leave. The monarchs argued that previous measures had failed. In reality, the Jews were a dynamic economic force: dominant in trade, finance, tax collection, and medicine. Their expulsion crippled Spain at the exact moment it was gaining a global empire — the empire was born 'half-crippled.'"},
    {year:"1499–1500",text:"Cardinal Cisneros, Isabella's confessor, organized mass conversions and ordered the burning of over 5,000 priceless Muslim manuscripts in Arabic. When one of his agents was assassinated, the crown revoked the Treaty of Granada's promises. Muslims now faced exile or baptism. This triggered the First Rebellion of the Alpujarras."},
    {year:"1567",text:"Philip II banned Arabic language, Islamic religion, dress, and customs — attempting to erase Moorish identity. The Second Rebellion of the Alpujarras followed. Don John's forces razed Galera: salt sprinkled over the ruins, 2,500 slaughtered including 400 women and children. Moriscos who outwardly conformed secretly maintained their festivals and rituals — a defiance Old Christians found deeply offensive."},
    {year:"4 Apr 1609",text:"Philip III signed the final expulsion decree for the Moriscos. Beginning October 1609, converted Muslims were driven from Spain, mostly to the Maghrib coast. Their numbers had been growing, some had become successful merchants, and their refusal to abandon their cultural identity made them permanent outsiders. Spain completed the religious purification begun over a century earlier — and lost yet another community of skilled citizens it could not afford to lose."}
  ]
},
rc_mexico:{
  title:"The Fall of the Aztecs (1519–1521)",
  events:[
    {year:"Before 1519",text:"The Aztec people had migrated from Chicomoztoc ('Place of Seven Caves') and Aztlan — the origin of the name 'Aztec.' After a long migration, they founded Tenochtitlán in 1325 on an island in Lake Texcoco, where they saw their prophesied sign: an eagle perched on a cactus devouring a serpent (still on Mexico's flag today). By 1519, Tenochtitlán was one of the great cities of the world — built on a salt lake, home to at least 250,000 people, with wide streets that were half land and half canals. Its marketplace hosted 60,000 traders daily. Forty towers, some taller than Seville's cathedral, rose above the city."},
    {year:"1517–18",text:"The first Spanish expeditions discovered the riches of mainland Mexico. Hernández de Córdoba (1517) reached the Yucatán but was mortally wounded by fierce Maya resistance. Grijalva's follow-up expedition discovered Cozumel, traded with locals, and heard rumors of the Aztec Empire's vast wealth through Moctezuma's emissaries. These reports confirmed that the mainland held far greater riches than the Caribbean islands — setting the stage for Cortés's unauthorized expedition."},
    {year:"Feb 1519",text:"Hernán Cortés sailed from Cuba with permission from Governor Velázquez to explore and trade — but explicitly not to colonize. His appointment was partly engineered by Amador de Lares (Velázquez's contador) and the merchant Andrés de Duero, who entered into a partnership with Cortés and used their money and influence to secure his command. Cortés, who had enrolled in the law faculty of the University of Salamanca at age 14, knew exactly what he was doing when he exceeded his authority. His legal training would prove as important as his military skill — every letter to King Charles V was a carefully crafted argument for why his unauthorized conquest should be legitimized, giving him a more legitimate claim to become a service nobility."},
    {year:"1519",text:"Two factors converged to doom the Aztecs: myth and weaponry. The Aztecs had observed omens foretelling the arrival of strangers — a pillar of fire in the sky, the Temple of Huitzilopochtli struck by lightning (interpreted as their protective deity abandoning them). The year 1519 corresponded to the prophesied return of Quetzalcoatl — the feathered serpent god, described as fair-skinned and bearded, arriving from the east. Cortés matched the description. Additionally, the Spanish brought steel swords, armor, guns, and horses — none of which the Aztecs had ever seen. They also brought a translator who changed history: Malintzin (La Malinche), one of 20 enslaved women given to Cortés by a Mayan lord in Tabasco after a battle. Fluent in Nahuatl and Mayan, she became Cortés's interpreter, advisor, and the key to communicating with Aztec emissaries and recruiting allies like the Tlaxcalans."},
    {year:"Nov 1519",text:"Cortés entered Tenochtitlán via the Iztapalapa Causeway. Bernal Díaz del Castillo, a common soldier whose memoir provides the rawest account of the conquest, described his awe at the city's beauty — the crowded lake full of canoes, causeways with bridges, towers and shrines of masonry. Cortés attempted to embrace Moctezuma but was stopped by the lords. He placed a necklace of pearls and cut glass around Moctezuma's neck. Two worlds had met."},
    {year:"1520",text:"The Spanish massacred Aztec nobles during a festival, sparking a revolt that drove Cortés out during the 'Noche Triste' (Night of Sorrows) via the Tacuba Causeway. Moctezuma died during the fighting — Cortés claimed he was killed by his own people with arrows and stones; Bernal Díaz said a single stone strike killed him. The Aztecs' ritualistic approach to war — prioritizing live capture over killing — had prevented them from destroying the Spanish when they had the chance."},
    {year:"Aug 1521",text:"Cortés returned with Tlaxcalan allies and laid siege to Tenochtitlán. After months of brutal fighting, disease (smallpox had devastated the defenders), and starvation, the city fell on August 13, 1521. The Broken Spears — a collection of indigenous accounts using surviving codices — records these events from the perspective of the conquered, preserving what the conquerors' accounts leave out."}
  ]
},
rc_peru:{
  title:"The Conquest of the Inca Empire (1532–1548)",
  events:[
    {year:"Before 1532",text:"The Inca Empire — Tawantinsuyu, the 'Four Quarters' — was the largest in pre-Columbian America, stretching from Ecuador to Chile. Over 25,000 miles of roads connected it. The Sapa Inca ruled as a divine descendant of the sun god Inti. There was no writing (records were kept on quipus), no money (a labor tax system instead), and no slavery as Europeans understood it. They mastered high-altitude farming with terraced fields and irrigation. Their army fielded tens of thousands of warriors — but armed with slings, clubs, and bronze weapons, not steel."},
    {year:"c.1528–32",text:"Before a single Spaniard arrived, smallpox — brought by earlier European contact — swept through the empire. Emperor Huayna Capac died, and a devastating civil war erupted between his sons Atahualpa (who controlled the north) and Huáscar (who held the south). This internal conflict divided loyalties, depleted resources, and left the empire fragmented. It was into this chaos that Francisco Pizarro marched."},
    {year:"Nov 1532",text:"At Cajamarca, history's most audacious ambush unfolded. Pizarro — an illiterate soldier of fortune from Extremadura, Spain's poorest region — lured Atahualpa into the town's plaza for a meeting. Atahualpa arrived with a large, mostly unarmed entourage, suggesting curiosity or a show of power rather than aggression. Fray Valverde delivered a religious ultimatum demanding the Inca accept Christianity and submit to Spanish rule, presenting a Bible — but the interpreter Felipillo's poor translation distorted the speech's meaning, contributing to the misunderstanding and violence. When Atahualpa discarded the Bible, Valverde signaled the attack. With cannons, cavalry, and steel, 168 Spaniards slaughtered thousands of lightly armed Incas and captured the emperor."},
    {year:"1532–33",text:"Atahualpa offered an extraordinary ransom — enough gold to fill a room — and Huáscar tried to match it. The Spanish took both offers and then executed Atahualpa anyway, after a mock trial on charges of rebellion. He was garroted in Cajamarca's plaza after accepting baptism — sources broadly agree on strangulation, though details vary."},
    {year:"1533–41",text:"Post-conquest Peru descended into chaos that revealed the true nature of the conquistadors. Pizarro installed Manco as a puppet Inca ruler, but Manco rebelled in 1536 with a massive insurrection. Then Pizarro and his former partner Diego de Almagro turned on each other over control of Cusco. Almagro was strangled in 1538; his embittered followers assassinated Pizarro in 1541. The conquistadors were driven by personal gain — wealth, land, and power — not loyalty to Spain."},
    {year:"1544–48",text:"When Viceroy Blasco Núñez Vela arrived to enforce the New Laws (which restricted the encomienda system), the settlers revolted. Gonzalo Pizarro — Francisco's half-brother — killed the viceroy and briefly ruled Peru until he was defeated by Pedro de la Gasca in 1548. The Spanish bureaucrat Agustín de Zárate, who served as an auditor in Peru from 1543, later wrote his Historia del descubrimiento y conquista del Perú — but faced threats from Gonzalo Pizarro's men during the rebellion and could not write safely in Peru itself. The Crown learned that its conquistadors were as dangerous as its enemies, and began replacing them with professional administrators."},
    {year:"How?",text:"How did a handful of Spaniards conquer two empires? Five factors combined: superior military technology (steel, guns, horses); indigenous alliances (the Tlaxcalans against the Aztecs, rival Inca factions against Atahualpa); disease (smallpox devastated both empires before full-scale fighting); centralized rule (capturing the divine emperor paralyzed the entire system); and religious/cultural misunderstandings that the Spanish ruthlessly exploited. Remove any single factor, and the conquest might have failed."}
  ]
},
rc_colonial:{
  title:"God, Gold, and Glory: Colonial Systems",
  events:[
    {year:"Connection",text:"The Conquest of the Americas was a direct continuation of the Reconquest in Iberia. Centuries of warfare against the Moors had bred a warrior aristocracy in Extremadura and Castile — men proud of their Christian blood but without a penny, whose one resource was to go to the wars. Their poverty, coupled with a warrior ethos forged in anti-Moorish campaigns, drove them to the New World, where conquest offered wealth and status unavailable in Spain. When the Reconquista ended in 1492, these men turned to the New World, carrying the same trinity of motives: God, Gold, and Glory. Cortés explicitly compared indigenous architecture to Granada. As Carlos Fuentes wrote in The Buried Mirror, 'America was not discovered, it was invented' — the Spanish didn't just map or claim land, they dismantled empires and rebuilt them into colonial domains."},
    {year:"Early 1500s",text:"The Encomienda system became the backbone of colonial exploitation. Spanish settlers (encomenderos) were granted authority over groups of indigenous people, who were required to provide labour, tribute, or goods in exchange for supposed protection and Christian instruction. It wasn't legally slavery, but in practice the distinction was often meaningless. The Mita system in the Andes went further — requiring indigenous communities to provide workers for mines, plantations, or public projects in rotational shifts that frequently led to forced displacement and death."},
    {year:"1502–14",text:"Bartolomé de Las Casas arrived in the New World as a colonist and encomendero. But in 1514, witnessing the atrocities firsthand and hearing a sermon denouncing the encomienda system, he underwent a dramatic conversion. He renounced his wealth, became a Dominican friar, and dedicated his life to defending indigenous peoples. His 'Short Account of the Destruction of the Indies' (1542) documented colonial horrors with vivid detail."},
    {year:"1542–43",text:"Las Casas's advocacy influenced the New Laws, enacted under Emperor Charles V. Encomiendas couldn't be inherited. Indigenous enslavement was banned. Labour burdens were to be reduced. But enforcement was another matter — in Peru, Gonzalo Pizarro led a full rebellion against the laws, killing the viceroy. The Crown was forced to weaken enforcement, revealing the limits of reform when those profiting from exploitation had armies."},
    {year:"1550–51",text:"The Valladolid Debate was the intellectual climax of the colonial moral crisis. Juan Ginés de Sepúlveda argued that indigenous peoples were 'natural slaves' who could be rightfully conquered and forcibly converted. Las Casas countered that they were rational humans with inherent rights, deserving of peaceful evangelization. Sepúlveda was backed by colonial elites; Las Casas by Dominican and Franciscan missionaries and parts of the Crown. The debate had no clear winner, but Las Casas's arguments planted seeds that would grow into modern human rights discourse."},
    {year:"Legacy",text:"Las Casas's writings, ironically, also fueled the 'Black Legend' — a narrative of unique Spanish cruelty that Spain's rivals (England, Netherlands) translated and spread as anti-Spanish propaganda, depicting Spaniards as barbaric and fanatical despite Las Casas's reformist intent. The Church's role was equally complex: elite friars driven by genuine missionary zeal arrived alongside conquistadors, some envisioning utopian indigenous communities. Vasco de Quiroga and Las Casas admired indigenous simplicity. Las Casas is considered a significant historical precursor to Latin American Liberation Theology — the 20th-century theological movement emphasizing social justice and advocating for the poor, with theologians like Gutiérrez citing Las Casas as an early example of Christian commitment to defending the oppressed. But these reformist attitudes always clashed with the encomenderos' profit motive. As Louise Burkhart observed, indigenous peoples found ways to become 'just Christian enough to get by' — the Day of the Dead, merging Aztec death rituals honouring Mictecacihuatl (the goddess of death) with All Saints' Day, survives as living proof that the conquered were never fully conquered."}
  ]
}

// ─── SRS INTERVALS (short-term first) ───
const SRS_INTERVALS=[
  2*60*1000,5*60*1000,15*60*1000,60*60*1000,4*3600000,12*3600000,
  86400000,3*86400000,7*86400000,14*86400000,30*86400000
];
const SRS_LABELS=['2m','5m','15m','1h','4h','12h','1d','3d','1w','2w','1mo'];

function formatCountdown(ms){
  if(ms<=0)return'now';const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);
  if(d>0)return`${d}d ${h%24}h`;if(h>0)return`${h}h ${m%60}m`;if(m>0)return`${m}m ${s%60}s`;return`${s}s`;
}

// ─── STATS STORE — subtopic SRS ───
function createStatsStore(){
  const KEY='ib_history_sl_stats_v3';
  let data;try{data=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){data={}}
  if(!data.attempts)data.attempts=[];if(!data.srs)data.srs={};
  if(!data.totalSessions)data.totalSessions=0;if(!data.firstOpened)data.firstOpened=Date.now();
  data.totalSessions++;
  const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(data))}catch(e){}};
  let _pt=null;
  const saveAndSync=()=>{save();if(CloudSync.isConfigured()){clearTimeout(_pt);_pt=setTimeout(()=>CloudSync.push(data),2000)}};
  save();
  return{
    record(cat,mode,score,total,detail){data.attempts.push({cat,mode,score,total,detail,ts:Date.now()});saveAndSync()},
    updateSubtopicSrs(catId,score,total){
      const ratio=score/Math.max(total,1);
      let c=data.srs[catId]||{level:0,next:0,streak:0,lastReview:0,totalReviews:0};
      c.lastReview=Date.now();c.totalReviews++;
      if(ratio>=0.6){c.streak++;c.level=Math.min(c.level+1,SRS_INTERVALS.length-1)}
      else{c.streak=0;c.level=Math.max(0,c.level-2)}
      c.next=Date.now()+SRS_INTERVALS[c.level];
      data.srs[catId]=c;saveAndSync();
    },
    getSrs(catId){return data.srs[catId]||null},
    getAllSrs(){return data.srs},
    getDueCats(){const now=Date.now();return Object.entries(data.srs).filter(([,v])=>v.next<=now).map(([k])=>k)},
    getSubtopicProf(catId){
      const a=data.attempts.filter(x=>x.cat===catId);if(!a.length)return 0;
      return Math.round(a.slice(-5).reduce((s,x)=>s+x.score/x.total,0)/Math.min(a.length,5)*100);
    },
    getGrade(catId){
      const p=this.getSubtopicProf(catId);
      if(p>=90)return{g:'A',c:'var(--green)',l:'Excellent'};if(p>=75)return{g:'B',c:'#86efac',l:'Strong'};
      if(p>=60)return{g:'C',c:'var(--accent2)',l:'Okay'};if(p>=40)return{g:'D',c:'var(--orange)',l:'Needs Work'};
      if(p>0)return{g:'E',c:'var(--red)',l:'Weak'};return{g:'—',c:'var(--text3)',l:'New'};
    },
    proficiency(){
      const cats=Object.keys(CATEGORIES);
      const sc=cats.map(c=>{const a=data.attempts.filter(x=>x.cat===c);return a.length?a.reduce((s,x)=>s+x.score/x.total,0)/a.length:0});
      const acc=sc.reduce((s,v)=>s+v,0)/cats.length;
      const cov=cats.filter(c=>data.attempts.some(x=>x.cat===c)).length/cats.length;
      const rec=data.attempts.slice(-10),old=data.attempts.slice(-20,-10);
      const rA=rec.length?rec.reduce((s,x)=>s+x.score/x.total,0)/rec.length:0;
      const oA=old.length?old.reduce((s,x)=>s+x.score/x.total,0)/old.length:rA;
      return Math.round((acc*.45+cov*.25+(.5+.5*(rA-oA))*.15+Math.min(1,data.attempts.length/30)*.15)*100)
    },
    getAttempts(){return data.attempts},getByCat(c){return data.attempts.filter(x=>x.cat===c)},getByMode(m){return data.attempts.filter(x=>x.mode===m)},
    reset(){data.attempts=[];data.srs={};data.totalSessions=1;data.firstOpened=Date.now();saveAndSync();try{sessionStorage.setItem('ib_history_just_reset','1')}catch(e){}},
    exportData(){return JSON.stringify(data,null,2)},
    importData(json){try{const p=JSON.parse(json);if(!p.attempts&&!p.srs)throw new Error('Invalid');data.attempts=p.attempts||[];data.srs=p.srs||{};data.totalSessions=p.totalSessions||1;data.firstOpened=p.firstOpened||Date.now();saveAndSync();return{success:true,cards:Object.keys(data.srs).length,attempts:data.attempts.length}}catch(e){return{success:false,error:e.message}}},
    async pullFromCloud(){const r=await CloudSync.pull();if(!r.ok)return r;if(!r.data||r.empty)return{ok:true,msg:'No cloud data'};const cl=r.data,lA=data.attempts.length,cA=(cl.attempts||[]).length;if(cA>lA||(cA===lA&&Object.keys(cl.srs||{}).length>Object.keys(data.srs).length)){data.attempts=cl.attempts||[];data.srs=cl.srs||{};data.totalSessions=Math.max(data.totalSessions,cl.totalSessions||0);data.firstOpened=Math.min(data.firstOpened,cl.firstOpened||Date.now());save();return{ok:true,msg:`Pulled ${cA} rounds from cloud`,replaced:true}}return{ok:true,msg:`Local is newer.`,replaced:false}},
    async pushToCloud(){return await CloudSync.push(data)},
    get data(){return data}
  }
}

const StatsContext=createContext();const MobileContext=createContext(false);const SessionContext=createContext({reviewed:0,add:()=>{}});
const useStats=()=>useContext(StatsContext);const useMobile=()=>useContext(MobileContext);const useSession=()=>useContext(SessionContext);

// ─── SMART SHUFFLE: prioritize weak/due cards ───
function smartShuffle(cards,stats){
  const now=Date.now();
  const scored=cards.map(c=>{
    const srs=stats.getSrs(c.cat);
    const prof=stats.getSubtopicProf(c.cat);
    let priority=0;
    // Due cards get highest priority
    if(srs&&srs.next<=now)priority+=50;
    // Low proficiency cards get higher priority
    if(prof<40)priority+=30;
    else if(prof<60)priority+=20;
    else if(prof<75)priority+=10;
    // New/untracked cards get moderate priority
    if(!srs)priority+=25;
    // Add randomness so it's not always the same order
    priority+=Math.random()*15;
    return{card:c,priority};
  });
  scored.sort((a,b)=>b.priority-a.priority);
  return scored.map(s=>s.card);
}

// ─── UI COMPONENTS ───
function SplitProgress({correct,wrong,total}){
  const r=total-correct-wrong,pct=v=>(v/Math.max(total,1))*100;

// ─── BULLET ANSWER (formatted for flashcard/practice modes) ───
function BulletAnswer({text}){
  const parsed=useMemo(()=>{
    const splitSentences=s=>s.split(/(?<=[.!?])\s+(?=[A-Z'"(])/).filter(s=>s.length>8);
    const trimEnd=s=>s.replace(/\.\s*$/,'');
    const isAnalysis=s=>/^(This (shows?|meant|reveals?|highlights?|illustrates?|suggests?|demonstrates?|was|became|made|ensured|proved|created|transformed|contributed|established|represented|combined)|The (significance|result|irony|paradox|consequence|implication|impact|effect|legacy|key|central)|In (practice|reality|truth|retrospect|short|effect)|Whether|Without|Despite|Overall|Crucially|Ironically|Combined|Arguably|It (was|became|marked|set|crystallized|demonstrated|proved|established|revealed|shows)|As a result|For (the first time|Paper 2|IB)|Remove any)/.test(s);

    // Pattern 1: Numbered (1)...(2)... — only match small sequential numbers, not years
    const nums=[...text.matchAll(/\((\d{1,2})\)/g)].filter(m=>parseInt(m[1])<=20);
    if(nums.length>=2){
      const first=parseInt(nums[0][1]);
      const sequential=nums.every((m,i)=>parseInt(m[1])===first+i);
      if(sequential){
        const intro=text.substring(0,nums[0].index).trim().replace(/[:\s—–-]+$/,'');
        const bullets=[];
        for(let i=0;i<nums.length;i++){
          const s=nums[i].index+nums[i][0].length;
          const e=i+1<nums.length?nums[i+1].index:text.length;
          bullets.push(trimEnd(text.substring(s,e).trim()));
        }
        const lastBulletSents=splitSentences(bullets[bullets.length-1]);
        let analysis='';
        if(lastBulletSents.length>1){
          const tail=lastBulletSents.findIndex((s,i)=>i>0&&isAnalysis(s));
          if(tail>0){
            bullets[bullets.length-1]=trimEnd(lastBulletSents.slice(0,tail).join(' '));
            analysis=lastBulletSents.slice(tail).join(' ');
          }
        }
        return{intro,bullets,analysis};
      }
    }

    // Pattern 2: Labeled sections — broad pattern for ALL-CAPS labels followed by colon/dash
    const labelRe=/(?:^|(?<=\.)\s+)([A-Z][A-Z /&]{2,})\s*[:\-—–]+\s*/g;
    const labels=[...text.matchAll(labelRe)];
    if(labels.length>=2){
      const intro=text.substring(0,labels[0].index).trim().replace(/\.\s*$/,'');
      const bullets=[];
      for(let i=0;i<labels.length;i++){
        const label=labels[i][1].trim();
        const cs=labels[i].index+labels[i][0].length;
        const ce=i+1<labels.length?labels[i+1].index:text.length;
        bullets.push(label+': '+trimEnd(text.substring(cs,ce).trim()));
      }
      return{intro,bullets,analysis:''};
    }

    // Pattern 3: Sentence-based — smart grouping with analysis detection
    const sents=splitSentences(text);
    if(sents.length<=2)return{intro:text,bullets:[],analysis:''};
    if(sents.length===3)return{intro:sents[0],bullets:[trimEnd(sents[1])],analysis:isAnalysis(sents[2])?sents[2]:''};

    const intro=sents[0];
    let analysisIdx=sents.length;
    for(let i=sents.length-1;i>=Math.max(2,sents.length-2);i--){
      if(isAnalysis(sents[i]))analysisIdx=i;else break;
    }
    const bullets=sents.slice(1,analysisIdx).map(trimEnd);
    const analysis=analysisIdx<sents.length?sents.slice(analysisIdx).join(' '):'';
    return{intro,bullets,analysis};
  },[text]);

  if(!parsed.bullets.length&&!parsed.analysis){
    return <div style={{fontSize:'.93rem',color:'var(--text2)',lineHeight:1.7,textAlign:'left'}}>{text}</div>;
  }
  return <div style={{textAlign:'left',maxWidth:620,margin:'0 auto'}}>
    {parsed.intro&&<p style={{fontSize:'.9rem',color:'var(--text)',lineHeight:1.6,marginBottom:10,fontWeight:500}}>{parsed.intro}</p>}
    {parsed.bullets.length>0&&<ul style={{paddingLeft:0,margin:'8px 0',listStyle:'none'}}>
      {parsed.bullets.map((b,i)=><li key={i} style={{fontSize:'.84rem',color:'var(--text2)',lineHeight:1.55,marginBottom:6,paddingLeft:14,borderLeft:'2px solid var(--bg4)'}}>{b}</li>)}
    </ul>}
    {parsed.analysis&&<div style={{fontSize:'.82rem',color:'var(--accent2)',lineHeight:1.55,marginTop:10,padding:'8px 12px',background:'var(--accent-dim)',borderRadius:'var(--radius)'}}>
      <span style={{fontWeight:600,marginRight:6}}>Analysis:</span>{parsed.analysis}
    </div>}
  </div>;
}

function RecallMode({items,topicFilter,modeName='Recall',forcedCards=null}){
  const stats=useStats();const [cf,setCf]=useState(null);const session=useSession();
  const pool=useMemo(()=>{if(forcedCards)return forcedCards;let p=items;if(cf)p=p.filter(c=>c.cat===cf);else if(topicFilter)p=p.filter(c=>CATEGORIES[c.cat]?.topic===topicFilter);return smartShuffle(p,stats)},[items,topicFilter,cf,forcedCards]);
  const [idx,setIdx]=useState(0);const [fl,setFl]=useState(false);const [res,setRes]=useState(null);
  const [sc,setSc]=useState({c:0,w:0});const [hist,setHist]=useState([]);
  const total=pool.length;const cards=pool;
  const [seen,setSeen]=useState(false);
  useEffect(()=>{setIdx(0);setFl(false);setSeen(false);setSc({c:0,w:0});setHist([]);setRes(null)},[cf]);
  const flip=useCallback(()=>{setFl(f=>{SFX.flip();if(!f)setSeen(true);return!f})},[]);
  const mark=useCallback((ok)=>{
    const card=cards[idx];
    if(ok){SFX.correct();setSc(p=>({...p,c:p.c+1}))}else{SFX.wrong();setSc(p=>({...p,w:p.w+1}))}
    session.add();const nh=[...hist,{id:card.id,ok}];setHist(nh);
    if(idx+1>=total){SFX.complete();const s=sc.c+(ok?1:0);stats.record(card.cat,modeName,s,total,modeName);
      const cs={};nh.forEach(h=>{const c=CARDS.find(x=>x.id===h.id);if(c){if(!cs[c.cat])cs[c.cat]={s:0,t:0};cs[c.cat].t++;if(h.ok)cs[c.cat].s++}});
      Object.entries(cs).forEach(([cat,{s,t}])=>stats.updateSubtopicSrs(cat,s,t));
      setRes({score:s,total,hist:nh})}
    else{setIdx(idx+1);setFl(false);setSeen(false)}

  useEffect(()=>{const h=e=>{if(e.code==='Space'){e.preventDefault();flip()}else if(e.key==='1'||e.code==='ArrowLeft'){if(seen)mark(false)}else if(e.key==='2'||e.code==='ArrowRight'){if(seen)mark(true)}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[flip,mark,seen]);

  if(!cards.length)return <div className="fade-in">{!forcedCards&&<SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/>}<p style={{color:'var(--text3)',textAlign:'center',padding:40}}>No cards for this filter.</p></div>;
  const card=cards[idx],cat=CATEGORIES[card.cat];
  return <div className="fade-in">{!forcedCards&&<SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/>}<SplitProgress correct={sc.c} wrong={sc.w} total={total}/><div className="flashcard" onClick={flip} style={{borderColor:seen?cat?.color+'44':'var(--bg4)'}}><span className="label" style={{color:cat?.color}}>{cat?.label}</span><span className="counter">{idx+1}/{total}</span>{!fl?<div className="question">{card.q}</div>:<div className="answer"><BulletAnswer text={card.a}/></div>}{!seen&&<span className="flip-hint">tap or Space to flip</span>}{seen&&!fl&&<span className="flip-hint">tap or Space to see answer again</span>}<SrsTimer catId={card.cat}/></div>{seen&&<div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}><button className="btn btn-wrong" onClick={()=>mark(false)}>✕ Didn't Know (1)</button><button className="btn btn-correct" onClick={()=>mark(true)}>✓ Knew It (2)</button></div>}</div>

  return(<div className="fade-in story-wrap">
    <button className="btn btn-ghost btn-sm" onClick={()=>setActiveCat(null)} style={{marginBottom:16}}>← All Stories</button>

    <div className="story-title">{story?.title||cat?.label}</div>

          <div className="tl-dot" style={{borderColor:cat?.color}}/>

          <div className="tl-text">{e.text}</div>

        <button className="btn btn-primary" onClick={()=>{markRead(activeCat);setActiveCat(null)}}>✓ Mark as Read</button>
      </div>
    </div>
  </div>)
}

// ─── MINI RING ───
function MiniRing({value,size=52,stroke=4,color='var(--accent)'}){
  const r=(size-stroke)/2,c=2*Math.PI*r,o=c-(value/100)*c;
  return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg4)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={o} style={{transition:'stroke-dashoffset .6s ease'}}/></svg>
}
