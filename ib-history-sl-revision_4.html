  {id:"rc32",q:"What was the Mita system?",a:"Colonial labour system in the Andes adapted from the Inca mit'a tax. Communities provided workers for mine labour (especially Potosí silver mines), plantations, and public projects. Intended as temporary/rotational, but frequently led to exploitation, forced displacement, and death. Workers sent far from home for months. A key mechanism of colonial wealth extraction devastating indigenous communities.",cat:"rc_colonial"},
  {id:"rc47",q:"What did Fuentes mean by 'America was invented'?",a:"The Spanish didn't merely discover a static land — they dismantled existing empires (Aztecs, Incas) and rebuilt them as colonial domains (New Spain, Peru), creating something entirely new through imagination, violence, and imposition. The conquistadors might have founded democracy, as later settlers did elsewhere, but Spain's authoritarianism buried that possibility.",cat:"rc_colonial"},
  {id:"rc48",q:"How did the Crown treat the conquistadors?",a:"Initially: rewarded with encomiendas and governorships (Cortés: Governor of New Spain; Pizarro: Governor of Peru). Then: curbed their autonomy through the Council of the Indies (1524) and viceroys, fearing they'd become rival powers. Many rank-and-file received little. The Crown learned conquistadors were as dangerous as enemies — professional administrators replaced them.",cat:"rc_colonial"}
,
  // ═══ NEW: PRE-1945 COLD WAR CONTEXT ═══
  {id:"cw55",q:"What was the Appeasement Policy and why does it matter for the Cold War?",a:"Britain's 1930s policy of making concessions to Hitler to avoid war. It is usually regarded as a failure because it emboldened Nazi aggression. Its significance for the Cold War: Truman explicitly did not want to repeat Chamberlain's 'soft approach' — Appeasement became a cautionary tale that shaped the hard-line containment stance. Every time the US faced Soviet pressure, the memory of Appeasement pushed them toward firmness rather than compromise.",cat:"cw_origins"},
  {id:"cw56",q:"What was the Non-Aggression Pact (1939)?",a:"The Molotov-Ribbentrop Pact between the Soviet Union and Nazi Germany — a shocking agreement between ideological enemies. It allowed Hitler to attack the West without fear of a two-front war. Stalin gained time to build up Soviet military strength. It surprised the world because communism and fascism were supposed to be mortal enemies. The pact deepened Western distrust of Stalin, which carried directly into the post-war Cold War tensions.",cat:"cw_origins"},
  {id:"cw57",q:"What was the Atlantic Charter (1941)?",a:"Signed by Roosevelt and Churchill in August 1941, declaring that all peoples had a right to self-determination. This had enormous implications: it directly challenged imperialism, meaning the UK and France would eventually have to give up their colonies. The USSR would later cite self-determination to justify its influence in Eastern Europe, while the West used it to argue against Soviet expansion. The charter exposed the contradictions within the Grand Alliance before the war was even won.",cat:"cw_origins"},
  {id:"cw58",q:"What were the key wartime conferences?",a:"TEHRAN (November 1943): first meeting of Stalin, Roosevelt, Churchill. Agreed on D-Day invasion. YALTA (February 1945): agreed on UN, division of Germany/Berlin into occupation zones, 'free elections' in Eastern Europe, USSR joining war vs Japan. Main disagreement: Poland — Stalin installed communist government but allowed London exile Poles in. POTSDAM (July 1945): Truman replaces Roosevelt (died April 1945), atomic bomb revealed to Stalin. Tensions visible — Truman's harder line vs Roosevelt's willingness to compromise.",cat:"cw_origins"},
  {id:"cw59",q:"What was the Berlin Blockade (1948-49)?",a:"The first major Cold War crisis. After the West introduced a new currency (Deutschmark) in West Berlin, Stalin blocked all land transport to the city. The West organized an airlift supplying 2 million West Berliners for nearly a year. Stalin eventually backed down — a major morale boost for the West and proof that containment could work without war. Directly led to the formal creation of the FRG (September 1949), the GDR (October 1949), and NATO (April 1949).",cat:"cw_origins"},
  {id:"cw60",q:"How did China falling to communism (1949) change the Cold War?",a:"In 1949, Mao Zedong's Communist forces won the Chinese Civil War, creating the People's Republic of China. Secretary of State Dean Acheson explained: 'The Nationalist armies did not have to be defeated; they disintegrated.' This terrified America — the world's most populous nation was now communist. Combined with the Soviet atomic bomb (also 1949) and the Red Scare, it shifted the US from passive to pro-active containment, leading directly to NSC-68 and the Korean War.",cat:"cw_origins"},
  {id:"cw61",q:"What were the Cold War historiography schools?",a:"ORTHODOX (dominant until ~1970): Cold War was caused by aggressive Soviet/Stalinist expansion. REVISIONIST (after 1970, during Vietnam War protests): Cold War was caused by provocative US actions — American self-analysis during Vietnam. POST-REVISIONIST (after 1970): avoids blaming either side, examines wider factors objectively. POST-COLD WAR historians: access to newly opened Soviet archives, examination of other states' interests beyond the two superpowers.",cat:"cw_origins"},
  {id:"cw62",q:"What was the Red Scare and McCarthyism?",a:"An anti-communist crusade in 1950s America. Senator Joseph McCarthy led investigations claiming communists had infiltrated the US government, army, and entertainment industry. The HUAC (House Un-American Activities Committee) targeted Hollywood (the 'Hollywood Ten'). It created a climate of fear and suspicion domestically, and reinforced the political pressure on presidents to be tough on communism abroad. The Red Scare was heightened by China falling to communism and the Soviet atomic bomb — both in 1949.",cat:"cw_containment"},
  {id:"cw63",q:"What role did Ho Chi Minh play and what was the Geneva Conference (1954)?",a:"Ho Chi Minh was a Vietnamese communist and nationalist who led the independence movement against French colonial rule. 'As the Cold War intensified, Ho's Communist rather than nationalist credentials were emphasized' (textbook). The French were defeated at the Battle of Dien Bien Phu (1954). The Geneva Conference agreed: French withdrawal from Indochina, temporary division of Vietnam at the 17th parallel, 'free elections' to unite Vietnam in 1956, no foreign bases. Crucially, the US did NOT sign the Geneva Accords. South Vietnam fell under a brutal US-backed dictatorship.",cat:"cw_containment"},
  // ═══ NEW: MUSSOLINI ADDITIONS ═══
  {id:"mu20",q:"What was the Dopolavoro?",a:"The Fascist leisure organization for workers — one of the few genuinely popular Fascist institutions. It provided recreation, social activities, sports, cultural events, and holidays for ordinary Italians. It expanded welfare and gave workers tangible benefits from the regime. While it served as a tool of social control (keeping workers entertained and loyal), it was arguably the most successful Fascist social program in terms of genuine popular support.",cat:"au_muss_power"},
  {id:"mu21",q:"What were the Balilla youth groups?",a:"Fascist youth organizations designed to indoctrinate children from a young age. Named after a legendary Genoese boy who started a revolt against Austrian occupiers. Children were organized into age-graded groups and taught military discipline, physical fitness, loyalty to Il Duce, and Fascist ideology. Combined with compulsory education reforms that raised literacy, the youth groups aimed to create a new generation of Fascists who knew nothing but the regime.",cat:"au_muss_power"},
  // ═══ NEW: PERÓN ADDITIONS ═══
  {id:"pe21",q:"What were Perón's specific social reforms?",a:"Far more comprehensive than any previous Argentine government: paid vacations, severance pay, universal pensions, health insurance, accident compensation, minimum wages with annual bonuses (aguinaldo). The Eva Perón Foundation built low-cost housing, hospitals, and clinics. Subsidized bakeries and utilities reduced living costs. These reforms gave workers concrete, tangible improvements — and made them personally dependent on Perón's continued rule to keep those gains.",cat:"au_peron_power"},
  {id:"pe22",q:"What were conditions like for Argentine workers before Perón?",a:"Terrible. Source A describes factories with dust and fumes, widespread child labour, workers paid in scrip (company vouchers) rather than real money, and dangerous working conditions with no safety regulations. European immigrants crowded into conventillos near Plaza de Mayo — cheap tenements housing up to 350 people in cramped, poorly ventilated rooms. No laws protecting workers' rights existed — entirely to employers' advantage. Perón was the first politician to address these problems systematically.",cat:"au_peron_rise"},
  // ═══ NEW: CASTRO ADDITIONS ═══
  {id:"ca25",q:"What was religion like under Castro?",a:"Catholic schools were nationalized after the Bay of Pigs. Religious groups experienced what historians call 'internal exile' — marginalized but not violently persecuted. The 1976 constitution made it illegal to oppose the revolution on religious grounds. However, Castro eventually softened his stance: Pope John Paul II visited Cuba in 1998, marking a thaw in Church-state relations. Castro's approach was pragmatic — religion was tolerated as long as it didn't challenge the revolution's authority.",cat:"au_castro_power"},
  {id:"ca26",q:"Was there an alternative to Castro?",a:"Historian Hugh Thomas raised this question: could Cuba have avoided revolution? The answer is complicated. Batista's corruption and brutality had alienated every social class. The US-backed regime failed to address landlessness (200,000 families without land), 17% unemployment, and extreme inequality. The 26th of July Movement was the most effective anti-Batista force, drawing support from peasants, workers, middle class, and even some elites. By 1958, nearly all social classes backed the revolution (Source C) — suggesting the status quo was simply unsustainable.",cat:"au_castro_rise"},
  {id:"ca27",q:"What was the Family Code and women's status under Castro?",a:"Women gained legal equality: right to vote (1934 — pre-Castro), legal equality under 1940 constitution. After 1959: new legislation, FMC (Federation of Cuban Women, 1960), state-funded daycare centres, Family Code (1970s) requiring men to share domestic responsibilities. However, limitations persisted: few women reached top decision-making positions in the PCC or government, and the 'double burden' (work + domestic duties) continued despite legal reforms. Progress was real but incomplete.",cat:"au_castro_power"},
  // ═══ NEW: RECONQUEST ADDITIONS ═══
  {id:"rc50",q:"How many men did Tariq ibn Ziyad have at the crossing of 711?",a:"Tariq crossed the Strait of Gibraltar with a force of approximately 7,000 men, mostly Berber troops from North Africa. Roderick, the Visigoth monarch, had a much larger army of 20,000 to 40,000 men — but he was in the north fighting a rebellion among the Basques when Tariq crossed. By the time Roderick marched south to confront the invasion, he was too late to prevent the Muslim forces from establishing a foothold. The Visigothic army's superior numbers counted for nothing against internal disunity.",cat:"rc_islamic"},
  {id:"rc51",q:"Why was the Muslim conquest of North Africa difficult?",a:"Unlike the rapid conquest of Iberia, North Africa proved extremely challenging. Muslim forces faced both vigorous resistance from the Berber tribes and the remaining garrisons of Byzantine cities. Internal conflict and political disputes among the Muslim commanders further complicated the campaign. This tells us the Muslim world was divided even during its period of expansion — unity of purpose didn't mean unity of command.",cat:"rc_islamic"},
  {id:"rc52",q:"What were the Umayyad and Abbasid dynasties in al-Andalus?",a:"The Iberian Peninsula became the westernmost tip of the Umayyad Caliphate of Damascus after 711. In 750, the Umayyads were overthrown by the Abbasids in Damascus. But in 756, Abd ar-Rahman I — a survivor of the Umayyad dynasty — arrived in al-Andalus, seized power, and proclaimed himself emir. He founded an independent dynasty that survived until the 11th century, distancing al-Andalus from the Abbasid Caliphs. This independence allowed Córdoba to develop its own golden age in the 10th century.",cat:"rc_islamic"},
  {id:"rc53",q:"Who were the Almoravids and Almohads?",a:"North African Muslim warrior groups called in to help defend al-Andalus against Christian advances. The Almoravids were invited in 1086 after the fall of Toledo to Christian forces. The Almohads were invited in 1147 after the fall of Lisbon. Both temporarily restored Muslim military strength, but neither could prevent the long-term fragmentation of Muslim territory. After 1144-45, internal rebellions shattered any remaining Muslim unity permanently.",cat:"rc_islamic"},
  {id:"rc54",q:"What was the Battle of Las Navas de Tolosa (1212)?",a:"A decisive turning point in the Reconquest. A coalition of Christian kingdoms defeated Muslim forces, breaking Muslim military power in Iberia for good. Soon after, Córdoba and Seville fell to Christian armies. By 1252, the Kingdom of Granada was the only remaining sovereign Muslim state in the peninsula. Las Navas de Tolosa turned the Reconquest from a slow territorial struggle into an accelerating Christian advance.",cat:"rc_reconquest"},
  {id:"rc55",q:"How did the Nasrid Kingdom of Granada survive so long (1230-1492)?",a:"'The foundation of the Kingdom of Granada was laid by consent, not force.' Muhammad I secured his position in 1232 by agreeing to become a tributary vassal of Castile under Ferdinand III — paying tribute (mostly in gold) and offering military support. This made Granada a useful buffer state for Castile. Castilian kings often preferred the tribute revenue over the cost of conquest. Internal noble revolts and succession crises in Castile repeatedly delayed aggression. Granada also exploited Christian rivalries — in 1406, Granada even supplied troops for a joint Castile-Granada operation against the Marinids in North Africa.",cat:"rc_reconquest"},
  {id:"rc56",q:"What were the 'golden years' of Granada (1333-91)?",a:"Under rulers Yusuf I and Muhammad V, Granada maintained peace with Castile through skillful diplomacy. Trade in silk and other goods flourished. Muhammad V's reign saw the Alhambra adorned with stucco, tiles, and poetry — using Pythagorean geometry in the ground plan and wall decoration. A truce with Castile and trade with North Africa brought wealth, enabling funding of arts and architecture over military spending. These decades produced some of the most magnificent Islamic architecture ever built.",cat:"rc_reconquest"},
  {id:"rc57",q:"What caused the fall of Granada (1482-1492)?",a:"Internal betrayal was the fatal flaw. Boabdil rebelled against his father Abu'l-Hasan Ali in 1482, allying with Castile — splitting Granada's forces exactly when unity was needed. Ferdinand and Isabella systematically seized key towns: Ronda (1485), Málaga (1487), then besieged Granada itself. Noble rivalries on the Christian side (Duke of Medina Sidonia vs Marquess of Cádiz, 1471) sometimes delayed progress, but the unification of Castile and Aragon provided overwhelming force. Granada's terrain had historically prevented defeat, but these defences collapsed when internal strife met relentless external pressure.",cat:"rc_reconquest"},
  {id:"rc58",q:"What did Bettany Hughes reveal about the Moorish legacy?",a:"In her documentary 'When the Moors Ruled Europe,' Hughes argued the Moorish period 'has been systematically written out of history.' Portraying the Moors as foreign invaders rather than acknowledging their deep influence on Spanish culture was done to solidify a Christian identity. After the fall of Granada, around 300,000 Muslims were expelled and approximately 1 million books were burned. The image of Moors as 'barbaric, savage, uncivilized and dirty aliens' has persisted since the Crusades — despite overwhelming evidence of their cultural and scientific sophistication.",cat:"rc_expulsions"},
  {id:"rc59",q:"What were the expeditions before Cortés?",a:"Hernández de Córdoba (1517) led the first Spanish expedition to the Yucatán coast. He discovered the riches of mainland Mexico but was mortally wounded in fierce Maya resistance. Grijalva led a follow-up expedition, discovering Cozumel and trading with locals who reported the Aztec Empire's vast wealth through Moctezuma's emissaries. These expeditions confirmed that the mainland held far greater riches than the Caribbean islands — setting the stage for Cortés's unauthorized expedition.",cat:"rc_mexico"},
  {id:"rc60",q:"What were the Aztec origins?",a:"According to Aztec tradition, they migrated from Chicomoztoc ('Place of Seven Caves') and Aztlan (possibly meaning 'Place of Herons' — the origin of the name 'Aztec'). After a long migration, they founded Tenochtitlán in 1325 on an island in Lake Texcoco, where they saw their prophesied sign: an eagle perched on a cactus devouring a serpent. This image remains on Mexico's flag today. From this humble island beginning, the Aztecs built one of the largest empires in the Americas within 200 years.",cat:"rc_mexico"},
  {id:"rc61",q:"Who was Agustín de Zárate?",a:"A Spanish historian and royal auditor who arrived in Peru in 1543 to audit the colonial accounts. He wrote one of the key chronicles of the Conquest of Peru. He delayed writing while in Peru because Gonzalo Pizarro's rebellion made it dangerous to produce any account that might be politically sensitive — Pizarro could have retaliated. Zárate's account is valuable because he arrived soon after the conquest and interviewed eyewitnesses, but his position as a royal official also meant he had to present events in ways favorable to the Crown.",cat:"rc_peru"},
  {id:"rc62",q:"What was the Sentence of Medina del Campo (1465)?",a:"A decree that ended the toleration of Muslims in Castile. It was triggered by events across Europe between 1450-1461: the Ottoman advance in Eastern Europe and the fall of Constantinople to the Turks (1453) revived crusading interest. Internally, the Islamophile acculturation at the court of Enrique IV of Castile — where Mudéjar arts and Muslim customs were fashionable — provoked a reaction from anti-Islamic factions. The Sentence marked the beginning of the end for Muslim tolerance in Castile, foreshadowing the expulsions that would come after 1492.",cat:"rc_expulsions"},

  // ── COLD WAR: NEW FROM CLASS FILES ──
  {id:"cw70",q:"What was the Warsaw Rising and why did it matter?",a:"In 1944, Polish nationalists rose against German forces in Warsaw before the Soviet advance into Poland. The Germans crushed the uprising while Soviet troops nearby did not intervene to help. This deliberate inaction increased British and American distrust of Stalin's intentions and foreshadowed Soviet domination of Poland after the war.",cat:"cw_origins"},
  {id:"cw71",q:"What were Stalin's 'salami tactics'?",a:"Stalin's method of gradually taking control of Eastern European governments slice by slice. He would first insist on coalition governments including communists, then systematically eliminate non-communist parties through intimidation, rigged elections, and disappearances of opposition leaders. The USSR also withdrew from Bretton Woods institutions (IMF, World Bank), signaling economic separation from the West.",cat:"cw_origins"},
  {id:"cw72",q:"What happened at Potsdam regarding the atomic bomb?",a:"At Potsdam (July 1945), Truman did not fully inform Stalin about the decision to drop the atomic bomb on Japan. When Truman casually mentioned a 'new weapon of unusual destructive force,' Stalin appeared unimpressed (Soviet intelligence already knew about the Manhattan Project). Stalin was deeply offended by the lack of transparency, increasing his suspicion of Western intentions and accelerating the Soviet atomic program.",cat:"cw_origins"},
  {id:"cw73",q:"Who was Clement Attlee and what was his role?",a:"Attlee won UK elections in July 1945, replacing Churchill midway through the Potsdam Conference. Despite being Labour, he continued Churchill's path of hostility toward the USSR. Churchill had known that without the USA, the UK would be bankrupt and could not alone contain Stalin. He feared America might withdraw from Europe as after WWI, making US engagement critical.",cat:"cw_origins"},
  {id:"cw74",q:"What was significant about Greece and Turkey receiving US aid?",a:"While the Truman Doctrine presented aid to Greece and Turkey as defending democracy, the governments of Greece and Turkey were in no way model democratic states. This reveals a key tension in US Cold War policy: containment prioritized anti-communism over genuine democracy. The US supported authoritarian regimes as long as they opposed communism.",cat:"cw_origins"},
  {id:"cw75",q:"What did Churchill say about the Marshall Plan?",a:"Churchill called the Marshall Plan 'the most unselfish act in history.' While it genuinely helped rebuild Europe, it also served US strategic interests: creating markets for American goods, binding Western Europe to the US economically, and preventing communist expansion. Stalin saw it as economic imperialism designed to undermine Soviet influence.",cat:"cw_origins"},
  {id:"cw76",q:"What was the East German uprising of 1953?",a:"In June 1953, East German workers rioted against poor conditions and forced collectivization. Soviet tanks were sent in to crush the protests. The West German 'economic miracle' — driven by larger population, greater industrial output, Marshall Aid, and rising living standards — contrasted sharply with East Germany's forced socialization and massive economic problems. This disparity drove the brain drain that later caused the Berlin Crisis.",cat:"cw_crises"},
  {id:"cw77",q:"What happened at Checkpoint Charlie (October 1961)?",a:"After the Berlin Wall went up in August 1961, US and Soviet tanks faced off directly at Checkpoint Charlie in October 1961. For 16 hours, tanks from both sides stood just meters apart — the closest direct military confrontation between US and Soviet forces during the Cold War. The standoff eventually de-escalated, but it demonstrated how quickly the Berlin situation could spiral into war.",cat:"cw_crises"},
  {id:"cw78",q:"What did historians Deudney and Ikenberry argue about Reagan?",a:"Historians D. Deudney and G.J. Ikenberry argued that Reagan's Star Wars (SDI) initiative brought the arms race to a phase where the USA had a decisive technological advantage over the USSR. Reagan's military and psychological pressure forced the USSR to abandon expansionism abroad. Combined with the economic strain of matching US spending, this pressure made Gorbachev's reforms inevitable.",cat:"cw_end"},
  {id:"cw79",q:"What was the 'zero option' discussed by Reagan and Gorbachev?",a:"At their summits (1985-88), Reagan and Gorbachev discussed the radical 'zero option' — eliminating nuclear weapons entirely. While this was never achieved, the fact that both leaders seriously considered it showed how far both had moved from their initial positions. Reagan, who had called the USSR an 'evil empire,' and Gorbachev, who led a nuclear superpower, both recognized that nuclear weapons threatened all of humanity.",cat:"cw_end"},
  {id:"cw80",q:"Quote: Truman on the policy of containment",a:"Truman declared: 'I believe that it must be the policy of the United States to support free peoples who are resisting attempted subjugation by armed minorities or by outside pressures.' This became the foundational statement of the Truman Doctrine (March 1947) and defined US foreign policy for the entire Cold War era.",cat:"cw_origins"},
  {id:"cw81",q:"Quote: Textbook on Vietnam as containment failure",a:"The textbook states: 'The most striking failure of the US policy of containment was in Vietnam, where the North Vietnamese Communists were not contained.' Additionally: 'As the Cold War intensified, Ho's Communist, rather than nationalist, credentials were emphasized, and the assumption grew that he was being directed from Moscow.' This shows how Cold War ideology distorted the understanding of Vietnamese nationalism.",cat:"cw_containment"},
  {id:"cw82",q:"Quote: David Reynolds on the Korean War",a:"David Reynolds wrote that the decisions Truman made during the Korean War 'redefined the Cold War.' Before Korea, the Cold War was primarily a European political and economic competition. After Korea, it became a global military confrontation. US military budget tripled, SEATO was created, and America committed to worldwide military bases. Korea was the turning point from cold to hot.",cat:"cw_containment"},

  // ── MUSSOLINI: NEW FROM CLASS FILES ──
  {id:"mu25",q:"How did voter turnout reflect Italian democracy's weakness?",a:"Voter turnout in Italy was only about 50%, even after reforms expanded suffrage. This allowed elites to control politics through backroom deals. The system of 'transformism' — where politicians constantly switched alliances to stay in power — destroyed public trust. Over 30 governments came and went between 1871 and 1914, averaging a new government every 18 months. Italy was a democracy in name but an oligarchy in practice.",cat:"au_muss_rise"},
  {id:"mu26",q:"What was Mussolini's dual strategy during his rise?",a:"Mussolini maintained a deliberate dual strategy: (1) legal parliamentary work to gain elite support — the 1921 deal with Giolitti's liberals gave Fascists 35 seats, and the Acerbo Law of 1923 rigged elections legally; (2) illegal street violence through Blackshirt squads (squadristi) who attacked socialist offices, broke strikes, and destroyed printing presses. Industrialists and landowners funded the squads because they broke worker organization. This combination of legality and terror was key to his success.",cat:"au_muss_rise"},
  {id:"mu27",q:"How was Mussolini's power limited even as dictator?",a:"Despite declaring a dictatorship in 1925-26, Mussolini never achieved total power. The King remained formal head of state and could dismiss him. The Catholic Church retained enormous social influence, especially after the Lateran Accords. The army maintained independent loyalty to the monarchy. The Fascist Grand Council — which Mussolini created in 1923 — ultimately voted to remove him in July 1943 when the war turned against Italy. His revolution was incomplete.",cat:"au_muss_power"},
  {id:"mu28",q:"What was the 'Quota 90' and its economic impact?",a:"In 1926, Mussolini revalued the lira to 90 lire per British pound ('Quota 90' or 'Battle for the Lira'). This was meant to demonstrate Italy's economic strength and prestige. However, it made Italian exports more expensive abroad, hurting industries and workers. Combined with the Battle for Grain (which achieved self-sufficiency but neglected other crops) and autarky policies, Italy's GDP growth averaged only 1.5% annually — below pre-war levels.",cat:"au_muss_power"},
  {id:"mu29",q:"What was Mussolini's Charter of Labour (1927)?",a:"The Charter of Labour regulated relations between labour and capital, aiming to reduce extreme wealth disparities through state management. Independent unions were banned and replaced by Fascist-controlled corporations. Strikes were outlawed. While it claimed to protect workers, it overwhelmingly favored business interests. The Charter is historically significant because Peron later studied and adapted Mussolini's corporatist model for Argentina.",cat:"au_muss_power"},
  {id:"mu30",q:"How did Fascism use the cult of personality?",a:"Mussolini was portrayed as 'Il Duce' — an infallible, father-like guide for the nation. He gave dramatic speeches from the balcony of Palazzo Venezia to massive crowds. Films, books, and newsreels praised Fascist violence as protection of order and national greatness. The Institute for Roman Studies was created to glorify ancient Rome and link Fascism to imperial grandeur. School curricula taught military values and loyalty to Il Duce. The Balilla youth groups indoctrinated children from a young age.",cat:"au_muss_power"},

  // ── PERON: NEW FROM CLASS FILES ──
  {id:"pe25",q:"Who was General Roca and what was the Argentine oligarchy?",a:"General Roca subdued Amerindian tribes in Patagonia, crushed Buenos Aires' last insurrection, and federalized the city. He built coalitions with the army, provincial governors, and landowners. The 'oligarchy' — about 2-3% of the population — was an educated, progressive liberal elite tied to Social Darwinism, Positivism, and British capital. They promoted immigration, urbanization, and education, governing Argentina for three decades (1880-1910).",cat:"au_peron_rise"},
  {id:"pe26",q:"How did Argentina's agricultural revolution create inequality?",a:"Between 1872 and 1895, cultivated pampas land expanded 15-fold. By 1910, Buenos Aires was the 'Paris of South America.' But this wealth was concentrated: 2-3% owned 95% of the land. European immigrants (millions of Italians and Spaniards) crowded into conventillos. Argentine elites learned French and English to seem 'civilized' and viewed their own working class as 'barbaric.' This civilization vs. barbarism divide was exactly what Peron would exploit.",cat:"au_peron_rise"},
  {id:"pe27",q:"How did Peron dissolve political parties after winning?",a:"Despite his decisive 1946 victory, Peron felt insecure. His first step was dissolving all parties that had supported his campaign — including the Labour Party — and replacing them with a single party under his personal control: the Partido Unico de la Revolucion, later renamed Partido Justicialista/Peronista. This is a key distinction: Peron's Argentina fits authoritarianism better than a strict single-party state, because other parties, parliament, and elections continued to exist, albeit severely constrained.",cat:"au_peron_power"},
  {id:"pe28",q:"What was the 1949 Constitution?",a:"Peron's 1949 Constitution transformed Argentina's legal framework: it allowed presidential re-election (enabling Peron's continued rule), nationalized public services and energy, enabled state intervention in foreign trade, and enshrined social rights including state-protected family institutions. New textbooks conveyed Peronist messages through nationalist rhetoric with no criticism allowed. Teachers were trained to transmit Peronist doctrine.",cat:"au_peron_power"},
  {id:"pe29",q:"What propaganda imagery did Peronism use?",a:"Peronist propaganda transformed the image of the Argentine worker from 'Obrero Ayer Oprimido' (worker yesterday oppressed) to 'Hoy dignificado' (today dignified) — this transformation was celebrated every May 1 (Labour Day). State-controlled media staged rallies with visual icons portraying Peron and Evita as saviors of the working class. Civil servants were required to join the Peronist Party. Eva's 'La razon de mi vida' became required reading in schools.",cat:"au_peron_power"},

  // ── CASTRO: NEW FROM CLASS FILES ──
  {id:"ca30",q:"How did Castro's position on communism change?",a:"In February 1959, Castro explicitly denied being communist: 'the thinking of the movement is not communist thinking.' He presented the revolution as nationalist and democratic. By December 1961, he publicly declared himself Marxist-Leninist. Whether this was a genuine ideological evolution or strategic concealment remains debated. Key factors: US hostility forced him toward the USSR; Soviet aid required ideological alignment; liberals left and the PSP (Communist Party) filled the vacuum; Che Guevara pushed radicalization.",cat:"au_castro_power"},
  {id:"ca31",q:"What was the Padilla Affair and the 'grey years'?",a:"In 1971, poet Heberto Padilla was arrested for writing poetry critical of the revolution. He was tortured and forced into a public confession — denouncing his own work and naming other intellectuals. This launched the 'grey years' of Cuban culture: artists and writers became afraid to create anything potentially counter-revolutionary. The 1976 constitution stated artistic freedom was allowed only if content supported the revolution. Castro had told intellectuals: 'Within the Revolution, everything; against the Revolution, nothing.'",cat:"au_castro_power"},
  {id:"ca32",q:"What cultural institutions did Castro create?",a:"ICAIC (Cuban Institute of Cinematographic Art and Industry, 1959) controlled film production. UNEAC (National Union of Writers and Artists) organized cultural workers. In 1961, the documentary PM was censored for showing 'decadent' Afro-Cuban dancing in Havana nightlife — it conflicted with revolutionary ideals. Libraries were purged of 'inappropriate material.' Pro-revolution teachers replaced anti-revolution ones; some were trained in the USSR. Textbooks focused on revolutionary heroes: Fidel, Che, and Camilo.",cat:"au_castro_power"},
  {id:"ca33",q:"What was Che Guevara's vision of the 'new man'?",a:"Che Guevara envisioned creating a 'new man' (hombre nuevo) who would work for the collective good rather than personal gain. He promoted voluntary labour and moral incentives over material rewards. In practice, this idealism led to absenteeism and low productivity. The Revolutionary Offensive and the failed '10 Million Tons' sugar harvest campaign showed the limits of voluntarism. Guevara left Cuba in 1965 to spread revolution abroad and was killed in Bolivia in 1967.",cat:"au_castro_power"},
  {id:"ca34",q:"What was the status of Afro-Cubans under Castro?",a:"Afro-Cubans made up approximately 50% of the population and faced severe discrimination before 1959. The revolution claimed to eradicate racial inequality and did desegregate public spaces and institutions. However, very few non-whites reached positions of power within the PCC or government. The UMAP camps (1965-68) disproportionately targeted Afro-Cuban religious practitioners. The contradiction between revolutionary rhetoric of equality and persistent racial hierarchy remains a sensitive issue.",cat:"au_castro_power"},
  {id:"ca35",q:"Quote: Hugh Thomas on alternatives to Castro",a:"Historian Hugh Thomas argued the only policy that could have prevented Castro's revolution was 'sending US troops to help Batista defeat Castro, then staying for free elections — accepting a clear imperial role.' This highlights the impossible position the US faced: Batista's corruption made him unsustainable, but the only alternative was a revolutionary movement the US couldn't control. By 1958, nearly all social classes backed the revolution.",cat:"au_castro_rise"},

  // ── RECONQUEST: NEW FROM CLASS FILES ──
  {id:"rc65",q:"Why are sources on the 711 conquest limited?",a:"No contemporary Arabic accounts of the 711 Muslim conquest of Iberia survive. Later accounts 'focus more on the interesting stories rather than the careful ordering of events.' This means historians must rely on sources written decades or centuries after the events. The conquest's success owed partly to collaboration with local populations including Jews and disaffected Christians who saw the Muslims as liberators from Visigothic oppression.",cat:"rc_islamic"},
  {id:"rc66",q:"What happened to the Great Mosque of Cordoba?",a:"The Great Mosque of Cordoba was repeatedly extended by successive Muslim rulers, becoming one of the architectural wonders of the medieval world. After the Reconquista, Christians built a cathedral in the middle of the mosque rather than demolish it — acknowledging its architectural superiority. A 10th-century German visitor described Cordoba as 'the ornament of the world.' The mosque exemplifies the cultural sophistication of al-Andalus.",cat:"rc_islamic"},
  {id:"rc67",q:"Why were non-Muslims tolerated in Islamic Spain?",a:"Three key reasons: (1) Judaism and Christianity were monotheistic faiths recognized by Islam; (2) non-Muslims vastly outnumbered Muslims initially, making mass conversion or execution impractical; (3) Quranic passages mandated toleration of 'People of the Book' under specific rules. However, tolerance deteriorated over time — the organized massacre of Jews in Granada in 1066 shows the limits. By later periods, Christians could not display any sign of faith outside their homes.",cat:"rc_islamic"},
  {id:"rc68",q:"How did the 1410 Capture of Antequera affect Granada?",a:"The Castilian capture of Antequera in 1410 shrank Granada's borders significantly. Combined with shifting alliances — the Duke of Medina Sidonia's 1471 capture of Alhama sparked jealousy from the Marquess of Cadiz, showing that noble rivalries often overshadowed the supposed 'holy war.' Christian nobles were as motivated by personal glory and territory as by religion. Granada's survival depended on Castile's internal divisions as much as its own defenses.",cat:"rc_reconquest"},
  {id:"rc69",q:"When was the Treaty of Granada signed?",a:"The Treaty of Granada was signed on November 25, 1491 between Boabdil and Ferdinand and Isabella. It formally ended the Reconquista by surrendering the Emirate of Granada. Muslims were promised preservation of their mosques and religious institutions, use of their language, and the right to follow their own laws and customs. Cardinal Cisneros's forced conversions and book-burning after 1499 violated every promise — triggering the First Rebellion of the Alpujarras.",cat:"rc_expulsions"},
  {id:"rc70",q:"How did Cortes use his legal training?",a:"Cortes enrolled at the University of Salamanca's law faculty at age 14. His legal training proved as important as his military skill: every letter to Charles V was a carefully crafted legal argument for why his unauthorized conquest should be legitimized. He had permission from Governor Velazquez to explore and trade but NOT to colonize. His partners Amador de Lares (Velazquez's accountant) and merchant Andres de Duero helped secure his appointment through money and influence.",cat:"rc_mexico"},
  {id:"rc71",q:"What Aztec omens foretold the Spanish arrival?",a:"According to The Broken Spears and indigenous codices, several supernatural omens preceded the Spanish arrival: a pillar of fire appeared in the sky; the Temple of Huitzilopochtli was struck by lightning; Lake Texcoco boiled spontaneously; a woman's voice wailed through the night 'My children, we must flee!'; and monstrous beings appeared. Whether these omens were recorded before or after the conquest is debated, but they shaped how the Aztecs understood their defeat as divinely ordained.",cat:"rc_mexico"},
  {id:"rc72",q:"What gifts did Moctezuma send Cortes?",a:"Moctezuma sent elaborate gifts to Cortes through emissaries: gold objects, feathered treasures, ceremonial costumes, and food provisions. At their meeting, Cortes attempted to embrace Moctezuma but was stopped by the lords. He placed a necklace of pearls and cut glass around Moctezuma's neck. Moctezuma offered necklaces of red snails' shells with golden shrimp figures. These exchanges reveal the collision of two diplomatic traditions — the Spanish saw the gold as proof of wealth to conquer; Moctezuma saw gift-giving as diplomacy.",cat:"rc_mexico"},
  {id:"rc73",q:"How reliable are the different sources on the Conquest of Mexico?",a:"Three key source types: (1) Cortes's letters — self-aggrandizing and strategic, aimed at impressing Charles V, every detail chosen to justify his unauthorized conquest. (2) Bernal Diaz del Castillo — a common soldier whose memoir is more raw and detailed; considered more reliable because he had less motive to distort for political reasons. (3) The Broken Spears — indigenous accounts compiled from surviving codices, providing the conquered perspective. All three are valuable but biased in different ways.",cat:"rc_mexico"},
  {id:"rc74",q:"Who was Felipillo and why does he matter?",a:"Felipillo was the first interpreter used by the Spanish in Peru. According to the chronicler La Vega, Felipillo's poor translation of Fray Valverde's speech to Atahualpa at Cajamarca badly distorted its meaning, contributing to the violence that followed. When Atahualpa discarded the Bible, it may have been partly due to miscommunication rather than deliberate rejection. This highlights how language barriers and cultural misunderstandings shaped the conquest.",cat:"rc_peru"},
  {id:"rc75",q:"What is Las Casas's connection to Liberation Theology?",a:"Las Casas is cited as a historical precursor to Latin American Liberation Theology — a mid-20th century movement emphasizing Christian commitment to social justice and defending the poor. Theologians like Gustavo Gutierrez cite Las Casas as an early example. His mature position — that indigenous people should be free subjects of the Crown, evangelized peacefully without coercion — planted seeds that grew into modern human rights discourse at the Valladolid Debate.",cat:"rc_colonial"},

  // ═══ NEW STORY-BASED CARDS ═══

  // ── COLD WAR: STORY DATA ──
  {id:"cw100",q:"What was the Grand Alliance and why did it fracture?",a:"The wartime alliance of the US, UK, and USSR formed after Pearl Harbor (December 1941) against the Axis powers. Fissures appeared as early as 1942 — the Allies shared a common enemy but not common goals. Stalin's obsession with security (the USSR had been invaded three times in the 20th century) was hard for the West to distinguish from territorial aggression. The alliance collapsed almost immediately after victory, giving way to Cold War rivalry.",cat:"cw_origins"},
  {id:"cw101",q:"What were the key agreements and tensions at Yalta (February 1945)?",a:"The Big Three agreed on: the United Nations, division of Germany and Berlin into occupation zones, 'free elections' in Eastern Europe, and the USSR joining the war against Japan. The main disagreement was Poland — Stalin installed a communist government while allowing some London exile Poles in. Roosevelt sought compromise; Churchill feared America would withdraw from Europe as after WWI.",cat:"cw_origins"},
  {id:"cw102",q:"How did Truman differ from Roosevelt at Potsdam?",a:"Roosevelt died April 1945 and was replaced by Truman — a man with little foreign policy experience who took a much harder line, determined not to repeat Chamberlain's Appeasement. Truman casually mentioned a 'new weapon of unusual destructive force' — Stalin appeared unimpressed (Soviet intelligence already knew via the Manhattan Project) but was deeply offended by the lack of transparency. The conference exposed irreconcilable visions for Germany's future.",cat:"cw_origins"},
  {id:"cw103",q:"What specific figures show the Marshall Plan's scale?",a:"17 countries participated, requesting $20 billion total. France: $2.7 billion. Greece: nearly $700 million (US projects included importing mules). Yugoslavia's Tito: $150 million after breaking with Stalin. Italy: massive CIA campaign defeated communists in 1948 elections. Churchill called it 'the most unselfish act in history,' though it also served US economic interests by creating markets for American goods.",cat:"cw_origins"},
  {id:"cw104",q:"What were the key events of 1949 that transformed the Cold War?",a:"Three seismic events: (1) The FRG (West Germany) created in September, GDR (East Germany) in October — formalizing Germany's division. (2) NATO founded as a Western military alliance. (3) USSR detonated its first atomic bomb, ending America's nuclear monopoly. Combined with China falling to Mao's communists, 1949 made the Cold War truly global and militarized.",cat:"cw_origins"},
  {id:"cw105",q:"What specific data shows the Korean War's impact?",a:"Approximately 2.5 million Korean civilians died. US military budget tripled to $35–50 billion (NSC-68). SEATO was created. Charles 'Chip' Bohlen: 'It was the Korean War and not World War Two that made us a world military-political power.' The peninsula remained divided at roughly the same line. The armistice (1953) was never followed by a peace treaty — technically the war never ended.",cat:"cw_containment"},
  {id:"cw106",q:"What was the Brezhnev Doctrine and how did it end?",a:"The Soviet policy (from 1968) that the USSR would use military force to keep satellite states communist. It justified the invasion of Czechoslovakia in 1968. Once a country became communist, it could never leave the Soviet bloc. Gorbachev abandoned it in 1988, replacing it with the 'Sinatra Doctrine' (after Frank Sinatra's 'My Way') — Eastern European countries could now choose their own path. This single decision sealed the Soviet empire's fate.",cat:"cw_end"},
  {id:"cw107",q:"What was the INF Treaty (1987) and why was it significant?",a:"The Intermediate-Range Nuclear Forces Treaty, signed by Reagan and Gorbachev. It eliminated all intermediate-range nuclear weapons (range 500–5,500 km) from Europe — the first treaty to actually reduce nuclear arsenals rather than just limit growth. It was the key achievement of the Reagan-Gorbachev summits (1985–88) and proved both leaders could move beyond rhetoric to concrete disarmament.",cat:"cw_end"},
  {id:"cw108",q:"How much did Soviet military spending drain the economy?",a:"Under Brezhnev, roughly 25% of GDP went to the military — compared to ~6% in the US. Gorbachev inherited a drained economy: scarce consumer goods, falling technology, inefficient command system. He had no choice but to negotiate, reform, and reduce military spending. Without the economic crisis, there would have been no Perestroika, no Glasnost, and no end to the Cold War.",cat:"cw_end"},
  {id:"cw109",q:"How did the 1989 revolutions unfold across Eastern Europe?",a:"Once Gorbachev signaled the Red Army wouldn't intervene (Sinatra Doctrine), revolution swept the continent. People near Western borders had watched Western TV and knew what they were missing. State-controlled industries were inefficient, products shoddy, shelves bare. Country after country threw off communist rule. The Berlin Wall fell in November 1989 — ordinary people destroyed the Cold War's most powerful symbol with hammers.",cat:"cw_end"},
  {id:"cw110",q:"What specific data shows the Berlin Crisis escalation?",a:"Over 300,000 skilled workers had fled East Germany by the late 1950s. The Wall went up overnight on 13 August 1961. In October 1961, US and Soviet tanks faced off at Checkpoint Charlie for 16 hours — the closest direct military confrontation between the two superpowers. West Germany's 'economic miracle' contrasted sharply with East Germany's forced collectivization.",cat:"cw_crises"},
  {id:"cw111",q:"What were the key dates and data of the Cuban Missile Crisis?",a:"13 days (16–28 October 1962) — the closest humanity came to nuclear war. U-2 spy planes photographed Soviet missile sites that could reach most US cities within minutes. Kennedy chose a naval 'quarantine' (avoiding legal implications of 'blockade'). Deal: Soviets remove Cuba missiles; US quietly removes Turkey missiles and promises not to invade Cuba. Results: hotline established, Limited Test Ban Treaty (1963), Nuclear Non-Proliferation Treaty.",cat:"cw_crises"},

  // ── MUSSOLINI: STORY DATA ──
  {id:"mu40",q:"What specific economic data shows pre-WWI Italy's weakness?",a:"Coal output reached 3.6 million tons by 1913. Only 2% of the population could initially vote. Over 30 governments in 40 years (new government every 18 months). Six million Italians emigrated. 80% of the population were impoverished peasants. The humiliating defeat at Adowa (1896) against Ethiopia showed Italy was the weakest great power. Per capita income rose modestly but lagged behind all other major European powers.",cat:"au_muss_rise"},
  {id:"mu41",q:"What was the 'Red Biennium' (1919–20)?",a:"The two 'red years' of post-WWI Italy when communist revolution seemed imminent. Two million soldiers returned to find no jobs. Prices soared while wages stagnated. Workers occupied factories; landless peasants seized farms. For the Italian middle class, elites, and business owners, it looked like the Russian Revolution was about to happen in Italy. This fear drove them to support Mussolini's Fascists as the only force capable of restoring order.",cat:"au_muss_rise"},
  {id:"mu42",q:"How did the IRI transform Italy's economy in the 1930s?",a:"The Institute for Industrial Reconstruction (IRI), created after the Great Depression hit Italy. It nationalized key industries, stabilized banking after the crash, and fostered heavy industry growth — steel production rose by 50%. Public works: draining the Pontine Marshes (creating land and jobs), building railways and highways. The most significant state intervention in Italy's economy, and one of the few Fascist policies with tangible results.",cat:"au_muss_power"},
  {id:"mu43",q:"What did the Lateran Accords (1929) give each side?",a:"CHURCH GAINED: Vatican City as sovereign state, 750 million lire compensation, Catholicism as state religion, mandatory religious education, control over marriages and family law. FASCISTS GAINED: Church endorsement (ending Catholic opposition), control over appointments and youth organizations. Won over millions of traditional rural Italians. Perhaps Mussolini's greatest diplomatic achievement — ending decades of Church-state hostility.",cat:"au_muss_power"},
  {id:"mu44",q:"How did Mussolini come to power at the March on Rome (October 1922)?",a:"Blackshirt squads converged on Rome, but the real drama was at the royal palace. King Victor Emmanuel III could have declared martial law — the army would have obeyed. But he feared civil war and doubted his own position. Instead, he invited Mussolini to form a government. At 39, the former journalist became PM. The march was mythologized as a glorious seizure of power — in truth a bluff that worked because the king, army, Church, and industrialists allowed it.",cat:"au_muss_rise"},

  // ── PERÓN: STORY DATA ──
  {id:"pe40",q:"What specific data shows pre-Perón Argentine inequality?",a:"Between 1872–1895, cultivated pampas land expanded 15-fold. By 1910, Buenos Aires was the 'Paris of South America.' But 2-3% owned 95% of the land. Millions of Italian and Spanish immigrants crowded into conventillos — tenements housing up to 350 people. Argentine elites learned French/English to seem 'civilized' and viewed the working class as 'barbaric.' Six million Italians emigrated to Argentina between 1870–1930.",cat:"au_peron_rise"},
  {id:"pe41",q:"How did Perón's 1946 election victory compare to typical results?",a:"His coalition won all national senators except two, a two-thirds majority in the Chamber of Deputies, and every provincial governorship but one (Corrientes). Despite this overwhelming mandate, Perón still felt insecure — he lacked complete endorsement from all sectors of the armed forces and civilian establishment. His first move: dissolving ALL parties that had supported him into a single Partido Justicialista under his personal control.",cat:"au_peron_power"},
  {id:"pe42",q:"What specific reforms did Perón implement through the Labour Department?",a:"Before Perón, no laws protecting workers' rights existed. He introduced: paid vacations, severance pay, minimum wages with annual bonuses (aguinaldo), universal pensions, health insurance, accident compensation. His genius: workers feared losing these gains if Perón was removed — making union support into personal loyalty. As Source C noted: 'He was using them, not the reverse.'",cat:"au_peron_rise"},
  {id:"pe43",q:"How large was the Eva Perón Foundation (FEP)?",a:"By the late 1940s, the FEP surpassed most government ministries. Assets exceeded $200 million with 14,000 employees. It distributed housing, food, and medical care to the poor. Eva personally attended families. But it was also a tool of political control — benefits flowed through Peronist channels, and recipients understood their improved lives depended on Perón staying in power.",cat:"au_peron_power"},
  {id:"pe44",q:"What triggered Perón's fall in 1955?",a:"Economic decline after 1951: inflation soared, shortages appeared, ISI gains evaporated. Church turned against him. Armed forces alienated by personality cult. Eva died 1952 (aged 33) — removing his most effective connection to the masses. La Prensa (Argentina's most prestigious newspaper) shut 1951. Bombing of presidential palace June 1955 showed depth of opposition. Military coup 16 September 1955; Perón fled into exile until 1973.",cat:"au_peron_power"},

  // ── CASTRO: STORY DATA ──
  {id:"ca50",q:"What specific data shows pre-revolutionary Cuba's inequality?",a:"US companies (United Fruit, Esso, Texaco, Cuban Electric Co.) controlled sugar, oil, utilities, and telecom. The Platt Amendment (1901–1934) gave the US rights to intervene. 200,000 peasant families had no land. 17% unemployment. Sugar workers idle for months between harvests. Meyer Lansky and American organized crime ran Havana as a 'Latin Las Vegas.' High per capita income masked extreme inequality.",cat:"au_castro_rise"},
  {id:"ca51",q:"What were the key dates and numbers of Castro's revolution?",a:"Moncada Assault: 26 July 1953, 140 rebels — failed but produced 'History Will Absolve Me.' Granma expedition: December 1956, ~80 rebels — only 12 survivors including Fidel, Raúl, Che Guevara, Camilo Cienfuegos. US arms embargo: 1957. Batista fled: 1 January 1959. Castro declared Marxist-Leninist: December 1961 (in February 1959 he had explicitly denied being communist).",cat:"au_castro_rise"},
  {id:"ca52",q:"What were the specific results of Castro's literacy campaign?",a:"1961 campaign: 170,000 volunteer brigadistas deployed to rural areas. Illiteracy dropped from ~23% to 4%. More schools built in three years than in the previous 58 years. Private schools were nationalized after the Bay of Pigs. Education also became ideological — textbooks focused on revolutionary heroes: Fidel, Che, and Camilo. Pro-revolution teachers replaced anti-revolution ones.",cat:"au_castro_power"},
  {id:"ca53",q:"What were the CDRs and UMAP camps?",a:"CDRs (Committees for the Defence of the Revolution, 1960): surveillance committees in every workplace and neighbourhood block. One-third of the population enrolled by 1963. UMAP camps (1965–68): ~25,000 people in forced labour — dissidents, homosexuals, religious objectors, youth imitating US culture. The Mariel Boatlift (1980): 125,000+ fled; Castro released prisoners onto the boats and called emigrants 'scum.'",cat:"au_castro_power"},
  {id:"ca54",q:"What was the Revolutionary Offensive and the 10 Million Tons campaign?",a:"Revolutionary Offensive (1968): nationalized the remaining 58,000 small businesses. 10 Million Tons campaign (1970): aimed to produce 10 million tons of sugar in a single harvest. Failed — reached only 8.5 million tons while devastating other economic sectors as resources were diverted. Both reflected Che's vision of the 'new man' working through moral incentives, but showed the limits of voluntarism.",cat:"au_castro_power"},
  {id:"ca55",q:"How did the USSR's collapse affect Cuba?",a:"Soviet trade, subsidies, oil, and technicians all vanished overnight in 1991. Castro declared 'a special period in peacetime.' Severe food shortages, large ration cuts, gasoline/electricity in short supply. Disease spread (optic neuropathy from malnutrition). Response: cooperatives replaced state farms, foreign investment and tourism opened, US dollar legalized (1993), farmers' markets and limited self-employment allowed. The pure socialist vision was gone.",cat:"au_castro_power"},

  // ── RECONQUEST: STORY DATA ──
  {id:"rc80",q:"What was the Nasrid Kingdom's survival strategy (1230–1492)?",a:"'The foundation of the Kingdom of Granada was laid by consent, not force.' Muhammad I secured his position in 1232 by agreeing to become a tributary vassal of Castile — paying tribute (mostly in gold) and offering military support. Castilian kings often preferred the tribute revenue over the cost of conquest. In 1406, Granada even supplied troops for a joint Castile-Granada operation against the Marinids.",cat:"rc_reconquest"},
  {id:"rc81",q:"What triggered the fall of Granada (1482–1492)?",a:"Internal betrayal: Boabdil rebelled against his father Abu'l-Hasan Ali in 1482, allying with Castile — splitting Granada's forces when unity was essential. Ferdinand and Isabella systematically seized key towns: Ronda (1485), Málaga (1487). His mother allegedly said: 'Do not cry as a woman over what you could not defend like a man.' Three world-changing events in 1492: fall of Granada, expulsion of the Jews, Columbus's voyage.",cat:"rc_reconquest"},
  {id:"rc82",q:"What specific numbers show the scale of the expulsions?",a:"After the fall of Granada: ~300,000 Muslims expelled. ~1 million books burned (Arabic manuscripts — an irreplaceable cultural catastrophe). Cardinal Cisneros ordered mass conversions and burned 5,000+ manuscripts. The Treaty of Granada (25 November 1491) had promised Muslims religious freedom — these promises were violated within a decade. Philip II's 1567 ban triggered the Second Alpujarras: Don John razed Galera, 2,500 slaughtered including 400 women and children.",cat:"rc_expulsions"},
  {id:"rc83",q:"What was Cortés's legal strategy for legitimizing his conquest?",a:"Cortés had permission to explore and trade but NOT to colonize. His appointment was partly engineered by Amador de Lares (Velázquez's accountant) and merchant Andrés de Duero. Enrolled at Salamanca law faculty at age 14 — every letter to Charles V was a carefully crafted legal argument for why his unauthorized conquest should be legitimized. After defying Velázquez, returning empty-handed meant death. Legal training proved as important as military skill.",cat:"rc_mexico"},
  {id:"rc84",q:"What specific data shows the Inca Empire's scale?",a:"Tawantinsuyu ('Four Quarters') stretched from Ecuador to Chile — the largest pre-Columbian empire. Over 25,000 miles of roads with suspension bridges. No writing (quipus for records), no money (labour tax), no slavery as Europeans knew it. Mastered high-altitude farming with terraced fields. At Cajamarca (November 1532), just 168 Spaniards defeated the entire Inca army. Atahualpa offered a room of gold as ransom — executed anyway by garroting (1533).",cat:"rc_peru"},
  {id:"rc90",q:"Who was El Cid and what does he reveal about the early Reconquest?",a:"Rodrigo Díaz de Vivar ('El Cid') was a Castilian nobleman who fought for both Christian and Muslim rulers — hiring his services to whichever side offered the best terms. He epitomizes the political opportunism of the early Reconquest, when alliances crossed religious lines and personal gain mattered more than ideology. The Reconquest was not a continuous holy war but a centuries-long process where pragmatism frequently trumped religion.",cat:"rc_reconquest"},
  {id:"rc91",q:"What was the Mesta and how did warfare shape Castilian economy?",a:"The Mesta was a powerful guild of sheep owners dominating Castile's economy. Constant frontier warfare made farmland vulnerable to raids, so mobile property (sheep) was favoured over fixed agriculture. This created hidalgos — 'men proud of their Christian blood but without a penny, whose one resource was to go to the wars.' This warrior culture and contempt for manual labour transferred directly to the New World.",cat:"rc_reconquest"},
  {id:"rc92",q:"What was the Requerimiento?",a:"A Spanish legal document read aloud to indigenous peoples before attacking them. It demanded they accept Christianity and submit to Spanish rule, threatening war if they refused. Read in Spanish (which no indigenous person understood), often from a distance — a legal fiction justifying conquest. It recycled the same crusading ideology used against Muslims during the Reconquista against indigenous peoples of the Americas.",cat:"rc_colonial"},
  {id:"rc93",q:"How did Portugal's exploration weaken Granada?",a:"Portugal opened direct sea trade routes to Sub-Saharan Africa in the 1450s–60s, bypassing Granada entirely. This undercut Granada's role as a trade intermediary and weakened its Genoese banking connections. Combined with the Ottoman capture of Constantinople (1453) — which sharpened Christian-Muslim identities — Granada's economic and strategic importance faded just as Ferdinand and Isabella were consolidating Christian power.",cat:"rc_reconquest"},
  {id:"rc94",q:"What were the three world-changing events of 1492?",a:"(1) The fall of Granada — ending 781 years of Muslim presence in Iberia. (2) The expulsion of the Jews — removing a vital economic and intellectual community; Fuentes wrote the empire was born 'half-crippled.' (3) Columbus's voyage — opening the Americas to Spanish colonization. These three events are deeply connected: the Reconquista freed resources for overseas conquest, while religious zeal drove the expulsions and became the engine of colonization.",cat:"rc_reconquest"},
];

    {year:"1917–39",text:"The seeds of the Cold War were planted long before 1945. Since the Russian Revolution of 1917, two competing ideologies — capitalism and communism — existed as rival systems. In the 1920s, both the US (isolationism) and USSR (rebuilding after civil war) turned inward. In the 1930s, the US dealt with the Depression while Stalin distrusted the West after the Appeasement of Hitler at Munich (1938) — a policy later seen as a catastrophic failure that taught Truman never to appear 'soft.' Then came the shocking Non-Aggression Pact of 1939 between Stalin and Hitler — ideological enemies cooperating out of cynical self-interest. It deepened Western distrust of Stalin permanently."},
    {year:"1941–43",text:"The Atlantic Charter (August 1941) declared all peoples had a right to self-determination — directly challenging European imperialism. When Japan attacked Pearl Harbor (December 1941), the Grand Alliance of the US, UK, and USSR formed against the Axis powers. But fissures appeared as early as 1942 — the Allies shared a common enemy, not common goals. At Tehran (November 1943), Stalin, Roosevelt, and Churchill agreed on D-Day but disagreed on Poland's future. Stalin's obsession with security — the USSR had been invaded three times in the 20th century — was difficult for the West to distinguish from aggression. In 1944, Polish nationalists rose against German forces in the Warsaw Rising, but Soviet troops nearby deliberately did not intervene — the Germans crushed the uprising. This deliberate inaction deepened Western distrust of Stalin's intentions."},
    {year:"Feb 1945",text:"At Yalta, the Big Three agreed on the United Nations, division of Germany and Berlin into occupation zones, and the principle of 'free elections' in Eastern Europe. The USSR agreed to join the war against Japan. But the main disagreement was over Poland — Stalin set up a communist government while allowing some London exile Poles in. Roosevelt sought compromise; Churchill was desperate to keep the US engaged in Europe, fearing America might withdraw as it had after WWI."},
    {year:"Jul 1945",text:"At Potsdam, everything had changed. Roosevelt was dead (April 1945), replaced by Truman — a man with little foreign policy experience who took a much harder line against the USSR, determined not to repeat Chamberlain's Appeasement. Clement Attlee also replaced Churchill midway through the conference after winning UK elections, continuing the hostile stance toward the USSR. When Truman casually mentioned a 'new weapon of unusual destructive force,' Stalin appeared unimpressed — Soviet intelligence already knew about the Manhattan Project — but he was deeply offended by the lack of transparency. The conference exposed fundamental disagreements: the USSR wanted Germany kept weak to prevent future invasion; the US wanted a strong Germany for European recovery. The USSR also withdrew from Bretton Woods institutions (IMF, World Bank), signaling economic separation from the West. These irreconcilable visions would split the continent."},
    {year:"1945–46",text:"Across Eastern Europe, the Soviet method was brutally efficient — what became known as 'salami tactics,' slicing away opposition piece by piece. Stalin first insisted on coalition governments including communists, then systematically eliminated non-communist parties through intimidation, rigged elections, and disappearances of opposition leaders. Poland was physically shifted westward. Twelve million Germans were expelled. In the Soviet zone of Germany, the Red Army looted homes and hunted down women, even as Stalin ordered soldiers to feed Berliners. Soviet negotiation tactics were deliberate: stubborn delegates exhausted opponents, then Stalin would appear with a friendly smile, looking reasonable by comparison. In Iran, Stalin refused to withdraw troops after the war, confirming Truman's worst fears about Soviet expansionism."},
    {year:"Feb–Mar 1946",text:"George Kennan sent his 8,000-word Long Telegram from Moscow, warning that the USSR was inherently expansionist and must be contained. It electrified Washington. Weeks later, Churchill delivered his Iron Curtain speech at Fulton, Missouri. Stalin compared Churchill to Hitler. The ideological battle lines were drawn."},
    {year:"Mar 1947",text:"Britain, nearly bankrupt, could no longer support Greece and Turkey. Truman responded with the Truman Doctrine — declaring: 'I believe that it must be the policy of the United States to support free peoples who are resisting attempted subjugation by armed minorities or by outside pressures.' Congress approved $400 million in aid. Crucially, the governments of Greece and Turkey were in no way model democratic states — revealing that US containment prioritized anti-communism over genuine democracy. It was the definitive ideological split."},
    {year:"Jun 1947",text:"The Marshall Plan — $20 billion in economic aid for 17 countries. Churchill called it 'the most unselfish act in history,' though it also served US strategic interests: creating markets for American goods and binding Western Europe to the US economically. France received $2.7 billion, Greece nearly $700 million (US projects included importing mules to replace lost farm animals), Yugoslavia's Tito accepted over $150 million after breaking with Stalin. The CIA ran a massive campaign to defeat Italian communists in the 1948 elections — letters from Italian-Americans and covert funding helped the Christian Democrats win. Stalin ordered Eastern Europe to refuse and established COMECON as a counter — but it never matched American generosity. Czechoslovakia initially agreed to join but Stalin pressured them to withdraw; communists seized its government in 1948."},
    {year:"1948–49",text:"The Berlin Blockade became the first major crisis. After the West introduced a new currency (Deutschmark) in West Berlin, Stalin blocked all land transport. The West organized a massive airlift — supplying 2 million Berliners for nearly a year. Stalin backed down — a major Western morale boost. In 1949, three earthquakes: the FRG (West Germany) was created in September, the GDR (East Germany) in October, NATO was founded, the USSR detonated its first atomic bomb, and China fell to Mao's communists. The Cold War was now truly global."}
