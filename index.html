    {year:"1958",text:"Berlin was a wound that wouldn't heal. The city sat deep inside communist East Germany, split into Western and Eastern zones. A brain drain was bleeding East Germany dry — skilled workers crossed freely into West Berlin for higher pay and better lives. West Berliners, meanwhile, crossed east to buy goods at cheap communist prices, creating shortages for actual East Berliners. Over 300,000 people had fled to the West. For Khrushchev, this was unsustainable."},
    {year:"1958–59",text:"Khrushchev demanded the withdrawal of Western troops from Berlin and proposed making it a 'Free City.' He was also worried about nuclear weapons — West Germany (FRG) was in NATO and had been equipped with tactical nuclear weapons. The Geneva Conference and Paris Conference both attempted to resolve the crisis, but neither produced any conclusive outcome. The superpowers were at a deadlock."},
    {year:"Aug 1961",text:"Khrushchev acted. Overnight, the Berlin Wall went up — a physical barrier that would divide families, friends, and a city for 28 years. The wall was an admission of failure: the communist system couldn't compete with capitalism if people were free to choose. But it achieved its goal. The existence of East Germany was assured, and the Western powers, by tolerating the wall, implicitly recognized the GDR. German-American relations suffered, and Berlin increasingly relied on France. The Wall became the defining symbol of the Cold War — a propaganda loss for communism that highlighted the weakness of the entire Soviet bloc."},
    {year:"1959",text:"Meanwhile, 90 miles from Florida, Fidel Castro had overthrown the US-backed dictator Batista and established a communist-aligned regime in Cuba. This was no distant satellite state — this was in America's backyard, a direct challenge to US influence in the Western hemisphere."},
    {year:"Apr 1961",text:"Kennedy inherited a CIA plan to invade Cuba using trained Cuban exiles. He modified it — fatally removing US air support — and the Bay of Pigs invasion was a humiliating disaster. The failure had three consequences: it strengthened Castro, who now had proof of American aggression to justify his crackdowns; it made Kennedy look weak, particularly to Khrushchev; and it pushed Cuba deeper into the Soviet embrace."},
    {year:"Oct 1962",text:"American U-2 spy planes photographed Soviet nuclear missile sites being constructed in Cuba. The missiles could reach most major US cities within minutes. Kennedy's response was a naval blockade — he called it a 'quarantine' to avoid the legal implications of an act of war. For thirteen days, the world stood on the brink of nuclear annihilation. Soviet ships carrying more missiles sailed toward the blockade line. The Cuban Missile Crisis was the closest humanity has ever come to nuclear war."},
    {year:"Late Oct 1962",text:"A deal was struck. The Soviets would remove their missiles from Cuba; the US would quietly remove its missiles from Turkey and promise not to invade Cuba. The orthodox view credits Kennedy as calm and decisive; the revisionist view calls him reckless and self-interested. Khrushchev was humiliated. China's relations with the USSR deteriorated further — they saw Soviet retreat as proof the USSR was no longer truly revolutionary. But the crisis bore fruit: a hotline was established between Washington and Moscow, and the Limited Test Ban Treaty and Nuclear Non-Proliferation Treaty soon followed. The world was more secure — but the arms race escalated."}
  ]
},
cw_policy:{
  title:"How America Fought the Cold War",
  events:[
    {year:"1947–53",text:"Under Truman, the strategy was straightforward: containment. The US would assist any force resisting communism, use military power to protect vulnerable areas, and set up alliances to shield countries from Soviet influence. The Truman Doctrine, Marshall Plan, NATO, and the Korean War intervention were all expressions of this policy. NSC-68 provided the intellectual framework, calling for massive military spending to contain Soviet expansion."},
    {year:"1953–61",text:"Eisenhower inherited containment but transformed it. His 'New Look' policy was built on a key insight: the US couldn't afford to fight limited wars everywhere. Instead, it would rely on the threat of nuclear weapons — what became known as massive retaliation. The idea was simple: make the Soviets understand that any aggression would be met with overwhelming nuclear force, creating mutually assured destruction (MAD). This was cheaper than maintaining huge conventional forces, and it kept the peace through terror."},
    {year:"1953–61",text:"Eisenhower's Secretary of State, John Foster Dulles, advocated 'brinkmanship' — advancing to the very edge of war without crossing it, using nuclear threats to force adversaries to back down. He also proposed 'roll-back' — actually liberating communist countries in Europe through war — though this was never carried out. The CIA became Eisenhower's secret weapon, conducting covert operations to overthrow governments deemed too left-wing, including in Iran and Guatemala. SEATO was established to encircle the Soviet Union in Asia."},
    {year:"Comparison",text:"Both Truman and Eisenhower shared the same goal: stop communism from spreading. Both assisted anti-communist forces and used military power defensively. But where Truman prepared for potential direct confrontation (NSC-68), Eisenhower's New Look specifically avoided it, betting everything on nuclear deterrence and covert operations. Eisenhower expected that if denied opportunities to expand, the Soviet system would eventually collapse on its own — a prediction that would take another 30 years to come true."}
  ]
},
cw_end:{
  title:"The Cold War Ends (1985–1991)",
  events:[
    {year:"Early 1980s",text:"Ronald Reagan entered office with the most hardline anti-Soviet stance in decades. He called the USSR an 'evil empire' and dramatically increased military spending, forcing the Soviets into an arms race they couldn't afford. His Strategic Defence Initiative (SDI) — nicknamed 'Star Wars' — proposed a space-based missile shield that would make Soviet nuclear weapons obsolete. Whether or not SDI would actually work was almost irrelevant; it undermined the concept of Mutually Assured Destruction and left the USSR terrifyingly vulnerable."},
    {year:"1985",text:"Mikhail Gorbachev came to power in the USSR and everything changed. Unlike his predecessors, Gorbachev recognized that the Soviet system was failing. Under Brezhnev, roughly 25% of GDP had gone to military spending, draining the civilian economy. Gorbachev inherited a declining, exhausted nation. His response was radical: Perestroika (restructuring the economy) and Glasnost (openness to public scrutiny and criticism). For the first time, Soviet citizens could openly discuss what wasn't working — and compare their system to capitalism."},
    {year:"1985–88",text:"Reagan and Gorbachev met at multiple summits. Both men saw the dangers of nuclear weapons — they even discussed eliminating them entirely. Both were prepared to reverse their previous positions to reach compromises. The result was the INF Treaty of 1987, eliminating intermediate-range nuclear weapons from Europe. Reagan proved a better negotiator than anyone expected, willing to set aside his 'evil empire' rhetoric when genuine progress was possible."},
    {year:"1988",text:"Gorbachev abandoned the Brezhnev Doctrine — the policy that the USSR would use force to keep satellite states communist. In its place came what was jokingly called the 'Sinatra Doctrine' (after Frank Sinatra's 'My Way'): Eastern European countries could now choose their own political path. Gorbachev would not send tanks to crush protests. This single decision sealed the fate of the Soviet empire."},
    {year:"1989",text:"The dominoes fell, but this time in reverse. Across Eastern Europe, satellite states erupted in protest. People who had lived under communist rule for 40 years had watched Western living standards through border television and knew what they were missing. State-controlled industries were inefficient, products were shoddy, and shelves were bare. When Gorbachev made clear the Red Army wouldn't intervene, it was the green light. Country after country threw off communist rule. The Berlin Wall fell in November — the most powerful symbol of the Cold War destroyed by ordinary people with hammers."},
    {year:"1991",text:"The Soviet Union itself dissolved. Gorbachev's reforms had unleashed forces he couldn't control — Glasnost allowed criticism that undermined the system, while Perestroika failed to revive the economy fast enough. Capitalism appeared to have triumphed. International politics became 'uni-polar' — the USA was the only superpower left standing. Cuba lost its Soviet subsidies and plunged into the 'Special Period' of severe hardship. African regimes that had depended on Soviet aid collapsed. The Cold War was over."},
    {year:"Legacy",text:"Who ended the Cold War? Reagan's supporters credit his military pressure, which bankrupted the Soviets. Gorbachev's supporters point to his courage in reforming a failing system and choosing peace over force. The truth is that both were essential: Reagan created the pressure, and Gorbachev responded not with escalation but with transformation. Both saw the dangers of nuclear weapons, both worked through summits, and both were willing to reverse their positions. But Gorbachev's impact was larger — his decisions led directly to the collapse of the USSR and the end of the Cold War."}
  ]
},
au_muss_rise:{
  title:"From Chaos to Fascism: Mussolini's Rise (1871–1922)",
  events:[
    {year:"1871–1914",text:"Italy was unified on paper but broken in practice. Parliamentary government was weak — the 1848 Statuto gave the king broad powers, and only 2% of the population could vote. Corruption was endemic through 'transformism,' where political leaders constantly switched alliances to stay in power. The north developed industries in textiles, chemicals, and steel, while the south remained desperately poor and agricultural. Six million Italians emigrated because they saw no future at home. Italy joined the Triple Alliance and tried to build an empire — gaining Eritrea, Somalia, and Libya — but the humiliating defeat at Adowa in 1896 against Ethiopia showed the world that Italy was the weakest of the great powers."},
    {year:"1915–18",text:"Italy entered World War I hoping for territorial rewards. The cost was enormous, and when the peace came, Italy received far less than promised. The 'mutilated victory' at Versailles became a national grievance that poisoned Italian politics for years."},
    {year:"1919–20",text:"Post-war Italy was in crisis. Two million soldiers returned to find no jobs. Prices soared while wages stagnated. The 'Red Biennium' of 1919-1920 saw waves of strikes and factory occupations as workers demanded better conditions. In the countryside, landless peasants seized farms. For the Italian middle class, elites, and business owners, it looked like communist revolution was imminent — and they were terrified."},
    {year:"1919–21",text:"Into this chaos stepped Benito Mussolini. A former socialist journalist who had run the newspaper Avanti! before breaking with the left, he founded the Fasci di Combattimento in 1919. His genius was positioning fascism as the answer to everyone's fears. Using his newspaper Il Popolo d'Italia, he spread nationalism and anti-communism. He adopted Roman symbols like the fasces to project unity and power. His blackshirt squads violently attacked socialists, broke strikes, and destroyed leftist offices — winning the gratitude of industrialists and landowners who funded him. By 1921, a deal with the liberal politician Giolitti gave the Fascists 35 seats in parliament."},
    {year:"Oct 1922",text:"The March on Rome was more theatre than military operation. Mussolini's blackshirts converged on the capital, but the real drama was in the royal palace. King Victor Emmanuel III could have declared martial law and crushed the march, but he feared civil war and doubted the army's loyalty. Instead, he invited Mussolini to form a government. At 39, the former journalist was Prime Minister of Italy. The march was later mythologized through propaganda as a glorious seizure of power, but in truth it was a bluff that worked because the establishment let it."}
  ]
},
au_muss_power:{
  title:"Il Duce: Mussolini's Italy (1922–1943)",
  events:[
    {year:"1922–24",text:"Mussolini was Prime Minister but not yet dictator. He led a coalition government under the existing constitution, with few Fascists in his cabinet. He needed support from the King, army, business, and Church, any of whom could remove him. His strategy was dual: legal parliamentary maneuvers to win elite support, combined with street violence to intimidate opponents. The Acerbo Law of 1923 rigged the electoral system — whichever party got 25% of the vote would receive two-thirds of parliamentary seats."},
    {year:"Jun 1924",text:"Socialist deputy Giacomo Matteotti publicly denounced Fascist election fraud. Days later, he was kidnapped and murdered by Fascist thugs. The opposition withdrew from parliament in protest — the 'Aventine Secession' — but this backfired. The King and elites chose to back Mussolini over chaos, and the opposition lost its platform."},
    {year:"1925–26",text:"Mussolini moved decisively. He declared a dictatorship, banned all opposition parties, censored the press, created a secret police, and made himself accountable only to the King. As Professor Christopher Duggan noted, the regime focused on Mussolini personally rather than any clear ideology — it was a mix of force, propaganda, and opportunism. The Fascist Grand Council, created in 1923, theoretically advised on policy but in practice rubber-stamped whatever Mussolini decided."},
    {year:"1926–34",text:"The 'Corporate State' organized Italy's economy into 22 sector corporations — each containing employers, workers, and state representatives under Fascist control. Unions were banned, strikes outlawed, and class conflict supposedly replaced by national unity. In reality, corporativism favoured businesses and enforced state dominance over workers. Mussolini called his economic programs 'battles' — the Battle for Grain (food self-sufficiency), the Battle for Births (tax breaks for large families), the Battle for the Lira (currency revaluation). The language of war made economic policy feel heroic, but results were mixed at best."},
    {year:"1929",text:"The Lateran Accords with the Catholic Church were perhaps Mussolini's greatest diplomatic achievement. The Church gained Vatican City as an independent state, 750 million lire in compensation, and Catholicism as Italy's official religion. In return, the Fascists gained the Church's endorsement — ending decades of Catholic opposition and winning over millions of traditional rural Italians."},
    {year:"1930s",text:"The Great Depression hit Italy hard. The IRI (Institute for Industrial Reconstruction) nationalized key industries and stabilized banking, with steel production rising 50%. The Dopolavoro leisure organization was genuinely popular, providing recreation for ordinary workers. But the bigger picture was grim: GDP growth averaged only 1.5% annually, well below pre-war levels. Autarky (self-sufficiency) led to inefficiency and shortages. Wages fell, the South remained poor, women were confined to domestic roles, and war preparation wasted increasingly scarce resources. As one assessment put it, Fascist propaganda was 'essentially rhetoric and blather' — exaggerating successes while hiding structural failures."}
  ]
},
au_peron_rise:{
  title:"The Rise of Perón (1930–1946)",
  events:[
    {year:"1880–1930",text:"Argentina was the success story of Latin America. Built on a booming agricultural export economy — wheat and meat shipped to Europe — Buenos Aires transformed from a sprawling village into the 'Paris of South America.' The oligarchy, an educated elite of about 2-3% of the population, owned 95% of the land and lived in French-designed mansions in Barrio Norte. Meanwhile, European immigrants — millions of Italians and Spaniards — lived in crowded conventillos, tenements housing up to 350 people in cramped, poorly ventilated rooms. The gap between rich and poor was enormous, and it was growing."},
    {year:"1930–43",text:"The Great Depression shattered everything. A military coup toppled Argentina's democratic government, beginning what became known as the 'Infamous Decade' — a period of corrupt autocratic rule. Commodity prices collapsed, imports dried up, and people lost faith in the political system. Some industrial development began as Argentina tried to reduce its dependence on imports, but the fundamental problems — inequality, corruption, a broken political system — only deepened."},
    {year:"1943",text:"A military coup brought the GOU (Group of United Officers) to power — a secret society of young nationalist, anti-communist, ultra-Catholic officers including Colonel Juan Perón. They aimed to end corruption, restore the constitution, strengthen industry, and maintain neutrality in WWII. Crucially, they believed that improving workers' conditions from above would prevent communism from spreading — a strategy that would define Perón's entire political career."},
    {year:"1943–45",text:"Perón was appointed head of the Labour Department, which soon became the Secretary of Labour and Welfare. It was the perfect platform. He used the position to implement real reforms — paid vacations, severance pay, minimum wages, pensions — that directly improved millions of workers' lives. The genius of Perón's approach was that he made unions dependent on him personally. Workers understood that if Perón fell, their new rights might disappear with him. His experiences in Europe had taught him well — he admired Mussolini's organizational methods and learned practical ways to control and mobilize the masses."},
    {year:"9–17 Oct 1945",text:"Perón's growing power alarmed the military establishment and industrial elites. On 9 October, they had him arrested. But they underestimated what he had built. Eight days later, on 17 October 1945, a massive spontaneous demonstration of workers filled the streets of Buenos Aires demanding Perón's release. It was the awakening of Argentina's working-class political consciousness — a moment that changed the country forever. Perón was released, and the path to the presidency was open."},
    {year:"Feb 1946",text:"Perón won a decisive election victory. His coalition took all national senators except two, a two-thirds majority in the Chamber of Deputies, and every provincial governorship but one. The mandate was overwhelming, but Perón knew his position was still not fully secure — he lacked complete endorsement from all sectors of the armed forces and the civilian establishment."}
  ]
},
au_peron_power:{
  title:"Perón in Power (1946–1955)",
  events:[
    {year:"1946–47",text:"Perón moved swiftly to consolidate control. He dissolved all the parties that had supported his campaign and replaced them with a single party under his personal command — the Partido Justicialista. He purged the Supreme Court by impeaching three justices and appointing loyal replacements. Between 1943 and 1946, 110 publications were forced to close through fake inspections and disrupted paper supplies. Civil servants were required to join the Peronist Party. Opposition existed in name, but Radical leaders were expelled or jailed, and police disrupted opposition meetings."},
    {year:"1946–49",text:"Economically, Perón nationalized everything he could: the Central Bank (1946), railways, telecommunications, and foreign trade through the IAPI monopoly on exports. He pursued Import Substitution Industrialization (ISI), protecting domestic industries with tariffs and subsidies while using grain export profits to fund urban industrialization. Wages rose, prices were controlled, rents were frozen, and subsidized bakeries and utilities made life tangibly better for the working class. It was a purely statist policy — the government dominated every aspect of economic life."},
    {year:"Late 1940s",text:"Eva Perón became the emotional face of the regime. Through the Eva Perón Foundation (FEP) — which surpassed most government ministries in size, with assets exceeding $200 million and 14,000 employees — she personally delivered goods to the poor, attended to families, and built low-cost homes and hospitals. Her autobiographical manifesto 'La razón de mi vida' (1951) glorified Peronism and defined women's role as loyal supporters of Perón within the home. The FEP was a tool of political control as much as charity, but its impact on the lives of ordinary Argentines was real."},
    {year:"1949",text:"A new constitution allowed presidential re-election, nationalized public services, enabled state intervention in trade, and enshrined social rights. New textbooks conveyed Peronist messages through nationalist rhetoric with no criticism allowed. Teachers were required to transmit Peronist doctrine. Media was state-controlled, rallies were staged, and visual propaganda portrayed Perón and Evita as saviours of the working class."},
    {year:"1951",text:"The economy began to turn. Inflation rose, shortages appeared, and the easy gains of the early years evaporated. In 1951, Perón shut down La Prensa, one of Argentina's most prestigious newspapers, using official radio to counter its editorials before reopening it under pro-Perón direction. The regime's authoritarianism was becoming harder to disguise."},
    {year:"1955",text:"Economic decline after 1951 brought inflation and shortages that hurt workers, the middle class, and landowners alike. The Church, armed forces, and political parties — all alienated by Perón's authoritarianism and the cult of Eva (who had died in 1952) — formed an opposition coalition. Perón attacked the Church and repressed remaining freedoms. After a bombing of the presidential palace in June 1955, a military coup on 16 September overthrew him. Perón fled into exile, not returning until 1973."}
  ]
},
au_castro_rise:{
  title:"Revolution in Cuba (1952–1959)",
  events:[
    {year:"Before 1952",text:"Cuba was a paradox: high per capita income but deep inequality. The economy was a sugar-dominated monoculture, with US companies like United Fruit, Esso, and Texaco controlling key sectors. The Platt Amendment (1901-1934) had granted America the right to intervene in Cuba's internal affairs and secured the Guantánamo naval base, creating a semi-colonial relationship that defined Cuban nationalism as fundamentally anti-American. José Martí — the poet, journalist, and revolutionary who launched Cuba's 1895 independence war — remained the national hero whose ideals Castro would later claim to embody."},
    {year:"1940s–50s",text:"American organized crime, led by Meyer Lansky, turned Havana into a 'Latin Las Vegas' of casinos, nightclubs, and vice. Batista's first term (1940-44) had been relatively populist, but after his 1952 coup, 'the second Batista' was lazy and corrupt — driven by election fears and army demands, he failed to curb corruption while engaging in it himself. Unemployment hit 17%, rural poverty was extreme, and 200,000 peasant families had no land at all."},
    {year:"26 Jul 1953",text:"Fidel Castro, a young lawyer who had been running for Congress when Batista's coup cancelled elections, turned to armed revolution. His attack on the Moncada barracks with 140 rebels was meant to seize weapons and spark a nationwide uprising. It failed catastrophically — most attackers were killed or captured. But Castro's trial speech, 'History Will Absolve Me,' identified Cuba's crises with statistics and specific reform promises, transforming a courtroom defense into a revolutionary manifesto. The 26th of July Movement was born."},
    {year:"Dec 1956",text:"After exile in Mexico, Castro returned aboard the overloaded yacht Granma with about 80 armed rebels. Everything went wrong — delays, mechanical failures, a swamp landing that cost them their supplies, then a devastating ambush at Alegría de Pío. Only 12 survivors regrouped in the Sierra Maestra mountains. Among them were Raúl Castro, Che Guevara (an Argentine doctor who had joined in Mexico), and Camilo Cienfuegos."},
    {year:"1957–58",text:"From the Sierra Maestra, the rebels waged guerrilla warfare on their own terms — fighting on familiar, rugged terrain with unpaid but ideologically motivated soldiers who treated captured enemies humanely. Women like Vilma Espín, Haydée Santamaría, and Celia Sánchez played crucial roles in urban coordination, arms smuggling, and propaganda. The 26th of July Movement used bombings, sabotage of power infrastructure, and assassinations to destabilize Batista's regime. Castro's image as an approachable leader connected to the peasantry won him cross-class support."},
    {year:"1958–59",text:"Batista's own brutality sealed his fate. Mass torture and killings after Moncada and Granma had alienated the population. His army, demoralized and corrupt, began to crumble. In 1957, the US imposed an arms embargo after discovering Batista was misusing weapons meant for hemispheric defense. By late 1958, the question was not whether Batista would fall but when. On January 1, 1959, he fled. Castro and Cienfuegos entered Havana in triumph — signaling the end of tyranny and the dawn of a new Cuba."}
  ]
},
au_castro_power:{
  title:"Castro's Cuba (1959–Present)",
  events:[
    {year:"1959–60",text:"Castro moved fast. He removed Batista supporters and liberals from government, crushed revolts in the provinces, and implemented radical reforms. The Agrarian Reform redistributed land until the state owned 70% by 1963. Foreign businesses, sugar mills, and banks were nationalized. Rents were cut 50%, then later abolished entirely. When revolutionary commander Huber Matos criticized the growing communist influence, he was arrested for treason and sentenced to 20 years in a show trial — demonstrating that dissent, even from revolutionary heroes, would not be tolerated."},
    {year:"1960–61",text:"US-Cuba relations deteriorated rapidly as nationalization of American property provoked Washington. A commercial embargo was imposed, diplomatic relations broken, and the CIA planned an invasion. The Committees for the Defence of the Revolution (CDRs) were established — surveillance committees in every workplace and neighborhood block, with a third of the population enrolled by 1963. The literacy campaign of 1961 deployed 170,000 teachers to rural areas, dropping illiteracy from 23% to 4% — more schools were built in three years than in the previous 58. But education also became a tool for ideological formation."},
    {year:"Apr 1961",text:"The Bay of Pigs invasion was a humiliating American defeat and a propaganda triumph for Castro. It validated his warnings about US imperialism, rallied the population behind the revolution, and justified crackdowns on internal opposition. It accelerated Cuba's embrace of the USSR — Soviet economic aid, oil, machinery, and military equipment began flowing in."},
    {year:"Dec 1961",text:"Castro publicly declared himself a Marxist-Leninist. The reasons were partly pragmatic: US hostility forced him to seek Soviet protection, and Soviet aid required ideological alignment. Liberals and moderates had been pushed out; the PSP (Communist Party) filled the vacuum. Che Guevara's influence pushed toward a vision of the 'new man' who works for collective good rather than personal gain — an inspiring but ultimately impractical ideal."},
    {year:"1962",text:"The Cuban Missile Crisis showed Cuba was a pawn in superpower politics. The Soviets removed their missiles without consulting Castro — a bitter disappointment. But the US promise not to invade secured Cuba's survival, and Soviet subsidies continued for nearly three decades."},
    {year:"1960s–70s",text:"Castro's Cuba became a one-party state with total media control. Castro's speeches — long, passionate, instructing — were broadcast constantly. Every policy was framed in military language: harvests were 'battles,' plans were 'liberation campaigns.' Visual propaganda through posters rallied support for campaigns. The UMAP camps (1965-68) sent 25,000 people — dissidents, homosexuals, religious objectors — to forced labour. Castro told intellectuals: 'Within the Revolution, everything; against the Revolution, nothing.' The Padilla Affair in 1971, when a poet was arrested and forced into public confession, launched the 'grey years' of cultural terror."},
    {year:"1980",text:"The Mariel Boatlift revealed the regime's cracks. Over 125,000 Cubans fled via the port of Mariel. Castro used emigration as a safety valve — releasing prisoners and mentally ill people onto the boats and calling all emigrants 'scum.' It was repressive but pragmatic: letting dissatisfied people leave prevented the pressure from building to revolution."},
    {year:"1991–",text:"The collapse of the USSR was catastrophic. Soviet trade, subsidies, oil, and technicians all vanished overnight. Castro declared 'a special period in peacetime.' Severe food shortages, energy crises, and disease followed. In response, Cuba opened to foreign investment and tourism, legalized the US dollar (1993), allowed limited self-employment, and converted state farms to cooperatives. The revolution survived through adaptation — but the pure socialist vision was gone."}
  ]
},
rc_islamic:{
  title:"When the Moors Ruled Iberia (711–1492)",
  events:[
    {year:"711",text:"The Muslim conquest of the Iberian Peninsula was shockingly easy. The Goths — the Germanic people who had ruled Spain since the Roman Empire's decline — were torn apart by internal power struggles over the kingship. When the Moors crossed from North Africa, they defeated Roderic, the last Gothic king, and swept across nearly the entire peninsula in just a few years."},
    {year:"8th–10th C",text:"Under Muslim rule, Al-Andalus became one of the most advanced civilizations in the world. The Moors introduced new irrigation systems, new crops (sugar, cotton, silk), paper, and glass. Architecture, mathematics, medicine, and philosophy flourished, influencing all of Western Europe. This period gave rise to the concept of 'La Convivencia' — the idea that Muslims, Christians, and Jews coexisted in relative harmony. Bernard Lewis called it a 'golden age' by the standards of the time."},
    {year:"Reality",text:"The truth was more complicated. Non-Muslims were treated better than most conquered peoples in that era — they weren't confined to separate districts, weren't slaves, could practice their faith (with restrictions), and could earn a living. But they had to acknowledge Islamic superiority, pay extra taxes, wear a special badge, couldn't carry weapons, and Muslim men could marry non-Muslim women but not the reverse. David Nirenberg argued that violence was actually a central and systematic aspect of this coexistence — the 1066 massacre of Jews in Granada being a stark example."},
    {year:"11th–13th C",text:"Internal political and religious conflicts broke the Caliphate into numerous taifas — small, competing kingdoms. This fragmentation was the opportunity the Christian kingdoms in the north had been waiting for. They survived, grew strong, and launched the slow, centuries-long advance that would become the Reconquest. Muslim unity was briefly restored by forces from North Africa, but internal rebellions in 1144-45 shattered it permanently."},
    {year:"1492",text:"By the time Ferdinand and Isabella conquered Granada, the last Muslim stronghold, in 1492, Islam's dominion over Spain had been dying for centuries. What followed — forced conversions, expulsions, and the Inquisition — was the brutal conclusion of a story that had begun with relatively peaceful coexistence and ended in intolerance."}
  ]
},
rc_reconquest:{
  title:"The Reconquest and Spain's Transformation",
  events:[
    {year:"9th C",text:"The discovery of St. James's tomb in northwestern Spain gave the Christian kingdoms a warrior patron saint and a rallying cry. The Reconquest — centuries of warfare to reclaim the peninsula from Muslim rule — became not just a military campaign but a crusade. War became almost a Castilian way of life, creating a large class of warrior-nobles who regarded manual labour with contempt. Because constant warfare and raiding made farmland vulnerable, mobile property like sheep was favoured over agriculture — a preference that would shape Spain's economy for centuries."},
    {year:"13th C",text:"By the end of the 1200s, Muslim territory had been reduced to the small Kingdom of Granada. The Christian kingdoms were dominant but far from unified — Castile was ruled by powerful nobles with vast land holdings, while Aragon was governed by merchants who gained power through Mediterranean trade and commerce."},
    {year:"1469–92",text:"The marriage of Ferdinand of Aragon and Isabella of Castile created a unified Spain, but their policies sowed the seeds of future problems. They expanded Spanish influence and conquered Granada in 1492, but modern historians criticize them for favouring the aristocracy — by 1500, about 2-3% of the population owned 95% of the land. Eighty percent of Spaniards were impoverished peasants, which crippled the domestic market and meant Spain's industrial production never reached England's level."},
    {year:"1478",text:"The Spanish Inquisition was established to ensure religious orthodoxy in the newly unified kingdom. It targeted conversos — Jews and Muslims who had converted to Christianity but were suspected of secretly practicing their old faiths. The ideology of 'limpieza de sangre' (purity of blood) took hold, demanding a Spain cleansed of non-Christian elements."},
    {year:"1491",text:"The Treaty of Granada promised Muslims preservation of their mosques, use of their language, and the right to follow their own laws and customs. These promises were broken within a decade."},
    {year:"1492",text:"Three world-changing events in one year: the fall of Granada, the expulsion of the Jews, and Columbus's voyage to the Americas. The Jews — dominant in trade, finance, tax collection, and medicine — were forced to choose conversion or exile. Their loss crippled Spain's economy at the exact moment it was gaining an empire. As the historian Carlos Fuentes noted, the Spanish Empire was 'half-crippled' from birth."},
    {year:"1502–1609",text:"Muslims faced the same choice as Jews: convert or leave. Cardinal Cisneros organized mass conversions and burned over 5,000 priceless Arabic manuscripts. The First Rebellion of the Alpujarras (1499-1500) and Second Rebellion (1567, after Philip II banned Arabic language, dress, and customs) showed the futility of forced assimilation. The town of Galera was razed, salt sprinkled over the ruins, and 2,500 people slaughtered. The final expulsion of the Moriscos came in 1609."}
  ]
},
rc_expulsions:{
  title:"Purging the Peninsula: The Expulsions (1478–1609)",
  events:[
    {year:"1478",text:"The Spanish Inquisition was established by Ferdinand and Isabella with a singular purpose: ensure religious orthodoxy in the newly unified kingdom. Its primary targets were conversos — Jews and Muslims who had converted to Christianity, often under pressure, but were suspected of secretly practicing their former religions. The ideology of 'limpieza de sangre' (purity of blood) took hold, demanding a Spain purified of all non-Christian elements."},
    {year:"1491",text:"The Treaty of Granada, signed between Boabdil and the Catholic Monarchs, promised Muslims the preservation of their mosques and religious institutions, the use of their language, and the right to follow their own laws and customs. It seemed like a generous peace for the last Muslim stronghold. It would prove to be a lie."},
    {year:"1492",text:"The Edict of Expulsion of the Jews gave Spain's Jewish population an impossible choice: convert to Christianity or leave. The monarchs argued that previous measures had failed. In reality, the Jews were a dynamic economic force: dominant in trade, finance, tax collection, and medicine. Their expulsion crippled Spain at the exact moment it was gaining a global empire — the empire was born 'half-crippled.'"},
    {year:"1499–1500",text:"Cardinal Cisneros, Isabella's confessor, organized mass conversions and ordered the burning of over 5,000 priceless Muslim manuscripts in Arabic. When one of his agents was assassinated, the crown revoked the Treaty of Granada's promises. Muslims now faced exile or baptism. This triggered the First Rebellion of the Alpujarras."},
    {year:"1567",text:"Philip II banned Arabic language, Islamic religion, dress, and customs — attempting to erase Moorish identity. The Second Rebellion of the Alpujarras followed. Don John's forces razed Galera: salt sprinkled over the ruins, 2,500 slaughtered including 400 women and children. Moriscos who outwardly conformed secretly maintained their festivals and rituals — a defiance Old Christians found deeply offensive."},
    {year:"4 Apr 1609",text:"Philip III signed the final expulsion decree for the Moriscos. Beginning October 1609, converted Muslims were driven from Spain, mostly to the Maghrib coast. Their numbers had been growing, some had become successful merchants, and their refusal to abandon their cultural identity made them permanent outsiders. Spain completed the religious purification begun over a century earlier — and lost yet another community of skilled citizens it could not afford to lose."}
  ]
},
rc_mexico:{
  title:"The Fall of the Aztecs (1519–1521)",
  events:[
    {year:"Before 1519",text:"Tenochtitlán was one of the great cities of the world — built on a salt lake, home to at least 250,000 people, with wide straight streets that were half land and half canals. Its marketplace, comparable to Salamanca, hosted 60,000 traders daily. Forty towers, some taller than Seville's cathedral, rose above the city. Fresh water flowed from the Chapultepec aqueduct. But the Aztec Empire had enemies. The Tlaxcalans endured perpetual 'flower wars' — ritual conflicts that provided human sacrifices. Their hatred of the Aztecs ran so deep that when a strange new enemy appeared, the Tlaxcalans would become his most loyal allies."},
    {year:"1517–18",text:"The first Spanish expeditions to the Yucatán discovered the riches of mainland Mexico. Hernández de Córdoba returned mortally wounded after fierce Maya resistance. Grijalva's follow-up expedition traded with locals and heard rumors of the Aztec Empire's vast wealth through Moctezuma's emissaries."},
    {year:"Feb 1519",text:"Hernán Cortés sailed from Cuba with permission from Governor Velázquez to explore and trade — but explicitly not to colonize. Cortés, who had studied law at the University of Salamanca, knew exactly what he was doing when he exceeded his authority. His legal training would prove as important as his military skill — every letter to King Charles V was a carefully crafted argument for why his unauthorized conquest should be legitimized."},
    {year:"1519",text:"Two factors converged to doom the Aztecs: myth and weaponry. The year 1519 corresponded to the prophesied return of Quetzalcoatl — the feathered serpent god, described as fair-skinned and bearded, arriving from the east. Cortés matched the description. Additionally, the Spanish brought steel swords, armor, guns, and horses — none of which the Aztecs had ever seen. They also brought a translator who changed history: Malintzin (La Malinche), an indigenous woman fluent in Nahuatl and Mayan, who became Cortés's interpreter, advisor, and the key to communicating with Aztec emissaries and recruiting allies."},
    {year:"Nov 1519",text:"Cortés entered Tenochtitlán via the Iztapalapa Causeway. Bernal Díaz del Castillo, a common soldier whose memoir provides the rawest account of the conquest, described his awe at the city's beauty — the crowded lake full of canoes, causeways with bridges, towers and shrines of masonry. Cortés attempted to embrace Moctezuma but was stopped by the lords. He placed a necklace of pearls and cut glass around Moctezuma's neck. Two worlds had met."},
    {year:"1520",text:"The Spanish massacred Aztec nobles during a festival, sparking a revolt that drove Cortés out during the 'Noche Triste' (Night of Sorrows) via the Tacuba Causeway. Moctezuma died during the fighting — Cortés claimed he was killed by his own people with arrows and stones; Bernal Díaz said a single stone strike killed him. The Aztecs' ritualistic approach to war — prioritizing live capture over killing — had prevented them from destroying the Spanish when they had the chance."},
    {year:"Aug 1521",text:"Cortés returned with Tlaxcalan allies and laid siege to Tenochtitlán. After months of brutal fighting, disease (smallpox had devastated the defenders), and starvation, the city fell on August 13, 1521. The Broken Spears — a collection of indigenous accounts using surviving codices — records these events from the perspective of the conquered, preserving what the conquerors' accounts leave out."}
  ]
},
rc_peru:{
  title:"The Conquest of the Inca Empire (1532–1548)",
  events:[
    {year:"Before 1532",text:"The Inca Empire — Tawantinsuyu, the 'Four Quarters' — was the largest in pre-Columbian America, stretching from Ecuador to Chile. Over 25,000 miles of roads connected it. The Sapa Inca ruled as a divine descendant of the sun god Inti. There was no writing (records were kept on quipus), no money (a labor tax system instead), and no slavery as Europeans understood it. They mastered high-altitude farming with terraced fields and irrigation. Their army fielded tens of thousands of warriors — but armed with slings, clubs, and bronze weapons, not steel."},
    {year:"c.1528–32",text:"Before a single Spaniard arrived, smallpox — brought by earlier European contact — swept through the empire. Emperor Huayna Capac died, and a devastating civil war erupted between his sons Atahualpa (who controlled the north) and Huáscar (who held the south). This internal conflict divided loyalties, depleted resources, and left the empire fragmented. It was into this chaos that Francisco Pizarro marched."},
    {year:"Nov 1532",text:"At Cajamarca, history's most audacious ambush unfolded. Pizarro — an illiterate soldier of fortune from Extremadura, Spain's poorest region — lured Atahualpa into the town's plaza for a meeting. Fray Valverde delivered a religious ultimatum demanding the Inca accept Christianity and submit to Spanish rule, presenting a Bible. When Atahualpa discarded the Bible, Valverde signaled the attack. With cannons, cavalry, and steel, 168 Spaniards slaughtered thousands of lightly armed Incas and captured the emperor."},
    {year:"1532–33",text:"Atahualpa offered an extraordinary ransom — enough gold to fill a room — and Huáscar tried to match it. The Spanish took both offers and then executed Atahualpa anyway, after a mock trial on charges of rebellion. He was garroted in Cajamarca's plaza after accepting baptism — sources broadly agree on strangulation, though details vary."},
    {year:"1533–41",text:"Post-conquest Peru descended into chaos that revealed the true nature of the conquistadors. Pizarro installed Manco as a puppet Inca ruler, but Manco rebelled in 1536 with a massive insurrection. Then Pizarro and his former partner Diego de Almagro turned on each other over control of Cusco. Almagro was strangled in 1538; his embittered followers assassinated Pizarro in 1541. The conquistadors were driven by personal gain — wealth, land, and power — not loyalty to Spain."},
    {year:"1544–48",text:"When Viceroy Blasco Núñez Vela arrived to enforce the New Laws (which restricted the encomienda system), the settlers revolted. Gonzalo Pizarro — Francisco's half-brother — killed the viceroy and briefly ruled Peru until he was defeated by Pedro de la Gasca in 1548. The Crown learned that its conquistadors were as dangerous as its enemies, and began replacing them with professional administrators."},
    {year:"How?",text:"How did a handful of Spaniards conquer two empires? Five factors combined: superior military technology (steel, guns, horses); indigenous alliances (the Tlaxcalans against the Aztecs, rival Inca factions against Atahualpa); disease (smallpox devastated both empires before full-scale fighting); centralized rule (capturing the divine emperor paralyzed the entire system); and religious/cultural misunderstandings that the Spanish ruthlessly exploited. Remove any single factor, and the conquest might have failed."}
  ]
},
rc_colonial:{
  title:"God, Gold, and Glory: Colonial Systems",
  events:[
    {year:"Connection",text:"The Conquest of the Americas was a direct continuation of the Reconquest in Iberia. Centuries of warfare against the Moors had bred a warrior aristocracy in Extremadura and Castile — men proud of their Christian blood but without a penny, whose one resource was to go to the wars. When the Reconquista ended in 1492, these men turned to the New World, carrying the same trinity of motives: God, Gold, and Glory. Cortés explicitly compared indigenous architecture to Granada. The template of domination and exclusion, perfected against the Moors, was applied wholesale to the Americas."},
    {year:"Early 1500s",text:"The Encomienda system became the backbone of colonial exploitation. Spanish settlers (encomenderos) were granted authority over groups of indigenous people, who were required to provide labour, tribute, or goods in exchange for supposed protection and Christian instruction. It wasn't legally slavery, but in practice the distinction was often meaningless. The Mita system in the Andes went further — requiring indigenous communities to provide workers for mines, plantations, or public projects in rotational shifts that frequently led to forced displacement and death."},
    {year:"1502–14",text:"Bartolomé de Las Casas arrived in the New World as a colonist and encomendero. But in 1514, witnessing the atrocities firsthand and hearing a sermon denouncing the encomienda system, he underwent a dramatic conversion. He renounced his wealth, became a Dominican friar, and dedicated his life to defending indigenous peoples. His 'Short Account of the Destruction of the Indies' (1542) documented colonial horrors with vivid detail."},
    {year:"1542–43",text:"Las Casas's advocacy influenced the New Laws, enacted under Emperor Charles V. Encomiendas couldn't be inherited. Indigenous enslavement was banned. Labour burdens were to be reduced. But enforcement was another matter — in Peru, Gonzalo Pizarro led a full rebellion against the laws, killing the viceroy. The Crown was forced to weaken enforcement, revealing the limits of reform when those profiting from exploitation had armies."},
    {year:"1550–51",text:"The Valladolid Debate was the intellectual climax of the colonial moral crisis. Juan Ginés de Sepúlveda argued that indigenous peoples were 'natural slaves' who could be rightfully conquered and forcibly converted. Las Casas countered that they were rational humans with inherent rights, deserving of peaceful evangelization. Sepúlveda was backed by colonial elites; Las Casas by Dominican and Franciscan missionaries and parts of the Crown. The debate had no clear winner, but Las Casas's arguments planted seeds that would grow into modern human rights discourse."},
    {year:"Legacy",text:"Las Casas's writings, ironically, also fueled the 'Black Legend' — a narrative of unique Spanish cruelty that Spain's rivals (England, Netherlands) translated and spread as anti-Spanish propaganda. The Church's role was equally complex: elite friars driven by genuine missionary zeal arrived alongside conquistadors, some envisioning utopian indigenous communities. Vasco de Quiroga and Las Casas admired indigenous simplicity. But these reformist attitudes always clashed with the encomenderos' profit motive. As Louise Burkhart observed, indigenous peoples found ways to become 'just Christian enough to get by' — the Day of the Dead, merging Aztec death rituals with All Saints' Day, survives as living proof that the conquered were never fully conquered."}
  ]
}
};

// ─── SRS INTERVALS (short-term first) ───
const SRS_INTERVALS=[
  2*60*1000,5*60*1000,15*60*1000,60*60*1000,4*3600000,12*3600000,
  86400000,3*86400000,7*86400000,14*86400000,30*86400000
];
const SRS_LABELS=['2m','5m','15m','1h','4h','12h','1d','3d','1w','2w','1mo'];

function formatCountdown(ms){
  if(ms<=0)return'now';const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);
  if(d>0)return`${d}d ${h%24}h`;if(h>0)return`${h}h ${m%60}m`;if(m>0)return`${m}m ${s%60}s`;return`${s}s`;
}

// ─── STATS STORE — subtopic SRS ───
function createStatsStore(){
  const KEY='ib_history_sl_stats_v3';
  let data;try{data=JSON.parse(localStorage.getItem(KEY))||{}}catch(e){data={}}
  if(!data.attempts)data.attempts=[];if(!data.srs)data.srs={};
  if(!data.totalSessions)data.totalSessions=0;if(!data.firstOpened)data.firstOpened=Date.now();
  data.totalSessions++;
  const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(data))}catch(e){}};
  let _pt=null;
  const saveAndSync=()=>{save();if(CloudSync.isConfigured()){clearTimeout(_pt);_pt=setTimeout(()=>CloudSync.push(data),2000)}};
  save();
  return{
    record(cat,mode,score,total,detail){data.attempts.push({cat,mode,score,total,detail,ts:Date.now()});saveAndSync()},
    updateSubtopicSrs(catId,score,total){
      const ratio=score/Math.max(total,1);
      let c=data.srs[catId]||{level:0,next:0,streak:0,lastReview:0,totalReviews:0};
      c.lastReview=Date.now();c.totalReviews++;
      if(ratio>=0.6){c.streak++;c.level=Math.min(c.level+1,SRS_INTERVALS.length-1)}
      else{c.streak=0;c.level=Math.max(0,c.level-2)}
      c.next=Date.now()+SRS_INTERVALS[c.level];
      data.srs[catId]=c;saveAndSync();
    },
    getSrs(catId){return data.srs[catId]||null},
    getAllSrs(){return data.srs},
    getDueCats(){const now=Date.now();return Object.entries(data.srs).filter(([,v])=>v.next<=now).map(([k])=>k)},
    getSubtopicProf(catId){
      const a=data.attempts.filter(x=>x.cat===catId);if(!a.length)return 0;
      return Math.round(a.slice(-5).reduce((s,x)=>s+x.score/x.total,0)/Math.min(a.length,5)*100);
    },
    getGrade(catId){
      const p=this.getSubtopicProf(catId);
      if(p>=90)return{g:'A',c:'var(--green)',l:'Excellent'};if(p>=75)return{g:'B',c:'#86efac',l:'Strong'};
      if(p>=60)return{g:'C',c:'var(--accent2)',l:'Okay'};if(p>=40)return{g:'D',c:'var(--orange)',l:'Needs Work'};
      if(p>0)return{g:'E',c:'var(--red)',l:'Weak'};return{g:'—',c:'var(--text3)',l:'New'};
    },
    proficiency(){
      const cats=Object.keys(CATEGORIES);
      const sc=cats.map(c=>{const a=data.attempts.filter(x=>x.cat===c);return a.length?a.reduce((s,x)=>s+x.score/x.total,0)/a.length:0});
      const acc=sc.reduce((s,v)=>s+v,0)/cats.length;
      const cov=cats.filter(c=>data.attempts.some(x=>x.cat===c)).length/cats.length;
      const rec=data.attempts.slice(-10),old=data.attempts.slice(-20,-10);
      const rA=rec.length?rec.reduce((s,x)=>s+x.score/x.total,0)/rec.length:0;
      const oA=old.length?old.reduce((s,x)=>s+x.score/x.total,0)/old.length:rA;
      return Math.round((acc*.45+cov*.25+(.5+.5*(rA-oA))*.15+Math.min(1,data.attempts.length/30)*.15)*100)
    },
    getAttempts(){return data.attempts},getByCat(c){return data.attempts.filter(x=>x.cat===c)},getByMode(m){return data.attempts.filter(x=>x.mode===m)},
    reset(){data.attempts=[];data.srs={};data.totalSessions=1;data.firstOpened=Date.now();saveAndSync()},
    exportData(){return JSON.stringify(data,null,2)},
    importData(json){try{const p=JSON.parse(json);if(!p.attempts&&!p.srs)throw new Error('Invalid');data.attempts=p.attempts||[];data.srs=p.srs||{};data.totalSessions=p.totalSessions||1;data.firstOpened=p.firstOpened||Date.now();saveAndSync();return{success:true,cards:Object.keys(data.srs).length,attempts:data.attempts.length}}catch(e){return{success:false,error:e.message}}},
    async pullFromCloud(){const r=await CloudSync.pull();if(!r.ok)return r;if(!r.data||r.empty)return{ok:true,msg:'No cloud data'};const cl=r.data,lA=data.attempts.length,cA=(cl.attempts||[]).length;if(cA>lA||(cA===lA&&Object.keys(cl.srs||{}).length>Object.keys(data.srs).length)){data.attempts=cl.attempts||[];data.srs=cl.srs||{};data.totalSessions=Math.max(data.totalSessions,cl.totalSessions||0);data.firstOpened=Math.min(data.firstOpened,cl.firstOpened||Date.now());save();return{ok:true,msg:`Pulled ${cA} rounds from cloud`,replaced:true}}return{ok:true,msg:`Local is newer.`,replaced:false}},
    async pushToCloud(){return await CloudSync.push(data)},
    get data(){return data}
  }
}

const StatsContext=createContext();const MobileContext=createContext(false);
const useStats=()=>useContext(StatsContext);const useMobile=()=>useContext(MobileContext);

// ─── UI COMPONENTS ───
function SplitProgress({correct,wrong,total}){
  const r=total-correct-wrong,pct=v=>(v/Math.max(total,1))*100;
  return <div className="split-progress">{correct>0&&<div className="seg" style={{width:`${pct(correct)}%`,background:'var(--green)'}}/>}{wrong>0&&<div className="seg" style={{width:`${pct(wrong)}%`,background:'var(--red)'}}/>}{r>0&&<div className="seg" style={{width:`${pct(r)}%`,background:'var(--bg4)'}}/>}</div>
}

function SubtopicPicker({active,setActive,topicFilter}){
  const stats=useStats();const cats=Object.entries(CATEGORIES).filter(([,v])=>!topicFilter||v.topic===topicFilter);
  return <div className="cat-bar"><button className={`cat-chip ${!active?'active':''}`} style={!active?{background:'var(--accent)',color:'var(--bg)'}:{}} onClick={()=>setActive(null)}>All</button>
    {cats.map(([k,v])=>{const srs=stats.getSrs(k);const isDue=srs&&srs.next<=Date.now();
      return <button key={k} className={`cat-chip ${active===k?'active':''}`} style={active===k?{background:v.color}:{borderColor:isDue?'var(--orange)':'var(--bg4)'}} onClick={()=>setActive(active===k?null:k)}>{isDue&&<span style={{color:'var(--orange)',marginRight:3}}>●</span>}{v.label}</button>})}</div>
}
function TopicFilter({active,setActive}){
  return <div className="cat-bar"><button className={`cat-chip ${!active?'active':''}`} style={!active?{background:'var(--accent)',color:'var(--bg)'}:{}} onClick={()=>setActive(null)}>All Topics</button>
    {Object.entries(TOPICS).map(([k,v])=><button key={k} className={`cat-chip ${active===k?'active':''}`} style={active===k?{background:v.color}:{}} onClick={()=>setActive(active===k?null:k)}>{v.icon} {v.label}</button>)}</div>
}

function SrsTimer({catId}){
  const stats=useStats();const [now,setNow]=useState(Date.now());
  useEffect(()=>{const i=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(i)},[]);
  const srs=stats.getSrs(catId);
  if(!srs)return <span className="srs-badge" style={{background:'var(--bg4)',color:'var(--text3)'}}>NEW</span>;
  const d=srs.next-now;
  if(d<=0)return <span className="srs-badge" style={{background:'#fb923c22',color:'var(--orange)'}}>DUE NOW</span>;
  return <span className="srs-badge" style={{background:srs.streak>=3?'var(--green-dim)':'var(--blue-dim)',color:srs.streak>=3?'var(--green)':'var(--blue)'}}>{formatCountdown(d)}</span>;
}

function DueBanner({topicFilter,onStart}){
  const stats=useStats();const [,setT]=useState(0);
  useEffect(()=>{const i=setInterval(()=>setT(t=>t+1),5000);return()=>clearInterval(i)},[]);
  const dc=stats.getDueCats().filter(k=>!topicFilter||CATEGORIES[k]?.topic===topicFilter);
  if(!dc.length)return null;
  return <div className="due-banner fade-in" onClick={onStart}><div className="pulse"/><span style={{flex:1}}><strong>{dc.length}</strong> subtopic{dc.length>1?'s':''} due: {dc.map(k=>CATEGORIES[k]?.label).join(', ')}</span><span style={{color:'var(--accent)',fontWeight:600,fontSize:'.8rem'}}>Review →</span></div>
}

// ─── BROWSE ───
function BrowseMode({items,topicFilter}){
  const [search,setSearch]=useState('');const [cf,setCf]=useState(null);const [exp,setExp]=useState({});
  const filtered=items.filter(c=>{if(cf&&c.cat!==cf)return false;if(topicFilter&&CATEGORIES[c.cat]?.topic!==topicFilter)return false;if(search){const s=search.toLowerCase();return c.q.toLowerCase().includes(s)||c.a.toLowerCase().includes(s)}return true});
  return <div className="fade-in">
    <div className="search-wrap"><span className="icon">🔍</span><input placeholder="Search facts..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    <SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/>
    <p style={{color:'var(--text3)',fontSize:'.8rem',marginBottom:12}}>{filtered.length} items</p>
    {filtered.map((c,i)=>{const cat=CATEGORIES[c.cat];return <div key={c.id} className={`card expandable ${exp[i]?'open':''}`} onClick={()=>setExp(p=>({...p,[i]:!p[i]}))} style={{borderLeft:`3px solid ${cat?.color}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div className="card-title">{c.q}<span className="chevron">▼</span></div><span className="card-tag" style={{background:cat?.color+'22',color:cat?.color,flexShrink:0,marginLeft:8}}>{cat?.label}</span></div>
      {exp[i]&&<div className="card-sub" style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--bg4)'}}>{c.a}</div>}
    </div>})}
  </div>
}

// ─── RECALL ───
function RecallMode({items,topicFilter,modeName='Recall',forcedCards=null}){
  const stats=useStats();const [cf,setCf]=useState(null);
  const pool=useMemo(()=>{if(forcedCards)return forcedCards;let p=items;if(cf)p=p.filter(c=>c.cat===cf);else if(topicFilter)p=p.filter(c=>CATEGORIES[c.cat]?.topic===topicFilter);return[...p].sort(()=>Math.random()-.5)},[topicFilter,cf,forcedCards]);
  const [idx,setIdx]=useState(0);const [fl,setFl]=useState(false);const [res,setRes]=useState(null);
  const [sc,setSc]=useState({c:0,w:0});const [hist,setHist]=useState([]);
  const total=Math.min(pool.length,15);const cards=pool.slice(0,total);
  useEffect(()=>{setIdx(0);setFl(false);setSc({c:0,w:0});setHist([]);setRes(null)},[cf]);
  const flip=useCallback(()=>{if(!fl){setFl(true);SFX.flip()}},[fl]);
  const mark=useCallback((ok)=>{
    const card=cards[idx];
    if(ok){SFX.correct();setSc(p=>({...p,c:p.c+1}))}else{SFX.wrong();setSc(p=>({...p,w:p.w+1}))}
    const nh=[...hist,{id:card.id,ok}];setHist(nh);
    if(idx+1>=total){SFX.complete();const s=sc.c+(ok?1:0);stats.record(card.cat,modeName,s,total,modeName);
      const cs={};nh.forEach(h=>{const c=CARDS.find(x=>x.id===h.id);if(c){if(!cs[c.cat])cs[c.cat]={s:0,t:0};cs[c.cat].t++;if(h.ok)cs[c.cat].s++}});
      Object.entries(cs).forEach(([cat,{s,t}])=>stats.updateSubtopicSrs(cat,s,t));
      setRes({score:s,total,hist:nh})}
    else{setIdx(idx+1);setFl(false)}
  },[idx,total,sc,fl,hist]);
  useEffect(()=>{const h=e=>{if(e.code==='Space'){e.preventDefault();flip()}else if(e.key==='1'||e.code==='ArrowLeft')mark(false);else if(e.key==='2'||e.code==='ArrowRight')mark(true)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[flip,mark]);

  if(res)return <div className="results-overlay slide-up"><div style={{fontSize:'3rem'}}>🎉</div><div className="score" style={{color:res.score/res.total>.7?'var(--green)':'var(--accent2)'}}>{res.score}/{res.total}</div><SplitProgress correct={res.score} wrong={res.total-res.score} total={res.total}/><div className="msg">{res.score/res.total>.8?'Excellent!':res.score/res.total>.5?'Good progress!':'Keep going!'}</div><div style={{textAlign:'left',marginBottom:20,maxHeight:200,overflowY:'auto'}}>{res.hist.map((h,i)=>{const c=CARDS.find(x=>x.id===h.id);return c?<div key={i} style={{display:'flex',gap:8,padding:'3px 0',fontSize:'.78rem'}}><span style={{color:h.ok?'var(--green)':'var(--red)',fontWeight:700,width:16}}>{h.ok?'✓':'✕'}</span><span style={{color:'var(--text2)'}}>{c.q}</span></div>:null})}</div><button className="btn btn-primary" onClick={()=>{setIdx(0);setFl(false);setSc({c:0,w:0});setHist([]);setRes(null)}}>Again</button></div>;
  if(!cards.length)return <div className="fade-in">{!forcedCards&&<SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/>}<p style={{color:'var(--text3)',textAlign:'center',padding:40}}>No cards for this filter.</p></div>;
  const card=cards[idx],cat=CATEGORIES[card.cat];
  return <div className="fade-in">{!forcedCards&&<SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/>}<SplitProgress correct={sc.c} wrong={sc.w} total={total}/><div className="flashcard" onClick={flip} style={{borderColor:fl?cat?.color+'44':'var(--bg4)'}}><span className="label" style={{color:cat?.color}}>{cat?.label}</span><span className="counter">{idx+1}/{total}</span>{!fl?<div className="question">{card.q}</div>:<div className="answer">{card.a}</div>}{!fl&&<span className="flip-hint">tap or Space to flip</span>}<SrsTimer catId={card.cat}/></div>{fl&&<div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}><button className="btn btn-wrong" onClick={()=>mark(false)}>✕ Didn't Know (1)</button><button className="btn btn-correct" onClick={()=>mark(true)}>✓ Knew It (2)</button></div>}</div>
}

// ─── MASTERY ───
function MasteryMode({items,topicFilter}){
  const stats=useStats();const [cf,setCf]=useState(null);
  const pool=useMemo(()=>{let p=items;if(cf)p=p.filter(c=>c.cat===cf);else if(topicFilter)p=p.filter(c=>CATEGORIES[c.cat]?.topic===topicFilter);return[...p].sort(()=>Math.random()-.5).slice(0,10)},[topicFilter,cf]);
  const [idx,setIdx]=useState(0);const [fl,setFl]=useState(false);const [rn,setRn]=useState(1);
  const [done,setDone]=useState(false);const [wrong,setWrong]=useState([]);const [rc,setRc]=useState(0);const [rw,setRw]=useState(0);
  const total=pool.length;const cur=rn===1?pool:wrong;
  useEffect(()=>{setIdx(0);setFl(false);setRn(1);setDone(false);setWrong([]);setRc(0);setRw(0)},[cf]);
  const flip=useCallback(()=>{if(!fl){setFl(true);SFX.flip()}},[fl]);
  const mark=useCallback((ok)=>{
    if(ok){SFX.correct();setRc(c=>c+1)}else{SFX.wrong();setRw(c=>c+1);if(rn===1)setWrong(p=>[...p,cur[idx]])}
    if(idx+1>=cur.length){
      if(rn===1&&wrong.length+(ok?0:1)>0){if(!ok)setWrong(p=>[...p,cur[idx]]);setRn(2);setIdx(0);setFl(false);setRc(0);setRw(0)}
      else if(rn>=2){const nw=ok?wrong.filter((_,i)=>i!==idx):wrong;
        if(nw.length===0||(ok&&wrong.length<=1)){SFX.complete();stats.record(pool[0]?.cat||'mixed','Mastery',total,total,'Mastery');const mc=cf||pool[0]?.cat;if(mc)stats.updateSubtopicSrs(mc,total,total);setDone(true)}
        else{setWrong(nw.sort(()=>Math.random()-.5));setIdx(0);setFl(false);setRn(r=>r+1);setRc(0);setRw(0)}}
      else{SFX.complete();stats.record(pool[0]?.cat||'mixed','Mastery',total,total,'Mastery');setDone(true)}
    }else{setIdx(idx+1);setFl(false)}
  },[idx,rn,wrong,cur,total]);
  useEffect(()=>{const h=e=>{if(e.code==='Space'){e.preventDefault();flip()}else if(e.key==='1'||e.code==='ArrowLeft')mark(false);else if(e.key==='2'||e.code==='ArrowRight')mark(true)};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[flip,mark]);

  if(done)return <div className="results-overlay slide-up"><div style={{fontSize:'3rem'}}>🏆</div><div className="score" style={{color:'var(--green)'}}>Mastered!</div><div className="msg">All {total} cards in {rn} round{rn>1?'s':''}.</div><button className="btn btn-primary" onClick={()=>{setIdx(0);setFl(false);setRn(1);setDone(false);setWrong([]);setRc(0);setRw(0)}}>New Set</button></div>;
  if(!cur.length)return <div className="fade-in"><SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/><p style={{color:'var(--text3)',textAlign:'center',padding:40}}>No cards.</p></div>;
  const card=cur[idx],cat=CATEGORIES[card?.cat];
  return <div className="fade-in"><SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/><div style={{display:'flex',justifyContent:'space-between',marginBottom:8,fontSize:'.8rem',color:'var(--text3)'}}><span>Round {rn}{rn>1?` (${cur.length} left)`:''}</span><span>{idx+1}/{cur.length}</span></div><SplitProgress correct={rc} wrong={rw} total={cur.length}/><div className="flashcard" onClick={flip}><span className="label" style={{color:cat?.color}}>{cat?.label}</span>{!fl?<div className="question">{card.q}</div>:<div className="answer">{card.a}</div>}{!fl&&<span className="flip-hint">tap or Space to flip</span>}<SrsTimer catId={card.cat}/></div>{fl&&<div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}><button className="btn btn-wrong" onClick={()=>mark(false)}>✕ Still Learning</button><button className="btn btn-correct" onClick={()=>mark(true)}>✓ Got It</button></div>}</div>
}

// ─── TYPE IT ───
function TypeItMode({items,topicFilter}){
  const stats=useStats();const [cf,setCf]=useState(null);
  const pool=useMemo(()=>{let p=items;if(cf)p=p.filter(c=>c.cat===cf);else if(topicFilter)p=p.filter(c=>CATEGORIES[c.cat]?.topic===topicFilter);return[...p].sort(()=>Math.random()-.5).slice(0,8)},[topicFilter,cf]);
  const [idx,setIdx]=useState(0);const [input,setInput]=useState('');const [st,setSt]=useState('typing');
  const [sc,setSc]=useState(0);const [sw,setSw]=useState(0);const [res,setRes]=useState(null);const iRef=useRef();const total=pool.length;
  useEffect(()=>{setIdx(0);setInput('');setSt('typing');setSc(0);setSw(0);setRes(null)},[cf]);
  const check=()=>{if(st!=='typing'||!input.trim())return;const kw=pool[idx].a.toLowerCase().split(/\s+/).filter(w=>w.length>=4).map(w=>w.replace(/[.,;:!?()]/g,''));const ui=input.toLowerCase().trim();const ok=kw.filter(w=>ui.includes(w)).length/Math.max(kw.length,1)>.25||ui.length>30;if(ok){setSt('correct');SFX.correct();setSc(s=>s+1)}else{setSt('wrong');SFX.wrong();setSw(s=>s+1)}};
  const next=()=>{if(idx+1>=total){SFX.complete();stats.record(pool[idx].cat,'TypeIt',sc,total,'TypeIt');const mc=cf||pool[0]?.cat;if(mc)stats.updateSubtopicSrs(mc,sc,total);setRes({score:sc,wrong:sw,total})}else{setIdx(idx+1);setInput('');setSt('typing');setTimeout(()=>iRef.current?.focus(),50)}};
  useEffect(()=>{setTimeout(()=>iRef.current?.focus(),100)},[]);
  if(res)return <div className="results-overlay slide-up"><div style={{fontSize:'3rem'}}>✍️</div><div className="score" style={{color:res.score/res.total>.6?'var(--green)':'var(--accent2)'}}>{res.score}/{res.total}</div><SplitProgress correct={res.score} wrong={res.wrong} total={res.total}/><div className="msg">Typing reinforces memory.</div><button className="btn btn-primary" onClick={()=>{setIdx(0);setInput('');setSt('typing');setSc(0);setSw(0);setRes(null)}}>Again</button></div>;
  if(!pool.length)return <div className="fade-in"><SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/><p style={{color:'var(--text3)',textAlign:'center',padding:40}}>No cards.</p></div>;
  const card=pool[idx],cat=CATEGORIES[card.cat];
  return <div className="fade-in"><SubtopicPicker active={cf} setActive={setCf} topicFilter={topicFilter}/><SplitProgress correct={sc} wrong={sw} total={total}/><div className="card" style={{borderLeft:`3px solid ${cat?.color}`}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}><span className="card-tag" style={{background:cat?.color+'22',color:cat?.color}}>{cat?.label}</span><SrsTimer catId={card.cat}/></div><div className="card-title" style={{marginBottom:16}}>{card.q}</div><input ref={iRef} className={`type-input ${st==='correct'?'correct':st==='wrong'?'wrong':''}`} placeholder="Type key points..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){if(st==='typing')check();else next()}}} disabled={st!=='typing'}/>{st==='typing'&&<button className="btn btn-primary" style={{marginTop:12}} onClick={check}>Check ↵</button>}{st!=='typing'&&<div style={{marginTop:12}}><div style={{padding:12,background:st==='correct'?'var(--green-dim)':'var(--red-dim)',borderRadius:'var(--radius)',marginBottom:10}}><div style={{fontSize:'.78rem',fontWeight:600,color:st==='correct'?'var(--green)':'var(--red)',marginBottom:4}}>{st==='correct'?'✓ Good!':'✕ Review:'}</div><div style={{fontSize:'.85rem',color:'var(--text2)',lineHeight:1.5}}>{card.a}</div></div><button className="btn btn-primary" onClick={next}>{idx+1>=total?'Results':'Next →'}</button></div>}</div></div>
}

// ─── MINI RING ───
function MiniRing({value,size=52,stroke=4,color='var(--accent)'}){
  const r=(size-stroke)/2,c=2*Math.PI*r,o=c-(value/100)*c;
  return <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg4)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={o} style={{transition:'stroke-dashoffset .6s ease'}}/></svg>
}
