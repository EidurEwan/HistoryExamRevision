<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IB History SL">
<title>IB History SL — Final Exam Revision</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0f14;--bg2:#13171f;--bg3:#1a1f2b;--bg4:#222838;
  --text:#e8e6e1;--text2:#a09d96;--text3:#6b6860;
  --accent:#c9a84c;--accent2:#e8c96a;--accent-dim:#3d3420;
  --green:#4ade80;--green-dim:#0d2818;--red:#f87171;--red-dim:#2d1216;
  --blue:#60a5fa;--blue-dim:#121d2e;--orange:#fb923c;
  --cold-war:#5b8def;--auth-states:#e06c50;--reconquest:#50b87a;
  --radius:10px;--radius-lg:16px;
  --font-display:'Crimson Pro',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden}
input,button,textarea{font-family:inherit;font-size:inherit}
input{font-size:16px!important}
button{cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::selection{background:var(--accent);color:var(--bg)}

.app-wrap{max-width:900px;margin:0 auto;padding:0 16px 100px}
@media(min-width:640px){.app-wrap{padding:0 24px 40px}}

.header{text-align:center;padding:28px 0 8px;position:relative}
.header h1{font-family:var(--font-display);font-size:1.9rem;font-weight:700;letter-spacing:-0.02em;color:var(--accent2)}
.header p{color:var(--text2);font-size:.82rem;margin-top:4px;letter-spacing:.03em;text-transform:uppercase}

.tab-bar{display:flex;gap:4px;justify-content:center;padding:12px 0 20px;flex-wrap:wrap}
.tab-btn{padding:8px 18px;border-radius:99px;font-size:.82rem;font-weight:600;color:var(--text2);transition:all .2s;position:relative;letter-spacing:.01em}
.tab-btn:hover{color:var(--text);background:var(--bg3)}
.tab-btn.active{color:var(--bg);background:var(--accent);box-shadow:0 2px 12px #c9a84c33}
.tab-btn .dot{position:absolute;top:4px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);display:none;box-shadow:0 0 6px var(--red)}
.tab-btn .dot.show{display:block;animation:pulse 2s infinite}

.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:var(--accent-dim)}
.card-title{font-family:var(--font-display);font-size:1.15rem;font-weight:600;margin-bottom:6px}
.card-sub{color:var(--text2);font-size:.85rem;line-height:1.5}
.card-tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.btn{padding:10px 20px;border-radius:var(--radius);font-weight:600;font-size:.85rem;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:var(--bg);box-shadow:0 2px 8px #c9a84c22}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-ghost{border:1px solid var(--bg4);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent-dim);color:var(--text)}
.btn-correct{background:var(--green);color:#000}
.btn-wrong{background:var(--red);color:#000}
.btn-sm{padding:6px 14px;font-size:.78rem}

.mode-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.mode-btn{padding:7px 16px;border-radius:var(--radius);font-size:.78rem;font-weight:600;color:var(--text3);border:1px solid var(--bg4);transition:all .2s;position:relative}
.mode-btn:hover{color:var(--text2);border-color:var(--text3)}
.mode-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.mode-btn .srs-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 6px var(--orange)}

.cat-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.cat-chip{padding:5px 14px;border-radius:99px;font-size:.75rem;font-weight:600;border:1px solid var(--bg4);color:var(--text3);transition:all .2s}
.cat-chip:hover{color:var(--text2)}
.cat-chip.active{color:#fff;border-color:transparent}

.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.9rem}

.flashcard{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;cursor:pointer;transition:all .3s;position:relative;text-align:center;user-select:none}
.flashcard:hover{border-color:var(--accent-dim);box-shadow:0 4px 20px #0003}
.flashcard .label{position:absolute;top:12px;left:16px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.flashcard .counter{position:absolute;top:12px;right:16px;font-size:.75rem;color:var(--text3);font-family:var(--font-mono)}
.flashcard .question{font-family:var(--font-display);font-size:1.25rem;font-weight:600;line-height:1.4;max-width:600px}
.flashcard .answer{font-size:.95rem;line-height:1.6;color:var(--text2);max-width:600px}
.flashcard .flip-hint{position:absolute;bottom:12px;font-size:.7rem;color:var(--text3);letter-spacing:.03em}
.flashcard .srs-badge{position:absolute;bottom:12px;right:16px;font-size:.65rem;padding:2px 8px;border-radius:99px;font-weight:600;letter-spacing:.03em}

/* Split progress bar */
.split-progress{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:16px;background:var(--bg4);gap:1px}
.split-progress .seg{height:100%;transition:all .3s ease;min-width:0}
.split-progress .seg:first-child{border-radius:3px 0 0 3px}
.split-progress .seg:last-child{border-radius:0 3px 3px 0}

.stat-ring{width:140px;height:140px;position:relative;margin:0 auto 20px}
.stat-ring svg{transform:rotate(-90deg)}
.stat-ring .value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.stat-ring .value .num{font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--accent2)}
.stat-ring .value .label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);padding:16px;text-align:center}
.stat-card .num{font-family:var(--font-display);font-size:1.6rem;font-weight:700}
.stat-card .label{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

.type-input{width:100%;padding:12px 16px;background:var(--bg2);border:2px solid var(--bg4);border-radius:var(--radius);color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
.type-input:focus{border-color:var(--accent)}
.type-input.correct{border-color:var(--green);background:var(--green-dim)}
.type-input.wrong{border-color:var(--red);background:var(--red-dim)}

.expandable{cursor:pointer}
.expandable .chevron{transition:transform .2s;display:inline-block;margin-left:6px;font-size:.7em}
.expandable.open .chevron{transform:rotate(180deg)}

.due-banner{background:linear-gradient(135deg,var(--accent-dim),var(--bg2));border:1px solid var(--accent-dim);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:.85rem;cursor:pointer;transition:border-color .2s}
.due-banner:hover{border-color:var(--accent)}
.due-banner .pulse{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.results-overlay{text-align:center;padding:40px 20px}
.results-overlay .score{font-family:var(--font-display);font-size:3rem;font-weight:700;margin:12px 0}
.results-overlay .msg{color:var(--text2);margin-bottom:24px}

.exam-q{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.exam-q .q-text{font-family:var(--font-display);font-size:1.05rem;line-height:1.5;margin-bottom:10px}
.exam-q textarea{width:100%;min-height:120px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px;color:var(--text);font-size:.9rem;resize:vertical;outline:none}
.exam-q textarea:focus{border-color:var(--accent)}

.timer-display{font-family:var(--font-mono);font-size:2.5rem;font-weight:700;text-align:center;color:var(--accent2);margin:16px 0}

/* Criteria section */
.criteria-section{margin-bottom:20px}
.criteria-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius-lg);padding:20px;margin-bottom:12px}
.criteria-card h3{font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--accent2)}
.criteria-card h4{font-family:var(--font-display);font-size:.95rem;font-weight:600;margin:12px 0 6px;color:var(--text)}
.criteria-card p,.criteria-card li{font-size:.85rem;color:var(--text2);line-height:1.6}
.criteria-card ul{padding-left:18px;margin:4px 0 8px}
.criteria-card li{margin-bottom:3px}
.band-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);margin-bottom:4px;font-size:.82rem}
.band-row .band-label{font-weight:700;min-width:60px;font-family:var(--font-mono);font-size:.78rem}
.band-row .band-desc{color:var(--text2);flex:1}

/* SRS schedule */
.srs-card-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);margin-bottom:6px;font-size:.82rem}
.srs-card-row .srs-q{flex:1;color:var(--text)}
.srs-card-row .srs-meta{color:var(--text3);font-family:var(--font-mono);font-size:.72rem;flex-shrink:0}
.srs-card-row .srs-status{padding:2px 8px;border-radius:99px;font-size:.68rem;font-weight:600;flex-shrink:0}

@media(max-width:639px){
  .header{padding:16px 0 4px}
  .header h1{font-size:1.4rem}
  .tab-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bg4);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:100;justify-content:space-around;flex-wrap:nowrap;gap:2px}
  .tab-btn{padding:6px 10px;font-size:.7rem}
  .app-wrap{padding-bottom:90px}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.slide-up{animation:slideUp .4s ease}

/* Story timeline */
.story-wrap{max-width:720px;margin:0 auto}
.story-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--accent2);margin-bottom:4px}
.story-topic-tag{display:inline-block;padding:3px 12px;border-radius:99px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:20px}
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--bg4)}
.tl-event{position:relative;margin-bottom:24px;animation:fadeIn .4s ease both}
.tl-event:nth-child(1){animation-delay:.05s}.tl-event:nth-child(2){animation-delay:.1s}.tl-event:nth-child(3){animation-delay:.15s}
.tl-event:nth-child(4){animation-delay:.2s}.tl-event:nth-child(5){animation-delay:.25s}.tl-event:nth-child(6){animation-delay:.3s}
.tl-event:nth-child(7){animation-delay:.35s}.tl-event:nth-child(8){animation-delay:.4s}
.tl-dot{position:absolute;left:-26px;top:6px;width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);background:var(--bg)}
.tl-year{font-family:var(--font-mono);font-size:.78rem;font-weight:600;color:var(--accent);margin-bottom:4px;letter-spacing:.02em}
.tl-text{font-size:.9rem;color:var(--text2);line-height:1.75;font-family:var(--font-display);font-weight:400}
.tl-text strong{color:var(--text);font-weight:600}
.story-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useContext,createContext,useMemo,useCallback}=React;

// ─── SOUND EFFECTS ───
const SFX={
  _ctx:null,
  _getCtx(){if(!this._ctx)this._ctx=new(window.AudioContext||window.webkitAudioContext)();return this._ctx},
  _play(freq,dur,type='sine',vol=.12){try{const c=this._getCtx(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.stop(c.currentTime+dur)}catch(e){}},
  flip(){this._play(800,.08);setTimeout(()=>this._play(1200,.06),40)},
  correct(){this._play(523,.1);setTimeout(()=>this._play(659,.1),80);setTimeout(()=>this._play(784,.15),160)},
  wrong(){this._play(300,.15,'square',.08);setTimeout(()=>this._play(220,.2,'square',.06),100)},
  complete(){this._play(523,.12);setTimeout(()=>this._play(659,.12),100);setTimeout(()=>this._play(784,.12),200);setTimeout(()=>this._play(1047,.25),300)},
  tap(){this._play(600,.04,'sine',.06)}
};

// ─── CLOUD SYNC (Google Apps Script) ───
const CloudSync={
  _urlKey:'ib_history_cloud_url',
  _statusKey:'ib_history_cloud_status',
  getUrl(){try{return localStorage.getItem(this._urlKey)||''}catch(e){return''}},
  setUrl(url){try{localStorage.setItem(this._urlKey,url)}catch(e){}},
  getStatus(){try{return JSON.parse(localStorage.getItem(this._statusKey)||'{}')}catch(e){return{}}},
  _setStatus(s){try{localStorage.setItem(this._statusKey,JSON.stringify(s))}catch(e){}},

  async push(data){
    const url=this.getUrl();if(!url)return{ok:false,error:'No sync URL set'};
    try{
      const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',data:data}),redirect:'follow'});
      // Apps Script redirects — if we get a response at all, try to parse
      let result;
      try{result=await resp.json()}catch(e){result={success:resp.ok}}
      if(result.success||resp.ok){this._setStatus({lastPush:Date.now(),ok:true});return{ok:true}}
      return{ok:false,error:'Server returned error'}
    }catch(e){this._setStatus({lastPush:Date.now(),ok:false,error:e.message});return{ok:false,error:e.message}}
  },

  async pull(){
    const url=this.getUrl();if(!url)return{ok:false,error:'No sync URL set'};
    try{
      const resp=await fetch(url+'?action=load',{redirect:'follow'});
      const text=await resp.text();
      if(!text||text==='{}')return{ok:true,data:null,empty:true};
      const data=JSON.parse(text);
      if(data.attempts||data.srs){this._setStatus({lastPull:Date.now(),ok:true});return{ok:true,data}}
      return{ok:true,data:null,empty:true}
    }catch(e){return{ok:false,error:e.message}}
  },

  isConfigured(){return!!this.getUrl()},
};

// ─── DATA ───
const TOPICS={
  coldWar:{label:"Cold War",color:"var(--cold-war)",icon:"❄️"},
  authStates:{label:"Authoritarian States",color:"var(--auth-states)",icon:"⚔️"},
  reconquest:{label:"Reconquest & Conquest",color:"var(--reconquest)",icon:"🌎"}
};

const CATEGORIES={
  cw_origins:{label:"Origins 1945-47",topic:"coldWar",color:"#5b8def"},
  cw_containment:{label:"Containment in Asia",topic:"coldWar",color:"#4c7bd4"},
  cw_crises:{label:"Key Crises",topic:"coldWar",color:"#3d6aba"},
  cw_policy:{label:"US Foreign Policy",topic:"coldWar",color:"#6e9cf5"},
  cw_end:{label:"End of Cold War",topic:"coldWar",color:"#83aef7"},
  au_muss_rise:{label:"Mussolini: Rise",topic:"authStates",color:"#e06c50"},
  au_muss_power:{label:"Mussolini: In Power",topic:"authStates",color:"#d45a3e"},
  au_peron_rise:{label:"Perón: Rise",topic:"authStates",color:"#e8845e"},
  au_peron_power:{label:"Perón: In Power",topic:"authStates",color:"#d4724c"},
  au_castro_rise:{label:"Castro: Rise",topic:"authStates",color:"#f09070"},
  au_castro_power:{label:"Castro: In Power",topic:"authStates",color:"#c4563a"},
  rc_islamic:{label:"Islamic Iberia",topic:"reconquest",color:"#50b87a"},
  rc_reconquest:{label:"The Reconquest",topic:"reconquest",color:"#40a568"},
  rc_expulsions:{label:"Expulsions",topic:"reconquest",color:"#60c88a"},
  rc_mexico:{label:"Conquest of Mexico",topic:"reconquest",color:"#389258"},
  rc_peru:{label:"Conquest of Peru",topic:"reconquest",color:"#70d89a"},
  rc_colonial:{label:"Colonial Systems",topic:"reconquest",color:"#48b070"}
};

// Each card gets a unique ID for SRS tracking
const CARDS=[
  // ═══ COLD WAR: ORIGINS ═══
  {id:"cw1",q:"What was the Iron Curtain speech?",a:"Churchill's 1946 speech warning that a Soviet 'iron curtain' had descended across Europe. Initially poorly received in the USA but signaled the Western stance against Soviet expansion. Stalin compared Churchill to Hitler in response.",cat:"cw_origins"},
  {id:"cw2",q:"What was Kennan's Long Telegram?",a:"George Kennan's 1946 telegram from Moscow warning that the USSR intended to expand worldwide and must be contained. It alarmed Washington and became the foundation of US containment policy.",cat:"cw_origins"},
  {id:"cw3",q:"What was the state of the USSR after WWII?",a:"27 million Soviet citizens and soldiers died. Everything from borders to Moscow lay in ruins. Nearly 70,000 villages destroyed by Nazi Germany. Stalin's 5-year plan was ruined. Living conditions were terrible.",cat:"cw_origins"},
  {id:"cw4",q:"What were Soviet methods to impose rule in Eastern Europe?",a:"Leaders of opposing parties would 'disappear.' Anyone suspected of straying from Soviet communism was arrested, including German POWs. The USSR shifted Poland westward, seized homes, and 12 million Germans were expelled across Europe.",cat:"cw_origins"},
  {id:"cw5",q:"What was the Truman Doctrine (1947)?",a:"US policy to prevent the spread of communism globally. Triggered when Britain could no longer support Greece and Turkey. Congress approved $400 million in aid. Established a clear US commitment to containment and marked the ideological split of the Cold War.",cat:"cw_origins"},
  {id:"cw6",q:"What was the Marshall Plan?",a:"US economic aid program for European recovery (1948). 17 countries participated, requesting $20 billion. Aimed to prevent communism by addressing economic instability. Stalin ordered Eastern bloc countries not to participate and established COMECON as a counter.",cat:"cw_origins"},
  {id:"cw7",q:"How did the Marshall Plan affect Czechoslovakia?",a:"Initially agreed to join the Marshall Plan, but Stalin pressured Czechoslovakia to withdraw. In 1948, communists seized control of the government, cementing Soviet dominance and turning it into a puppet state.",cat:"cw_origins"},
  {id:"cw8",q:"How did Yugoslavia respond to the Marshall Plan?",a:"Tito led Yugoslavia to communism independently of the USSR, maintaining a fragile alliance with Stalin. Due to tensions with Stalin, Yugoslavia accepted US aid (over $150 million). Its independence from Soviet influence was a significant Cold War victory for the US.",cat:"cw_origins"},
  {id:"cw9",q:"What was the role of the CIA in the early Cold War?",a:"The CIA conducted covert operations including funding anti-communist campaigns in Italy's 1948 elections. They supported democratic parties and countered communist influence through financial and strategic interventions across Europe.",cat:"cw_origins"},
  {id:"cw10",q:"What was the impact of the Marshall Plan on France?",a:"Communist-led strikes in 1947 created instability. The US warned no aid would come until the communist threat diminished. After cracking down on communist influence, France received $2.7 billion in Marshall Plan aid.",cat:"cw_origins"},
  {id:"cw11",q:"What was NSC-68?",a:"A 1950 US national security document outlining the strategy to contain the Soviets and communism. It led to the creation of SEATO (the Asian equivalent of NATO), and a significant increase in military budget and pressure.",cat:"cw_containment"},
  {id:"cw12",q:"Why did Truman call Korea 'the Greece of the Far East'?",a:"Just as the US had supported Greece to contain communism in Europe, Korea was seen as equally significant in Asia. Intervention was necessary to defend freedom and democracy against communist expansion in the Far East.",cat:"cw_containment"},
  {id:"cw13",q:"What was the significance of the Korean War?",a:"The first armed conflict between capitalist and communist forces. It globalized the Cold War beyond Europe. One of the first instances of the UN leading a military coalition. Redefined US military-political power and led to massive military spending increases.",cat:"cw_containment"},
  {id:"cw14",q:"How successful was US containment in Korea?",a:"Partially successful — prevented further invasion of South Korea but at extreme cost (millions of casualties). Barely a success due to the resultant birth of a new communist power in China. The Korean peninsula remains divided.",cat:"cw_containment"},
  {id:"cw15",q:"How did Japan fit into US containment strategy?",a:"The US made Japan a capitalist power to counterbalance China. Never at risk of falling to communism as it was occupied by the US after WWII. The 1952 American-Japanese Security Treaty left Japan under US protection, making it the protector of capitalism in Asia.",cat:"cw_containment"},
  {id:"cw16",q:"What was the Formosa Resolution?",a:"After Chinese bombardment of Taiwan in 1953, the US passed this resolution allowing whatever military action necessary to defend Taiwan. Eisenhower threatened nuclear weapons against China if they took over Taiwan, successfully containing communism there.",cat:"cw_containment"},
  {id:"cw17",q:"Why was the Vietnam War a failure for US containment?",a:"The Gulf of Tonkin Resolution (1964) led to Operation Rolling Thunder (30,000 civilian casualties). First uncensored televised war showed atrocities, causing domestic protests. The US lost the war. The Domino Theory came true when Laos and Cambodia fell to communism in 1975.",cat:"cw_containment"},
  {id:"cw18",q:"What caused the Berlin Crisis (1958-61)?",a:"Brain drain: skilled workers moved from East to West Berlin for higher pay. Free travel meant West Berliners bought cheap goods in East Berlin, causing scarcity. FRG was in NATO with tactical nuclear weapons. Khrushchev demanded Western troop withdrawal and Berlin as a 'Free City'.",cat:"cw_crises"},
  {id:"cw19",q:"Why was the Berlin Wall built (August 1961)?",a:"Khrushchev was compelled to act due to the growing economic crisis — over 300,000 people had fled East Berlin. The wall assured the existence of the GDR, and Western powers were forced to recognize it by tolerating its construction.",cat:"cw_crises"},
  {id:"cw20",q:"What was the impact of the Berlin Crisis?",a:"German-American relations suffered, Berlin relied more on France. The Wall highlighted the weakness of the Soviet bloc and was a propaganda loss for communism. Germany was no longer a pressure point in US-Soviet relations.",cat:"cw_crises"},
  {id:"cw21",q:"What were the three main causes of the Cuban Missile Crisis?",a:"1) The Cuban Revolution (1959): Castro's communist regime 90 miles from the US. 2) The Bay of Pigs failure (1961): strengthened Castro, weakened Kennedy's image. 3) Discovery of Soviet missile sites in Cuba by U2 planes (1962), placed in response to US missiles in Turkey.",cat:"cw_crises"},
  {id:"cw22",q:"How was Kennedy viewed after the Cuban Missile Crisis?",a:"Orthodox view: calm and decisive leader who navigated the crisis. Revisionist view: reckless and self-interested, risking nuclear war for political gain.",cat:"cw_crises"},
  {id:"cw23",q:"What were the impacts of the Cuban Missile Crisis?",a:"A hotline between US and USSR established. Limited Test Ban Treaty and Nuclear Non-Proliferation Treaty signed. Arms race escalated but the world became more secure. Khrushchev was humiliated. Chinese-Soviet relations deteriorated further as China saw USSR as no longer revolutionary.",cat:"cw_crises"},
  {id:"cw24",q:"Which crisis was more dangerous — Berlin or Cuba?",a:"The Cuban Missile Crisis was closer to direct military conflict. The USSR placed nuclear missiles in Cuba; the US created a naval blockade ('quarantine'). This brought both superpowers to the brink of nuclear war. The Berlin Crisis was more propaganda-focused.",cat:"cw_crises"},
  {id:"cw25",q:"What was Eisenhower's New Look policy?",a:"Aimed to stop communism from spreading outside existing areas, expecting the USSR would collapse on its own. Increased reliance on nuclear arsenal to show the USSR that direct conflict meant mutually assured destruction. Differed from NSC-68 by avoiding direct military confrontation.",cat:"cw_policy"},
  {id:"cw26",q:"Compare Eisenhower's New Look with Truman's Containment.",a:"Both: assisted forces resisting communism, used military power to protect vulnerable areas. New Look additions: SEATO alliance to encircle USSR, CIA covert operations (Iran, Guatemala), increased nuclear reliance, brinkmanship strategy.",cat:"cw_policy"},
  {id:"cw27",q:"Define Brinkmanship.",a:"Advancing to the stage of war but not engaging in it. Threatening to use nuclear weapons to scare off aggressors and make them back down. Massive threats of retaliation to demonstrate containment resolve.",cat:"cw_policy"},
  {id:"cw28",q:"Define Roll-back.",a:"A proposition by Secretary of State Dulles to liberate communist countries in Europe and push communism out through war. Never actually carried out, though the US aided many counter-Soviet revolutions in European countries.",cat:"cw_policy"},
  {id:"cw29",q:"What was Massive Retaliation?",a:"Eisenhower's countermeasure if Taiwan was taken by China — China would be bombarded with nuclear weapons by the USA. A core element of the New Look policy's reliance on nuclear deterrence.",cat:"cw_policy"},
  {id:"cw30",q:"What was Perestroika?",a:"Meaning 'restructuring' — Gorbachev's policy aimed at reforming and restructuring the Soviet economy. Part of his 'new thinking' that prioritized Soviet citizens' well-being over spreading communism.",cat:"cw_end"},
  {id:"cw31",q:"What was Glasnost?",a:"Meaning 'openness' — the principle that every area of the regime should be open to public scrutiny. Allowed conversation and criticism of the Soviet system, and comparison between communism and capitalism.",cat:"cw_end"},
  {id:"cw32",q:"What was Gorbachev's impact on the Cold War?",a:"Introduced new thinking focused on citizens' well-being. Worked to undo Stalin's legacy through Perestroika and Glasnost. Reduced military spending for a stable economy. Abandoned the Brezhnev Doctrine (Sinatra Doctrine 1988), allowing peaceful collapse of satellite states.",cat:"cw_end"},
  {id:"cw33",q:"What was Reagan's role in ending the Cold War?",a:"Military spending in early 1980s forced Soviets to compete when they couldn't afford it. SDI (Star Wars, 1983) undermined MAD and left USSR vulnerable. Proved a good negotiator who reversed his views on communism's 'evils.' Pressured the USSR even when they couldn't retaliate.",cat:"cw_end"},
  {id:"cw34",q:"What was the INF Treaty (1987)?",a:"The Intermediate-range Nuclear Forces Treaty, signed by Gorbachev. It demonstrated his passive and cooperative approach toward the West, aiming to reduce nuclear weapons and end the arms race through negotiations.",cat:"cw_end"},
  {id:"cw35",q:"What role did the Soviet economy play in ending the Cold War?",a:"Under Brezhnev, ~25% of GDP was spent on military. Gorbachev inherited this drained, declining economy, which forced him to negotiate, reform, and take actions that led to the Cold War's end.",cat:"cw_end"},
  {id:"cw36",q:"What happened in Eastern Europe in 1989?",a:"Satellite states criticized the inefficiency of state-controlled industries. People near Western borders were critical of their living conditions. Gorbachev made clear he wouldn't use the Red Army against demonstrations, giving populations the green light for freedom.",cat:"cw_end"},
  {id:"cw37",q:"What was the impact of the USSR's collapse?",a:"Capitalism seemed to have triumphed. Cuba and African regimes lost Soviet economic aid. International politics became 'uni-polar.' The USA became the only country capable of global military alliance.",cat:"cw_end"},
  {id:"cw38",q:"Compare Gorbachev and Reagan.",a:"Both: saw dangers of nuclear weapons, worked together in summits, prepared to compromise. Contrast: Reagan started hardline then softened; Gorbachev started conciliatory. Gorbachev acted on internal USSR pressures; Reagan was willing to maintain spending. Gorbachev's actions had larger impact — led to USSR collapse.",cat:"cw_end"},

  // ═══ MUSSOLINI ═══
  {id:"mu1",q:"How strong was Italian parliamentary government before WWI?",a:"Weak. The 1848 Statuto gave the king broad powers. Voting rights limited to 2% of the population. Corruption through 'transformism' (leaders switching alliances). Regional differences, low literacy, and elite control led to frequent government changes.",cat:"au_muss_rise"},
  {id:"mu2",q:"What was Italy's economy like before WWI?",a:"Unevenly modernized. The north developed industries (textiles, chemicals, steel), while the South remained poor and agricultural. 6 million people emigrated due to poverty. Per capita income rose modestly but Italy lagged behind other European nations.",cat:"au_muss_rise"},
  {id:"mu3",q:"How did Italy seek great power status (1870-1914)?",a:"Joined the Triple Alliance (1882), gained colonies in Eritrea (1885), Somalia, and Libya (1911). The defeat at Adowa (1896) was humiliating. Italy remained the weakest great power with small, expensive colonies and dependence on stronger allies.",cat:"au_muss_rise"},
  {id:"mu4",q:"What factors contributed to Italian Fascism after WWI?",a:"Economic issues: inflation, 2 million unemployed, high debt. Political instability from proportional representation and weak coalitions. Social conflicts from strikes and factory occupations frightened elites. Nationalism from 'mutilated victory' at Versailles. Mussolini's violent squads won support from veterans and middle class.",cat:"au_muss_rise"},
  {id:"mu5",q:"What was the 'Red Biennium' (1919-1920)?",a:"Period of intense social unrest in Italy with many strikes and factory takeovers as workers demanded better pay. This frightened elites and middle class, who turned to Mussolini's Fascists as bringers of order and stability against socialism.",cat:"au_muss_rise"},
  {id:"mu6",q:"How did Mussolini use propaganda in his rise?",a:"Used his newspaper Il Popolo d'Italia (since 1914) to spread nationalism and anti-communism. Fascist messages used Roman symbols like the fasces. The March on Rome (1922) was staged as a grand show. His media control rallied blackshirts and scared rivals.",cat:"au_muss_rise"},
  {id:"mu7",q:"What was the March on Rome (1922)?",a:"Mussolini's Fascists marched on Rome to seize power. King Victor Emmanuel III did not intervene or declare martial law, fearing civil war. Instead, he appointed Mussolini as Prime Minister. The march was more propaganda show than military threat.",cat:"au_muss_rise"},
  {id:"mu8",q:"What was the Acerbo Law (1923)?",a:"Gave the largest party (with at least 25% votes) two-thirds of parliamentary seats. Mussolini justified it as ensuring stable government. Supported by liberals and Catholics out of fear and hopes of controlling Mussolini within the system.",cat:"au_muss_power"},
  {id:"mu9",q:"What was the Matteotti Crisis (1924)?",a:"Socialist deputy Matteotti was murdered after criticizing Fascist election fraud. Opposition withdrew from parliament but this failed. The King and elites backed Mussolini to avoid chaos. From 1925-26, Mussolini declared a dictatorship, banned opposition, censored press, created secret police.",cat:"au_muss_power"},
  {id:"mu10",q:"What was Corporativism?",a:"A system where state-controlled 'corporations' represented each sector of the economy, including both workers and employers. Aimed to replace class struggle with national unity by forcing collaboration. In practice, it favoured businesses and enforced state dominance.",cat:"au_muss_power"},
  {id:"mu11",q:"What were the Lateran Accords (1929)?",a:"Agreement between Fascists and the Catholic Church. The Church gained: Vatican City as independent state, 750 million lire compensation, Catholicism as official religion. Fascists gained: Church endorsement, control over appointments and youth organizations.",cat:"au_muss_power"},
  {id:"mu12",q:"What was the Corporate State (1926-34)?",a:"Organized the economy into 22 sector corporations with employers, workers, and state representatives under Fascist control. Banned unions and strikes to promote unity. In practice, it favoured businesses and enforced state dominance.",cat:"au_muss_power"},
  {id:"mu13",q:"Evaluate Mussolini's economic policies.",a:"Limited success. Public works, electrification, and grain self-sufficiency helped some sectors. But growth was slow, wages fell, exports suffered, the South lagged. Autarky led to inefficiency and shortages. GDP growth averaged only 1.5% annually. War preparation wasted resources.",cat:"au_muss_power"},
  {id:"mu14",q:"Evaluate Fascism's social and economic impact on Italy.",a:"FOR: modernisation, infrastructure (railways, highways), welfare through Dopolavoro, raised literacy, IRI nationalised key industries, steel production rose 50%. AGAINST: class divisions persisted, South remained poor, women confined to domestic roles, autarky inefficient, GDP growth below pre-war levels.",cat:"au_muss_power"},

  // ═══ PERÓN ═══
  {id:"pe1",q:"What was Argentina like before Perón?",a:"Agricultural export economy (wheat and meat) dependent on European trade. The 'Infamous Decade' (1930s): coup, Great Depression, corrupt autocratic rule. Extreme class divide between wealthy oligarchy (2-3% owning 95% of land) and impoverished workers. European immigrants transformed demographics.",cat:"au_peron_rise"},
  {id:"pe2",q:"What was the GOU?",a:"Group of United Officers — a secret society of young nationalist, anti-communist, ultra-Catholic military officers including Colonel Perón. They aimed to end corruption, restore the constitution, strengthen industry, maintain neutrality in WWII, and prevent communism by improving workers' conditions from above.",cat:"au_peron_rise"},
  {id:"pe3",q:"How did Perón benefit from the Labour Department?",a:"After the 1943 coup, Perón became head of Labour (then Secretary of Labour and Welfare). He gained massive working-class support through social and labour reforms. Unions became dependent on him — workers feared losing gains if he was removed.",cat:"au_peron_rise"},
  {id:"pe4",q:"How was Perón influenced by European fascism?",a:"He admired Fascist Italy's organisational methods and Mussolini's leadership. His observations of post-Civil War Spain's chaos reinforced his belief in strong, directive leadership. He learned practical ways to control and mobilise the masses.",cat:"au_peron_rise"},
  {id:"pe5",q:"What happened on 17 October 1945?",a:"A massive protest/demonstration demanding Perón's release after his detention on 9 October. It showcased his growing working-class support and marked the awakening of workers' political consciousness. Led to his release and eventual rise to the presidency.",cat:"au_peron_rise"},
  {id:"pe6",q:"Was Perón's rise mainly due to economic factors?",a:"FOR: Great Depression and WWII left high unemployment and inflation; pro-labour policies won working-class support. AGAINST: also driven by political/social dynamics — military support, union alliances, charismatic leadership, and populist rhetoric influenced by Mussolini.",cat:"au_peron_rise"},
  {id:"pe7",q:"How did Perón consolidate power?",a:"Dissolved all supporting parties, created single party under his control (Partido Justicialista). Purged Supreme Court, censored press (110 publications closed 1943-46, La Prensa shut 1951), restricted opposition through police disruption. Created 1949 Constitution allowing re-election.",cat:"au_peron_power"},
  {id:"pe8",q:"What was the Eva Perón Foundation (FEP)?",a:"By late 1940s, surpassed most government ministries in size and influence. Assets exceeded $200 million, employed 14,000 people. Distributed vast quantities of goods to the poor. Served as a powerful tool of Peronist political control.",cat:"au_peron_power"},
  {id:"pe9",q:"What were Perón's main economic policies?",a:"Nationalized Central Bank (1946), railways, telecommunications. Import Substitution Industrialization (ISI) with tariffs and subsidies. Price and wage controls. State-led redistribution through subsidies. IAPI monopoly captured grain profits to fund urban industrialization.",cat:"au_peron_power"},
  {id:"pe10",q:"Why did Perón fall in 1955?",a:"Economic decline after 1951 with inflation and shortages. Opposition from Church, armed forces, and political parties alienated by his authoritarianism and cult of Eva. Repressed freedoms and attacked the Church. After the June 1955 bombing, a military coup overthrew him on 16 September.",cat:"au_peron_power"},
  {id:"pe11",q:"How did Perón use propaganda?",a:"State-controlled media, staged rallies, and visual icons portraying himself and Evita as saviours of the working class. New textbooks with Peronist messages. Teachers required to transmit Peronist doctrine. Education and media used for indoctrination.",cat:"au_peron_power"},

  // ═══ CASTRO ═══
  {id:"ca1",q:"Who was José Martí?",a:"Cuban poet, journalist, and revolutionary who founded the Cuban Revolutionary Party and launched the 1895 War of Independence against Spain. His writings and martyrdom inspired Cuba's independence in 1902. National hero whose ideas defined Cuban nationalism.",cat:"au_castro_rise"},
  {id:"ca2",q:"What was Cuba's economy like before 1959?",a:"A sugar-dominated monoculture economy. US companies (United Fruit, Esso, Texaco) controlled key sectors. The Platt Amendment (1901-1934) imposed semi-colonial status. High per capita income but deep rural poverty, seasonal unemployment, and inequality.",cat:"au_castro_rise"},
  {id:"ca3",q:"Who was Batista and how did he rule after 1952?",a:"Military officer who staged a coup in 1952. His regime was characterized by corruption, brutal repression, economic decline (17% unemployment), and ties to American organized crime. Meyer Lansky ran gambling operations. 'The two Batistas' — first term was populist, second was lazy and corrupt.",cat:"au_castro_rise"},
  {id:"ca4",q:"What was the Moncada Assault (1953)?",a:"Failed attack by 140 rebels led by Castro on Cuba's second-largest barracks. Aimed to seize weapons and spark a nationwide uprising. Failed due to loss of surprise and strong army resistance. Nearly all attackers killed or captured. Led to the 26th of July Movement's founding.",cat:"au_castro_rise"},
  {id:"ca5",q:"What was the Granma expedition (1956)?",a:"Castro's return from Mexican exile with ~80 rebels aboard an overloaded yacht. Despite delays, mechanical failures, and a devastating ambush at Alegría de Pío (only 12 survivors), the group regrouped in the Sierra Maestra to form the Rebel Army.",cat:"au_castro_rise"},
  {id:"ca6",q:"How did Batista contribute to the revolution's success?",a:"Brutal repression (mass torture, killings) alienated the population. Corrupt, US-backed regime failed to address poverty and unemployment. Relied on military force rather than political solutions. Lost US backing in 1957 when caught misusing defence weapons. Army morale collapsed in 1958-59.",cat:"au_castro_rise"},
  {id:"ca7",q:"How did Castro consolidate power (1959-62)?",a:"Removed batistianos and liberals. Crushed provincial revolts. Implemented radical reforms (land reform, nationalization). Eliminated rival figures. Moved toward communism. Declared himself Marxist-Leninist (December 1961). Founded PCC to centralize all control under himself.",cat:"au_castro_power"},
  {id:"ca8",q:"What were Castro's main reforms (1959-62)?",a:"Agrarian Reform (state owned 70% of land by 1963). Nationalized foreign businesses, banks. Rents cut 50%, later abolished. Literacy campaign: 170,000 teachers, illiteracy dropped from 23% to 4%. More schools in 3 years than previous 58 years. FMC created for women.",cat:"au_castro_power"},
  {id:"ca9",q:"How did the Bay of Pigs strengthen Castro?",a:"Humiliating US defeat = propaganda triumph. Validated warnings about US imperialism. Rallied population behind revolution. Justified crackdowns on opposition. Accelerated move toward communism and deeper USSR ties.",cat:"au_castro_power"},
  {id:"ca10",q:"What was the Special Period (from 1991)?",a:"Began after USSR collapse — Soviet trade, subsidies, oil, technicians all ended suddenly. Severe food shortages, energy crisis. Response: state farms converted to cooperatives, foreign investment and tourism opened, US dollar legalized (1993), limited self-employment allowed.",cat:"au_castro_power"},
  {id:"ca11",q:"What was Castro's treatment of opposition?",a:"CDR surveillance (1/3 of population enrolled), UMAP forced labour camps (1965-68) for ~25,000 dissidents and homosexuals. Show trials. All media controlled by state. No freedom of association against government. Emigration used as safety valve (Mariel Boatlift 1980: 125,000+ left).",cat:"au_castro_power"},
  {id:"ca12",q:"Why did Castro embrace communism by December 1961?",a:"US hostility (embargo, Bay of Pigs) forced him to seek Soviet protection. Soviet aid required ideological alignment. Liberals removed, PSP (communists) dominated government. Influence of Che Guevara. Marxism-Leninism justified one-party rule.",cat:"au_castro_power"},
  {id:"ca13",q:"To what extent did Castro achieve full authoritarian rule?",a:"FOR: one-party state, CDR surveillance, UMAP camps, media control, cult of personality, state-controlled economy. AGAINST: did not use mass terror like Stalin, emigration as safety valve, genuine popular support through education/healthcare, pragmatic adaptations during Special Period.",cat:"au_castro_power"},

  // ═══ RECONQUEST & CONQUEST ═══
  {id:"rc1",q:"Why was the Muslim conquest of Iberia so easy in 711?",a:"Division among the Goths, caused by struggles over kingship, allowed the Moors to easily cross into the peninsula and defeat Roderic, the last Gothic king.",cat:"rc_islamic"},
  {id:"rc2",q:"What were the Moors' contributions to Iberia?",a:"Introduction of new irrigation and water-lifting devices. New crops: sugar, cotton, silk. Introduction of paper and glass. Advanced architecture, mathematics, medicine, and philosophy that influenced all of Western Europe.",cat:"rc_islamic"},
  {id:"rc3",q:"What was 'La Convivencia'?",a:"The claimed period of cultural and religious harmony between Muslims, Christians, and Jews during Moorish rule. Criticized as an idealized view — David Nirenberg argues violence was a central aspect. Bernard Lewis still sees it as a 'golden age' by the standards of the time.",cat:"rc_islamic"},
  {id:"rc4",q:"How were non-Muslims treated in Islamic Spain?",a:"Better than expected for conquered people: not in separate districts, not slaves, could practice faith (with restrictions), could earn a living. But had to: acknowledge Islamic superiority, pay extra taxes, wear a special badge, not carry weapons or marry Muslim women.",cat:"rc_islamic"},
  {id:"rc5",q:"Why was the Caliphate's breakup significant?",a:"Internal political and religious conflicts led to collapse into numerous taifas (small kingdoms). This allowed Christian kingdoms in the north to survive, grow strong, and eventually launch the Reconquest advance against the Muslims.",cat:"rc_islamic"},
  {id:"rc6",q:"What was the Reconquest?",a:"The Christian kingdoms' centuries-long campaign to reclaim the Iberian Peninsula from Muslim rule. St. James's tomb discovery gave Christians a warrior patron saint. By the end of the 13th century, Muslim territory was reduced to the small Kingdom of Granada.",cat:"rc_reconquest"},
  {id:"rc7",q:"How did the Reconquest shape Castilian culture?",a:"Centuries of struggle made war almost a way of life, creating a large class of warrior-nobles who regarded manual labour with contempt. Mobile property (sheep) was favoured over agriculture due to constant warfare. This mentality was transferred to the New World.",cat:"rc_reconquest"},
  {id:"rc8",q:"What did Ferdinand and Isabella achieve?",a:"Expansion of influence and the conquest of Granada (1492). Criticized for favouring the aristocracy — 2-3% of population owned 95% of land by 1500. Spain's industrial production never reached England's level due to peasant poverty (80% impoverished).",cat:"rc_reconquest"},
  {id:"rc9",q:"What was the Treaty of Granada (1491)?",a:"Agreement between Boabdil and Ferdinand & Isabella that ended the Reconquista. Muslims promised: preservation of mosques, use of their language, ability to follow their own laws and customs. These promises were broken within a decade.",cat:"rc_reconquest"},
  {id:"rc10",q:"When and why was the Spanish Inquisition established?",a:"Established in 1478 by Ferdinand and Isabella. Purpose: ensure religious orthodoxy and consolidate power in newly unified Spain. Targeted conversos — Jews and Muslims who had converted to Christianity but were suspected of secretly practicing their former religions.",cat:"rc_expulsions"},
  {id:"rc11",q:"Who was Cardinal Cisneros?",a:"Isabella's confessor who became a key architect of the religious aftermath of 1492. Organized mass conversions and the burning of over 5,000 priceless Muslim books in Arabic. His actions helped trigger the First Rebellion of the Alpujarras (1499-1500).",cat:"rc_expulsions"},
  {id:"rc12",q:"What happened to the Jews in 1492?",a:"The Edict of Expulsion accused Jews of enticing Christians. Previous measures (like banishing Jews from Andalusia) had failed. The monarchs concluded the only remedy was total removal. Jews had to choose: conversion or exile. Their expulsion crippled Spain's economy.",cat:"rc_expulsions"},
  {id:"rc13",q:"When were the Moriscos expelled?",a:"Philip III issued the expulsion decree on 4 April 1609, carried out from October 1609. The majority settled in the Maghrib/Barbary Coast. Before this, Philip II had renewed restrictions on Arabic, dress, and customs in 1567, triggering the Second Rebellion of the Alpujarras.",cat:"rc_expulsions"},
  {id:"rc14",q:"How did the expulsion of Jews cripple Spain?",a:"Jews were dominant in trade, finance, tax collection, and medicine. Their expulsion at the exact moment Spain gained an empire (1492) created an inherent weakness. The loss of skilled merchants and financiers weakened Spain's ability to manage its empire efficiently.",cat:"rc_expulsions"},
  {id:"rc15",q:"What was 'limpieza de sangre'?",a:"'Purity of blood' — ideology emphasizing a Spain free of non-Christian elements. Conversos who stayed faced Inquisition scrutiny and wealth seizure. Non-Muslims secretly maintained their festivals and rituals, which Old Christians found offensive.",cat:"rc_expulsions"},
  {id:"rc16",q:"Who was Hernán Cortés?",a:"Spanish conquistador who conquered the Aztec Empire. Enrolled at University of Salamanca's law faculty at 14. Had permission from Velázquez to explore and trade but NOT to colonize. Defied Velázquez's authority, then needed to quickly conquer Mexico and secure Charles V's backing.",cat:"rc_mexico"},
  {id:"rc17",q:"What was the Prophecy of Quetzalcoatl?",a:"The prophecy held that the feathered serpent god would return in a specific year to reclaim his rule. 1519, when Cortés arrived, corresponded to that year. Quetzalcoatl was described as fair-skinned and bearded, arriving from the east — a description Cortés exploited.",cat:"rc_mexico"},
  {id:"rc18",q:"Describe Tenochtitlán.",a:"Built on a salt lake, at least 250,000 inhabitants. Wide, straight main streets — half land, half canals. Marketplace comparable to Salamanca with 60,000 daily traders. Numerous temples, 40 towers (some taller than Seville's cathedral). Fresh water from Chapultepec aqueduct.",cat:"rc_mexico"},
  {id:"rc19",q:"Who was Malintzin (La Malinche)?",a:"Indigenous woman given to Cortés in 1519. Fluent in Nahuatl and Mayan, she became Cortés's interpreter and advisor. Her translation ability was crucial — it allowed Cortés to communicate with Aztec emissaries and allies like the Tlaxcalans.",cat:"rc_mexico"},
  {id:"rc20",q:"Why did the Tlaxcalans ally with Cortés?",a:"The Aztecs maintained perpetual 'flower wars' with the Tlaxcalans as a source of human sacrifices. This situation was so hateful that when Cortés arrived, the Tlaxcalans became his most loyal native allies, providing crucial military support.",cat:"rc_mexico"},
  {id:"rc21",q:"How did Moctezuma die?",a:"Disputed. Cortés claims the Mexicans killed Moctezuma with arrows, stones, and a sword while he was on a roof speaking to his people. Bernal Díaz and other soldiers say he died from a stone thrown by the Mexicans. Both versions agree he died during conflict.",cat:"rc_mexico"},
  {id:"rc22",q:"What was 'The Broken Spears'?",a:"A unique historical source providing the indigenous (Aztec) perspective of the Conquest. Unlike most sources from the conquerors' side, it presents the most dramatic moments from the perspective of the conquered, using codices and indigenous manuscripts.",cat:"rc_mexico"},
  {id:"rc23",q:"Who was Francisco Pizarro?",a:"Ambitious, illiterate soldier of fortune who led the conquest of the Inca Empire. From Extremadura, Spain (poverty drove men to seek wealth abroad). His unequal distribution of rewards strained his partnership with Diego de Almagro.",cat:"rc_peru"},
  {id:"rc24",q:"How did Peru's internal situation favour the Spanish?",a:"The Inca Empire was weakened by civil war between brothers Atahualpa and Huáscar. This divided loyalties, depleted resources, and left the empire fragmented. Smallpox had also ravaged the population before Pizarro's arrival.",cat:"rc_peru"},
  {id:"rc25",q:"What happened at Cajamarca (1532)?",a:"Pizarro ambushed and captured Inca Emperor Atahualpa. Fray Valverde demanded acceptance of Christianity; Atahualpa rejected it by discarding the Bible. The Spanish attacked with cannons, cavalry, and steel, slaughtering thousands. Atahualpa was taken hostage, ransomed with gold, then executed.",cat:"rc_peru"},
  {id:"rc26",q:"What were the 'Post-Conquest Troubles' in Peru?",a:"Manco (puppet ruler) rebelled in 1536. Feud between Pizarro and Almagro factions — Almagro strangled 1538, Pizarro assassinated 1541. Gonzalo Pizarro revolted against the New Laws, killed the Viceroy 1546. Defeated by Gasca 1548. Shows conquistadors were driven by personal gain, not loyalty.",cat:"rc_peru"},
  {id:"rc27",q:"How did 'a handful of Spaniards win two Empires'?",a:"1) Superior military technology (steel, guns, horses). 2) Indigenous alliances (Tlaxcalans, rival Inca factions). 3) Disease — smallpox devastated populations. 4) Internal divisions and centralized rule (capturing the leader paralyzed the empire). 5) Religious/cultural misunderstandings exploited.",cat:"rc_peru"},
  {id:"rc28",q:"What was the Encomienda system?",a:"Spanish settlers (encomenderos) were granted authority over indigenous people, requiring labour, tribute, or goods in exchange for supposed protection and Christian instruction. Not slavery in the legal sense but often exploitative in practice.",cat:"rc_colonial"},
  {id:"rc29",q:"Who was Bartolomé de Las Casas?",a:"Former encomendero who repented and became a friar. 'Protector of the Indians.' Advocated for indigenous rights and peaceful conversion. His 'Short Account of the Destruction of the Indies' (1542) described colonial atrocities. Influenced the New Laws of 1542-43.",cat:"rc_colonial"},
  {id:"rc30",q:"What were the New Laws (1542-43)?",a:"Enacted under Charles V, influenced by Las Casas. Encomiendas couldn't be inherited. Indigenous enslavement banned. Labour burdens reduced. Sparked fierce opposition — Gonzalo Pizarro led rebellion in Peru (1544-48), forcing the Crown to weaken enforcement.",cat:"rc_colonial"},
  {id:"rc31",q:"What was the Valladolid Debate (1550-51)?",a:"Las Casas vs Sepúlveda over morality of conquest. Sepúlveda: indigenous peoples were 'natural slaves,' justifying forced conversion. Las Casas: they were rational humans with inherent rights. Sepúlveda backed by colonial elites; Las Casas by Dominican/Franciscan missionaries and the Crown.",cat:"rc_colonial"},
  {id:"rc32",q:"What was the Mita system?",a:"Colonial labour system in the Andes requiring indigenous communities to provide workers for mines, plantations, or public projects. Intended as rotational labour but frequently led to exploitation, forced displacement, and significant hardship.",cat:"rc_colonial"},
  {id:"rc33",q:"What was the Black Legend?",a:"A narrative portraying Spain as uniquely cruel. Fueled by Las Casas's writings, translated and spread by Spain's rivals (England, Netherlands). Used vivid accounts of atrocities (exaggerated) to depict Spaniards as barbaric, boosting anti-Spanish propaganda.",cat:"rc_colonial"},
  {id:"rc34",q:"How is the Conquest connected to the Reconquest?",a:"The Reconquista's narrow focus on domination and exclusion became the template. The Moors bred a warrior culture with contempt for labour. Cortés compared indigenous architecture to Granada. Poverty-stricken Extremadurans sought wealth abroad. The trinity of motives: God, Gold, and Glory.",cat:"rc_colonial"},
  {id:"rc35",q:"What was the Church's role in the colonies?",a:"Initially, elite friars driven by missionary zeal arrived. Some (Vasco de Quiroga, Las Casas) envisioned utopian communities. But reformist attitudes clashed with exploitative encomenderos. The patronato gave Spanish kings absolute authority over clergy. Church power rivalled royalty under Habsburgs.",cat:"rc_colonial"},

  // ═══ ADDITIONAL COLD WAR CARDS ═══
  {id:"cw39",q:"What was the impact of the Marshall Plan on Italy?",a:"The Christian Democrats, led by De Gasperi, faced off against the communist-led left in the 1948 elections. A massive US campaign — including letters from Italian-Americans and covert CIA operations — supported anti-communist candidates. The Christian Democrats won decisively, keeping Italy in the Western bloc.",cat:"cw_origins"},
  {id:"cw40",q:"What were Soviet negotiation tactics?",a:"The Soviets used stubborn tactics to obtain as much information as possible, creating exhaustion and frustration. Then Stalin would come in and resolve the situation with a friendly smile, appearing reasonable by comparison.",cat:"cw_origins"},
  {id:"cw41",q:"What happened in Iran during the early Cold War?",a:"During WWII, Soviet and British troops occupied Iran to protect oil supplies. After the war, Stalin refused to leave when occupation was due to end. This created international pressure, and Stalin eventually withdrew, but Truman suspected Stalin was aiming for world domination.",cat:"cw_origins"},
  {id:"cw42",q:"What were the different views on Germany's future?",a:"Soviet Perspective: wanted to keep Germany weak to prevent it becoming a threat again. US Perspective: believed a strong Germany was essential for Western Europe's recovery and stability. This fundamental disagreement shaped the division of Germany.",cat:"cw_origins"},
  {id:"cw43",q:"What was COMECON?",a:"The Council for Mutual Economic Assistance, established by the Soviets as a counter to the Marshall Plan. It promoted economic integration and cooperation among communist countries, providing economic support to Eastern bloc states under Soviet control.",cat:"cw_origins"},
  {id:"cw44",q:"What did Charles 'Chip' Bohlen claim about the Korean War?",a:"He claimed 'It was the Korean War and not World War Two that made us a world military-political power.' While debatable (the US was already a superpower after the atomic bomb), the Korean War did massively increase US military funding and global military presence.",cat:"cw_containment"},
  {id:"cw45",q:"How did the Vietnam War relieve pressure elsewhere in Asia?",a:"Although the US failed to contain communism in Vietnam, the war relieved Chinese pressure from Malaysia, Thailand, and Singapore, allowing those countries to remain non-communist. This is often overlooked when evaluating the war's strategic impact.",cat:"cw_containment"},
  {id:"cw46",q:"What was the American-Japanese Security Treaty (1952)?",a:"Left Japan under the protection of the USA after the occupation ended. This solidified Japan as an opposing power to China and effectively made Japan the protector of capitalism in Asia, without Japan needing its own large military.",cat:"cw_containment"},
  {id:"cw47",q:"What was the Domino Theory?",a:"The theory that if one country fell to communism, neighbouring countries would follow like dominoes. Used to justify US intervention in Vietnam. It came true when Laos and Cambodia fell to communism in 1975 after the US withdrew from Vietnam.",cat:"cw_containment"},
  {id:"cw48",q:"What was Kennedy's image before the Cuban Missile Crisis?",a:"He was seen as unpredictable but appeared weak against communism after the Bay of Pigs failure. Khrushchev saw this weakness as an opportunity to increase Soviet pressure, contributing to the decision to place missiles in Cuba.",cat:"cw_crises"},
  {id:"cw49",q:"How did the Cuban Missile Crisis affect China-USSR relations?",a:"Chinese relations with the USSR continued to deteriorate. China saw the USSR's unwillingness to challenge the USA as proof that they were no longer a revolutionary state. This deepened the Sino-Soviet split.",cat:"cw_crises"},
  {id:"cw50",q:"What was the Geneva Conference and Paris Conference about?",a:"Conferences during the Berlin Crisis attempting to resolve the German question. There were no conclusive outcomes in either conference, showing the deadlock between East and West over Berlin's future.",cat:"cw_crises"},
  {id:"cw51",q:"What was SDI (Strategic Defence Initiative)?",a:"Reagan's 1983 'Star Wars' program to develop space-based missile defence. It undermined the concept of MAD (Mutually Assured Destruction) and left the USSR vulnerable. The Soviets could not afford to compete, forcing them to the negotiating table.",cat:"cw_end"},
  {id:"cw52",q:"What was the Sinatra Doctrine (1988)?",a:"Gorbachev's abandonment of the Brezhnev Doctrine — named after Frank Sinatra's 'My Way.' Eastern European countries could now choose their own political path. Gorbachev would not use force against protesting satellite states, enabling the peaceful collapse of the Soviet empire.",cat:"cw_end"},
  {id:"cw53",q:"What were the key summits between Reagan and Gorbachev?",a:"Between 1985-1988, multiple summits were held. Both men made mistakes but were determined to reach a conclusion. They came to peaceful resolutions, including the INF Treaty (1987). Both were prepared to reverse their previous positions to make compromises.",cat:"cw_end"},
  {id:"cw54",q:"What criticism did satellite states have of the Soviet system?",a:"They criticized the inefficiency in terms of quality and quantity of state-controlled industries. People on borders to the Western and capitalist worlds were particularly critical of their own living conditions compared to what they could see across the border.",cat:"cw_end"},

  // ═══ ADDITIONAL MUSSOLINI CARDS ═══
  {id:"mu15",q:"How did Mussolini strengthen power through coercion (1922-26)?",a:"Used Fascist squads for violence against opponents — attacks, murders, destruction of socialist offices. He balanced legal parliamentary work to gain elite support with illegal force to keep radical Fascists loyal, avoiding loss of key allies.",cat:"au_muss_rise"},
  {id:"mu16",q:"What did Professor Christopher Duggan say about Fascism?",a:"Duggan stated the regime focused on Mussolini personally, not a clear ideology. It mixed force, propaganda, and opportunism, lacking a true totalitarian structure despite its claims. Fascism was more personality-cult than systematic ideology.",cat:"au_muss_power"},
  {id:"mu17",q:"What was the Fascist Grand Council?",a:"Created in 1923 as the top body of the Fascist Party. It advised on policy and appointments, aiming to merge party and state. In practice, it mainly rubber-stamped Mussolini's decisions rather than exercising independent power.",cat:"au_muss_power"},
  {id:"mu18",q:"What was the 'Battle for Grain'?",a:"Mussolini's campaign for grain self-sufficiency. Propaganda boasted success, but it actually led to higher costs and neglect of other crops. A key example of how Fascist propaganda exaggerated achievements while hiding economic failures.",cat:"au_muss_power"},
  {id:"mu19",q:"What was the IRI (Institute for Industrial Reconstruction)?",a:"Nationalized key industries after the 1930s depression, stabilising banking and fostering growth in heavy industry. Steel production rose by 50%. One of the more successful Fascist economic policies, though it contradicted free-market ideology.",cat:"au_muss_power"},
  {id:"mu20",q:"What was the Dopolavoro?",a:"A Fascist leisure organization for workers that expanded welfare and provided social activities. It was one of the few genuinely popular Fascist institutions, offering recreation and cultural events to ordinary Italians.",cat:"au_muss_power"},
  {id:"mu21",q:"How did Mussolini use 'battles' in propaganda?",a:"He called his economic policies 'battles' (Battle for Grain, Battle for Births, Battle for the Lira) to inspire national unity and heroism, framing economic efforts as urgent struggles. This boosted propaganda and portrayed him as a strong wartime leader.",cat:"au_muss_power"},
  {id:"mu22",q:"What was the 'Battle for Births'?",a:"Campaign to boost Italy's population through tax breaks for large families and penalties for bachelors. Part of Mussolini's vision of a militarily powerful Italy. Results were limited — birth rates did not increase significantly.",cat:"au_muss_power"},
  {id:"mu23",q:"How did Italy seek great power status through colonialism?",a:"Italy gained Eritrea (1885), Somalia, and Libya (1911). The defeat at Adowa in 1896 against Ethiopia was deeply humiliating. Italy made agreements with France (1900, 1902) for minor North African expansion but remained the weakest great power.",cat:"au_muss_rise"},

  // ═══ ADDITIONAL PERÓN CARDS ═══
  {id:"pe12",q:"What was the 'Infamous Decade' in Argentina?",a:"Beginning with a 1930 coup during the Great Depression, Argentina experienced corrupt autocratic rule with sharp declines in commodity prices and strained imports. People lost faith in the political system. Industrial development began to reduce import dependency.",cat:"au_peron_rise"},
  {id:"pe13",q:"What was the Argentine oligarchy like before Perón?",a:"An educated, progressive elite tied to Social Darwinism, Positivism, and British capital. Between 1872-1895, cultivated agricultural land expanded 15-fold. Buenos Aires became the 'Paris of South America.' But 2-3% of the population owned 95% of the land by 1500.",cat:"au_peron_rise"},
  {id:"pe14",q:"What were conditions like for Argentina's lower class before Perón?",a:"European immigrants lived in crowded conventillos near Plaza de Mayo — cheap tenements housing up to 350 people in cramped, poorly ventilated rooms. They worked long hours as dockworkers and artisans, sharing small rooms to afford low rents.",cat:"au_peron_rise"},
  {id:"pe15",q:"What was Perón's 1949 Constitution?",a:"Allowed presidential re-election, nationalized public services and energy sources, enabled state intervention in trade, and emphasized social rights and state-protected family institutions. It centralized power further under Perón.",cat:"au_peron_power"},
  {id:"pe16",q:"How did Perón control the press?",a:"Forced 110 publications to close (1943-46), conducted fake inspections, disrupted paper supplies. In 1951, shut down the prestigious La Prensa, used official radio to counter its editorials, and reopened the paper under pro-Perón direction. Established Secretariat of Information.",cat:"au_peron_power"},
  {id:"pe17",q:"What were Perón's social policies?",a:"Expanded labour rights (paid vacations, severance pay). Created universal pensions, health insurance, accident compensation. Raised minimum wages with annual bonuses. Built low-cost homes through the Eva Perón Foundation. Established free hospitals and clinics for the working class.",cat:"au_peron_power"},
  {id:"pe18",q:"How decisive was Perón's 1946 election victory?",a:"His coalition won all national senators except two, a two-thirds majority in the Chamber of Deputies, and governorships with legislative majorities in every province but Corrientes. Despite this mandate, he still lacked full armed forces endorsement.",cat:"au_peron_power"},
  {id:"pe19",q:"How did Perón use education for indoctrination?",a:"A committee mandated new textbooks conveying Peronist messages through nationalist rhetoric, with no criticism allowed. The ministry required aligned teacher's guides. Teachers were required to transmit Peronist doctrine to students.",cat:"au_peron_power"},
  {id:"pe20",q:"What was La razón de mi vida?",a:"Written by Eva Perón and published in 1951. An autobiographical manifesto glorifying her rise from poverty, justifying Peronism as social justice, and defining women's role as loyal supporters of Perón within the home. Required reading in schools.",cat:"au_peron_power"},

  // ═══ ADDITIONAL CASTRO CARDS ═══
  {id:"ca14",q:"What was the role of women in the Cuban Revolution?",a:"Women like Vilma Espín, Haydée Santamaría, and Celia Sánchez played major roles in urban coordination, arms smuggling, propaganda, and founding women's units like the Mariana Grajales Brigade. The movement promised gender equality and social justice.",cat:"au_castro_rise"},
  {id:"ca15",q:"What was Radio Rebelde?",a:"The rebel radio station operated during the guerrilla war from the Sierra Maestra. After the revolution, radio and TV made the revolution a constant presence in homes, becoming a key propaganda tool for Castro's regime.",cat:"au_castro_power"},
  {id:"ca16",q:"What was the Padilla Affair (1971)?",a:"Poet Heberto Padilla was arrested and tortured, then forced to make a public confession for writing critical poetry. This led to the 'grey years' where artists were afraid to create anything potentially counter-revolutionary. International intellectuals condemned Cuba.",cat:"au_castro_power"},
  {id:"ca17",q:"What were UMAP camps?",a:"Units to Aid Military Production (1965-68): forced labour camps for ~25,000 people including dissidents, homosexuals, religious objectors, and youth imitating US culture. One of the most repressive aspects of Castro's regime.",cat:"au_castro_power"},
  {id:"ca18",q:"What was Cuba's literacy campaign (1961)?",a:"170,000 teachers (brigadistas) were trained and deployed to rural areas. Illiteracy dropped from ~23% to 4%. More schools were built in 1959-62 than in the previous 58 years. Education served both literacy AND revolutionary indoctrination.",cat:"au_castro_power"},
  {id:"ca19",q:"What was Che Guevara's vision for Cuba?",a:"He believed labour should be a social duty based on revolutionary consciousness, not material need. The goal was to create a 'new man' who works for the collective good. In practice, moral incentives led to absenteeism and low productivity — the approach largely failed.",cat:"au_castro_power"},
  {id:"ca20",q:"What was the Mariel Boatlift (1980)?",a:"Over 125,000 Cubans left via the port of Mariel. Castro released prisoners and mentally ill people onto the boats, calling all emigrants 'scum.' Used emigration as a safety valve to release social pressure rather than resorting to mass violence.",cat:"au_castro_power"},
  {id:"ca21",q:"What was Castro's 'Words to the Intellectuals' speech?",a:"Castro declared: 'Within the Revolution, everything; against the Revolution, nothing.' Artists must serve the revolution; art must deliver clear messages to the masses. This established the framework for ongoing censorship of Cuban arts and culture.",cat:"au_castro_power"},
  {id:"ca22",q:"How were Afro-Cubans treated under Castro?",a:"The revolution claimed to eradicate racial discrimination. Living standards for the poor improved. However, critics argue deeper inequality persisted — very few non-whites held positions of power within the PCC or government.",cat:"au_castro_power"},
  {id:"ca23",q:"What was the Platt Amendment?",a:"A 1901 US law granting the right to intervene in Cuba's internal affairs, finances, and foreign relations, while securing the Guantánamo naval base. It imposed semi-colonial status on Cuba and fueled anti-American nationalism until its repeal in 1934.",cat:"au_castro_rise"},
  {id:"ca24",q:"How did the mob rule Havana before the revolution?",a:"From the 1940s-1950s, American organized crime (especially Meyer Lansky) ran Havana's casinos and nightclubs under Batista's protection. Cuba became a 'Latin Las Vegas.' This corruption and foreign exploitation fueled revolutionary sentiment.",cat:"au_castro_rise"},

  // ═══ ADDITIONAL RECONQUEST & CONQUEST CARDS ═══
  {id:"rc36",q:"What was the Ottoman Empire's impact on European exploration?",a:"The Ottoman capture of Constantinople gave them control over key trade routes between Europe and Asia. Ottoman taxes and restrictions forced countries like Spain to seek alternative routes, directly leading to Columbus's 1492 voyage.",cat:"rc_reconquest"},
  {id:"rc37",q:"What happened during the Second Rebellion of the Alpujarras?",a:"In 1567, Philip II banned Arabic, Islamic religion, dress, and customs. This triggered rebellion. Don John razed Galera — salt was sprinkled over the town and 2,500 people were slaughtered, including 400 women and children.",cat:"rc_expulsions"},
  {id:"rc38",q:"Who was Bernal Díaz del Castillo?",a:"A Spanish conquistador who wrote a firsthand account of the conquest of Mexico. His narrative is raw, detailed, and filled with sensory descriptions. Unlike Cortés's formal letters, Díaz wrote from a common soldier's perspective with more honesty about events.",cat:"rc_mexico"},
  {id:"rc39",q:"What were Aztec codices?",a:"Manuscripts created by the Aztecs, Mayas, and early colonial indigenous people. Most were burned by Spanish conquistadors and churchmen. More than 40 manuscripts are known to exist today, making indigenous perspectives of the conquest extremely rare.",cat:"rc_mexico"},
  {id:"rc40",q:"What omens foretold the Spanish arrival to the Aztecs?",a:"A pillar of fire in the sky, the Temple of Huitzilopochtli struck by lightning, Lake Texcoco boiling, a woman's voice wailing. These were interpreted as signs of impending catastrophe and that their protective deities were abandoning them.",cat:"rc_mexico"},
  {id:"rc41",q:"What was the Night of Sorrows (Noche Triste)?",a:"In 1520, after the Spanish massacred Aztec nobles during a festival, a revolt drove Cortés out of Tenochtitlán via the Tacuba Causeway. Many Spaniards died. Cortés returned in 1521 with Tlaxcalan allies and laid siege until the city fell on August 13, 1521.",cat:"rc_mexico"},
  {id:"rc42",q:"What was the role of disease in the conquest?",a:"Smallpox devastated indigenous populations before and during the conquests. In Peru, it ravaged the Inca before Pizarro arrived, killing Emperor Huayna Capac and triggering the civil war between Atahualpa and Huáscar that the Spanish exploited.",cat:"rc_peru"},
  {id:"rc43",q:"What were the characteristics of the Inca civilization?",a:"The largest pre-Columbian American empire (Tawantinsuyu). Over 25,000 miles of roads. No writing — used quipus for records. No money — relied on a labour tax. Mastered high-altitude farming with terraces. The Sapa Inca was a divine ruler descended from the sun god Inti.",cat:"rc_peru"},
  {id:"rc44",q:"How did Fray Valverde justify the attack at Cajamarca?",a:"He delivered a religious ultimatum demanding Atahualpa accept Christianity and submit to Spanish rule, presenting a Bible. When Atahualpa rejected it by discarding the Bible, Valverde signaled Pizarro to attack — providing a 'legal' and moral pretext for violence.",cat:"rc_peru"},
  {id:"rc45",q:"What was Louise M. Burkhart's observation about Aztec Christianity?",a:"She said the Aztecs 'were able to become just Christians enough to get by in the colonial setting without compromising their basic ideological and moral orientation.' The Day of the Dead — merging Aztec death rituals with All Saints' Day — exemplifies this syncretism.",cat:"rc_colonial"},
  {id:"rc46",q:"What is Latin American Liberation Theology?",a:"A 20th-century theological movement emphasizing social justice and advocating for the poor by interpreting Christianity through liberation from injustice. Las Casas is seen as a historical precursor — theologians like Gutiérrez cite him as an early defender of the oppressed.",cat:"rc_colonial"},
  {id:"rc47",q:"What did Carlos Fuentes mean by 'America was not discovered, it was invented'?",a:"The Spanish didn't merely uncover a static land — they actively shaped it through imagination, violence, and imposition. They dismantled empires (Aztecs, Incas) and rebuilt them as colonial domains like New Spain and Peru, creating something entirely new.",cat:"rc_colonial"},
  {id:"rc48",q:"How did the Crown treat the conquistadors long-term?",a:"Initially rewarded with encomiendas and governorships. But the Crown then curbed their autonomy through the Council of the Indies (1524) and viceroys. Many rank-and-file conquistadors received little. The Crown feared conquistadors becoming rival powers.",cat:"rc_colonial"}
];

    {year:"1950",text:"The Cold War had been a European affair — until Korea. When North Korean forces crossed the 38th parallel and invaded the South, Truman faced a choice that would redefine American power. He created NSC-68, a national security document that massively increased the military budget and led to SEATO, the Asian equivalent of NATO. As Truman himself put it, 'Korea is the Greece of the Far East.' Just as Greece had to be saved in Europe, Korea had to be saved in Asia."},
    {year:"1950–53",text:"The Korean War became the first armed conflict between capitalist and communist forces, and one of the first instances of the United Nations leading a military coalition. It globalized the Cold War beyond Europe. The cost was staggering — millions of casualties on all sides. As Charles 'Chip' Bohlen later claimed, 'It was the Korean War and not World War Two that made us a world military-political power.' The result was ambiguous: South Korea was saved, but the peninsula remained divided, and a new communist power — China — had emerged on the world stage."},

    {year:"1953–54",text:"After the Chinese bombardment of Taiwan, the US passed the Formosa Resolution, authorizing any military action necessary to defend the island. Eisenhower went further, threatening nuclear weapons against China. It worked — Taiwan remained non-communist. The containment strategy of making the cost of expansion unbearable was proving effective where it could be backed by overwhelming force."},
    {year:"1964–73",text:"Vietnam would prove that containment had limits. The Gulf of Tonkin Resolution in 1964 gave the president virtually unlimited military authority. Operation Rolling Thunder unleashed devastating bombing campaigns — 30,000 civilian casualties. But Vietnam was the first uncensored televised war, and the images that reached American living rooms sparked massive domestic protests. The US was fighting not just the Viet Cong but its own public opinion."},
