    const a=document.createElement('a');a.href=url;
    const d=new Date();
    a.download=`ib-history-save-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  const handleCopyExport=()=>{
    navigator.clipboard.writeText(stats.exportData()).then(()=>alert('Save data copied to clipboard!')).catch(()=>{
      const ta=document.createElement('textarea');ta.value=stats.exportData();document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Save data copied!')
    });
  };

  const handleImportText=()=>{
    if(!importText.trim())return;
    const result=stats.importData(importText);
    setImportResult(result);
    if(result.success)setTimeout(()=>location.reload(),1500);
  };

  const handleImportFile=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const result=stats.importData(ev.target.result);
      setImportResult(result);
      if(result.success)setTimeout(()=>location.reload(),1500);
    };
    reader.readAsText(file);
  };

  const handleSaveUrl=()=>{
    const trimmed=syncUrl.trim();
    CloudSync.setUrl(trimmed);
    if(trimmed){setSyncStatus({ok:true,msg:'URL saved! Testing connection...'});setSyncing(true);
      stats.pullFromCloud().then(r=>{setSyncStatus(r);setSyncing(false);if(r.replaced)setTimeout(()=>location.reload(),1200)})}
    else setSyncStatus({ok:true,msg:'Cloud sync disabled.'});
  };

  const handlePush=async()=>{setSyncing(true);const r=await stats.pushToCloud();setSyncStatus(r.ok?{ok:true,msg:'Pushed to cloud!'}:{ok:false,error:r.error});setSyncing(false)};
  const handlePull=async()=>{setSyncing(true);const r=await stats.pullFromCloud();setSyncStatus(r);setSyncing(false);if(r.replaced)setTimeout(()=>location.reload(),1200)};

  const lastPush=CloudSync.getStatus().lastPush;
  const timeSince=lastPush?Math.round((Date.now()-lastPush)/60000):null;

  return(<div style={{marginTop:20}}>
    {/* ═══ CLOUD SYNC ═══ */}
    <h3 style={{fontFamily:'var(--font-display)',fontSize:'1.1rem',margin:'16px 0 12px'}}>☁️ Cloud Sync (Google Drive)</h3>
    <div className="card" style={{background:CloudSync.isConfigured()?'linear-gradient(135deg,#121d2e,var(--bg2))':'var(--bg2)'}}>
      {CloudSync.isConfigured()&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:syncing?'var(--orange)':'var(--green)',animation:syncing?'pulse 1s infinite':'none'}}/>
        <span style={{fontSize:'.82rem',color:syncing?'var(--orange)':'var(--green)',fontWeight:600}}>{syncing?'Syncing...':'Connected'}</span>
        {timeSince!==null&&<span style={{fontSize:'.72rem',color:'var(--text3)',marginLeft:'auto'}}>Last push: {timeSince<1?'just now':timeSince<60?`${timeSince}m ago`:`${Math.round(timeSince/60)}h ago`}</span>}
      </div>}

      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:10}}>
        <input style={{flex:1,padding:'8px 12px',background:'var(--bg3)',border:'1px solid var(--bg4)',borderRadius:'var(--radius)',color:'var(--text)',fontSize:'.82rem',outline:'none',fontFamily:'var(--font-mono)'}}
          placeholder="Paste your Apps Script URL here..." value={syncUrl} onChange={e=>setSyncUrl(e.target.value)}/>
        <button className="btn btn-primary btn-sm" onClick={handleSaveUrl} style={{flexShrink:0}}>{CloudSync.isConfigured()?'Update':'Connect'}</button>
      </div>

      {CloudSync.isConfigured()&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
        <button className="btn btn-ghost btn-sm" onClick={handlePush} disabled={syncing}>⬆ Push to Cloud</button>
        <button className="btn btn-ghost btn-sm" onClick={handlePull} disabled={syncing}>⬇ Pull from Cloud</button>
      </div>}

      {syncStatus&&<div style={{padding:8,borderRadius:'var(--radius)',background:syncStatus.ok?'var(--green-dim)':'var(--red-dim)',fontSize:'.8rem',marginBottom:8}}>
        <span style={{color:syncStatus.ok?'var(--green)':'var(--red)'}}>{syncStatus.ok?'✓ ':'✕ '}{syncStatus.msg||syncStatus.error}</span>
      </div>}

      <button style={{fontSize:'.75rem',color:'var(--text3)',textDecoration:'underline',background:'none',border:'none',cursor:'pointer',padding:0}} onClick={()=>setShowSetup(!showSetup)}>
        {showSetup?'Hide setup instructions':'How to set up cloud sync (2 minutes)'}
      </button>

      {showSetup&&<div style={{marginTop:12,padding:14,background:'var(--bg3)',borderRadius:'var(--radius)',fontSize:'.82rem',color:'var(--text2)',lineHeight:1.7}}>
        <div style={{fontWeight:700,color:'var(--accent2)',marginBottom:8}}>One-time setup:</div>
        <div style={{marginBottom:6}}><strong style={{color:'var(--text)'}}>Step 1:</strong> Go to <a href="https://script.google.com" target="_blank" rel="noopener" style={{color:'var(--blue)'}}>script.google.com</a> and click <strong>New project</strong></div>
        <div style={{marginBottom:6}}><strong style={{color:'var(--text)'}}>Step 2:</strong> Delete the default code and paste this entire script:</div>
        <div style={{background:'var(--bg)',padding:10,borderRadius:6,fontFamily:'var(--font-mono)',fontSize:'.72rem',marginBottom:8,overflowX:'auto',whiteSpace:'pre',lineHeight:1.5,border:'1px solid var(--bg4)'}}>
{`function doGet(e) {
  if (e && e.parameter && e.parameter.action === 'load') {
    var files = DriveApp.getFilesByName('ib-history-sl-save.json');
    if (files.hasNext()) {
      var content = files.next().getBlob().getDataAsString();
      return ContentService.createTextOutput(content)
        .setMimeType(ContentService.MimeType.JSON);
    }
    return ContentService.createTextOutput('{}')
      .setMimeType(ContentService.MimeType.JSON);
  }
  return ContentService.createTextOutput('{"status":"ok"}')
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var body = JSON.parse(e.postData.contents);
    var data = JSON.stringify(body.data);
    var files = DriveApp.getFilesByName('ib-history-sl-save.json');
    if (files.hasNext()) {
      files.next().setContent(data);
    } else {
      DriveApp.createFile('ib-history-sl-save.json', data,
        'application/json');
    }
    return ContentService.createTextOutput(
      JSON.stringify({success: true}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(
      JSON.stringify({success: false, error: err.toString()}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`}
        </div>
        <div style={{marginBottom:6}}><strong style={{color:'var(--text)'}}>Step 3:</strong> Click <strong>Deploy → New deployment</strong></div>
        <div style={{marginBottom:6}}><strong style={{color:'var(--text)'}}>Step 4:</strong> Type: <strong>Web app</strong>. Execute as: <strong>Me</strong>. Who has access: <strong>Anyone</strong></div>
        <div style={{marginBottom:6}}><strong style={{color:'var(--text)'}}>Step 5:</strong> Click <strong>Deploy</strong>, authorize with your Google account when prompted</div>
        <div style={{marginBottom:8}}><strong style={{color:'var(--text)'}}>Step 6:</strong> Copy the <strong>Web app URL</strong> and paste it above</div>
        <div style={{padding:8,background:'var(--accent-dim)',borderRadius:6,fontSize:'.78rem'}}>
          <strong style={{color:'var(--accent2)'}}>That's it!</strong> Your progress will now auto-sync to a JSON file in your Google Drive. Open this tool on any device, paste the same URL, and pull your data.
        </div>
      </div>}
    </div>

    {/* ═══ LOCAL IMPORT/EXPORT ═══ */}
    <h3 style={{fontFamily:'var(--font-display)',fontSize:'1.1rem',margin:'20px 0 12px'}}>💾 Local Save Data</h3>

    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
      <button className="btn btn-primary btn-sm" onClick={handleExport}>📥 Export as File</button>
      <button className="btn btn-ghost btn-sm" onClick={handleCopyExport}>📋 Copy to Clipboard</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setShowImport(!showImport)}>📤 {showImport?'Hide':'Show'} Import</button>
    </div>

    {showImport&&<div className="card" style={{background:'var(--bg3)'}}>
      <div style={{fontSize:'.85rem',color:'var(--text2)',marginBottom:12}}>Import from a file or paste JSON below. This will <strong style={{color:'var(--red)'}}>replace</strong> all current progress.</div>

      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>fileInputRef.current?.click()}>📁 Choose File</button>
        <input ref={fileInputRef} type="file" accept=".json" style={{display:'none'}} onChange={handleImportFile}/>
      </div>

      <div style={{fontSize:'.78rem',color:'var(--text3)',marginBottom:6}}>Or paste JSON:</div>
      <textarea style={{width:'100%',minHeight:100,background:'var(--bg2)',border:'1px solid var(--bg4)',borderRadius:'var(--radius)',padding:10,color:'var(--text)',fontFamily:'var(--font-mono)',fontSize:'.78rem',resize:'vertical',outline:'none'}}
        placeholder='{"attempts":[...],"srs":{...},...}' value={importText} onChange={e=>setImportText(e.target.value)}/>
      <button className="btn btn-primary btn-sm" style={{marginTop:8}} onClick={handleImportText} disabled={!importText.trim()}>Import Data</button>

      {importResult&&<div style={{marginTop:10,padding:10,borderRadius:'var(--radius)',background:importResult.success?'var(--green-dim)':'var(--red-dim)',fontSize:'.82rem'}}>
        {importResult.success
          ?<span style={{color:'var(--green)'}}>✓ Imported! {importResult.cards} SRS cards, {importResult.attempts} practice rounds. Reloading...</span>
          :<span style={{color:'var(--red)'}}>✕ Import failed: {importResult.error}</span>}
      </div>}
    </div>}
  </div>)
}

// ─── EXAM CRITERIA ───
function ExamCriteria(){
  return(<div className="criteria-section fade-in">
    <div className="criteria-card">
      <h3>📄 Paper 1 — Source-based Paper</h3>
      <p><strong>Duration:</strong> 1 hour &nbsp;|&nbsp; <strong>Weighting:</strong> 30% of final grade &nbsp;|&nbsp; <strong>Max marks:</strong> 24</p>
      <h4>Structure</h4>
      <p>Based on a prescribed subject with 4–5 written sources (primary and secondary). You answer 4 compulsory questions of increasing difficulty.</p>
      <ul>
        <li><strong>Q1 (3 marks):</strong> Comprehension — identify information from one source</li>
        <li><strong>Q2 (4 marks):</strong> Comprehension — identify information from two sources</li>
        <li><strong>Q3 (6 marks):</strong> Cross-referencing — compare and contrast two sources (values and limitations using origin, purpose, content)</li>
        <li><strong>Q4 (9 marks):</strong> Mini-essay — evaluate sources AND use own knowledge. "Using the sources and your own knowledge, assess/evaluate/discuss…"</li>
      </ul>
      <h4>Key Skills</h4>
      <ul>
        <li>OPCVL (Origin, Purpose, Content, Value, Limitation) for source analysis</li>
        <li>Cross-reference sources with each other and your own knowledge</li>
        <li>For Q4: integrate source evidence with detailed own knowledge, reach a supported conclusion</li>
        <li>Time management: spend roughly 5 min on Q1, 5 min on Q2, 15 min on Q3, 25 min on Q4</li>
      </ul>
    </div>

    <div className="criteria-card">
      <h3>📝 Paper 2 — Essay Paper</h3>
      <p><strong>Duration:</strong> 1 hour 30 minutes &nbsp;|&nbsp; <strong>Weighting:</strong> 45% of final grade &nbsp;|&nbsp; <strong>Max marks:</strong> 30 (15 per essay)</p>
      <h4>Structure</h4>
      <p>Choose <strong>2 essay questions</strong> from different topics. Each essay is marked out of 15. For SL: Topics 1–5 from the syllabus. You must answer from TWO different topics.</p>
      <h4>Marking Bands (per essay, /15)</h4>
      <div>
        {[
          {band:"13–15",color:"var(--green)",desc:"Clearly focused, well-structured analytical response. Detailed, relevant, accurate knowledge. Different perspectives evaluated. Arguments supported by evidence throughout."},
          {band:"10–12",color:"#86efac",desc:"Mostly focused and analytical. Relevant, detailed knowledge used to support arguments. Some evaluation of different perspectives. Clear structure with mostly supported arguments."},
          {band:"7–9",color:"var(--accent2)",desc:"Some relevant knowledge but limited analysis. May be partly descriptive/narrative. Arguments only partially developed. Some attempt at structure."},
          {band:"4–6",color:"var(--orange)",desc:"Limited knowledge and understanding. Mostly descriptive or generalised. Little awareness of the question demands. Weak structure."},
          {band:"1–3",color:"var(--red)",desc:"Very little relevant knowledge. No analysis. Does not address the question meaningfully."},
          {band:"0",color:"var(--text3)",desc:"Does not reach a standard described by the descriptors, or is not relevant."}
        ].map((b,i)=><div key={i} className="band-row" style={{background:b.color+'11'}}>
          <span className="band-label" style={{color:b.color}}>{b.band}</span>
          <span className="band-desc">{b.desc}</span>
        </div>)}
      </div>
    </div>

    <div className="criteria-card">
      <h3>✍️ Essay Writing Tips</h3>
      <h4>Structure every essay:</h4>
      <ul>
        <li><strong>Introduction:</strong> Define key terms, outline your argument, state your thesis (the extent to which you agree/disagree)</li>
        <li><strong>Body paragraphs (3–4):</strong> One clear argument per paragraph. Use PEE/PEEL: Point → Evidence → Explanation → Link back to question</li>
        <li><strong>Balance:</strong> Use 3+1 (three for, one against) or 2+2 structure for "to what extent" questions</li>
        <li><strong>Conclusion:</strong> Weigh arguments, give a clear, supported judgement. Never introduce new evidence</li>
      </ul>
      <h4>Command terms to watch:</h4>
      <ul>
        <li><strong>"To what extent"</strong> — demands a balanced argument with a clear judgement</li>
        <li><strong>"Discuss"</strong> — consider different perspectives and reach a conclusion</li>
        <li><strong>"Evaluate"</strong> — make an appraisal, weighing strengths and limitations</li>
        <li><strong>"Compare and contrast"</strong> — identify similarities AND differences</li>
      </ul>
      <h4>Transition words for high-band essays:</h4>
      <p style={{lineHeight:1.8}}>
        <span style={{background:'var(--green-dim)',color:'var(--green)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>Furthermore</span>
        <span style={{background:'var(--green-dim)',color:'var(--green)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>Moreover</span>
        <span style={{background:'var(--red-dim)',color:'var(--red)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>However</span>
        <span style={{background:'var(--red-dim)',color:'var(--red)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>On the other hand</span>
        <span style={{background:'var(--red-dim)',color:'var(--red)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>Conversely</span>
        <span style={{background:'var(--blue-dim)',color:'var(--blue)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>In contrast</span>
        <span style={{background:'var(--blue-dim)',color:'var(--blue)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>Consequently</span>
        <span style={{background:'var(--accent-dim)',color:'var(--accent2)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>To a large extent</span>
        <span style={{background:'var(--accent-dim)',color:'var(--accent2)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>Ultimately</span>
        <span style={{background:'var(--accent-dim)',color:'var(--accent2)',padding:'2px 8px',borderRadius:4,margin:'2px',display:'inline-block',fontSize:'.8rem'}}>It can be argued that</span>
      </p>
    </div>

    <div className="criteria-card">
      <h3>🕐 Internal Assessment (IA)</h3>
      <p><strong>Weighting:</strong> 25% of final grade &nbsp;|&nbsp; <strong>Word limit:</strong> 2,200 words</p>
      <p>A historical investigation on a topic of your choice. Marked on: identification and evaluation of sources (6), investigation (15), reflection (4). Total: 25 marks.</p>
    </div>
  </div>)
}

// ─── EXAM TAB ───
function ExamTab(){
  const [topicFilter,setTopicFilter]=useState(null);
  const [mode,setMode]=useState('criteria');
  const [timerActive,setTimerActive]=useState(false);
  const [timeLeft,setTimeLeft]=useState(45*60);
  const [answers,setAnswers]=useState({});
  const timerRef=useRef();

  const filteredQs=EXAM_QUESTIONS.filter(q=>!topicFilter||q.topic===topicFilter);

  useEffect(()=>{
    if(timerActive&&timeLeft>0){timerRef.current=setInterval(()=>setTimeLeft(t=>t-1),1000);return()=>clearInterval(timerRef.current)}
    if(timeLeft<=0)clearInterval(timerRef.current);
  },[timerActive,timeLeft]);

  const formatTime=s=>{const m=Math.floor(s/60);const sec=s%60;return`${m}:${sec<10?'0':''}${sec}`};

  return(<div className="fade-in">
    <div className="mode-bar">
      <button className={`mode-btn ${mode==='criteria'?'active':''}`} onClick={()=>setMode('criteria')}>Exam Criteria</button>
      <button className={`mode-btn ${mode==='questions'?'active':''}`} onClick={()=>setMode('questions')}>Essay Questions</button>
      <button className={`mode-btn ${mode==='timed'?'active':''}`} onClick={()=>setMode('timed')}>Timed Practice</button>
    </div>

    {mode==='criteria'&&<ExamCriteria/>}

    {mode==='timed'&&<div style={{textAlign:'center',marginBottom:20}}>
      <div className="timer-display" style={{color:timeLeft<60?'var(--red)':timeLeft<300?'var(--orange)':'var(--accent2)'}}>{formatTime(timeLeft)}</div>
      <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
        {[{l:'Paper 1 (1h)',v:60},{l:'Paper 2 (1h30)',v:90},{l:'45 min',v:45},{l:'25 min',v:25}].map(p=>
          <button key={p.v} className="btn btn-ghost btn-sm" onClick={()=>{setTimeLeft(p.v*60);setTimerActive(false)}}>{p.l}</button>)}
      </div>
      <button className="btn btn-primary" style={{marginTop:12}} onClick={()=>setTimerActive(!timerActive)}>{timerActive?'⏸ Pause':'▶ Start'}</button>
    </div>}

    {(mode==='questions'||mode==='timed')&&<>
      <TopicFilter active={topicFilter} setActive={setTopicFilter}/>
      {filteredQs.map((q,i)=>{
        const topic=TOPICS[q.topic];
        return(<div key={i} className="exam-q">
          <span className="card-tag" style={{background:topic?.color+'22',color:topic?.color,marginBottom:10,display:'inline-block'}}>{topic?.label}</span>
          <div className="q-text">{q.q}</div>
          <details style={{marginBottom:10}}>
            <summary style={{fontSize:'.8rem',color:'var(--accent)',cursor:'pointer',marginBottom:6}}>💡 Planning hints</summary>
            <div style={{fontSize:'.82rem',color:'var(--text2)',lineHeight:1.5,padding:'8px 0'}}>{q.hints}</div>
          </details>
          <textarea placeholder="Write your essay plan or response here..." value={answers[i]||''} onChange={e=>setAnswers(p=>({...p,[i]:e.target.value}))}/>
        </div>)
      })}
    </>}
  </div>)
}


// ─── CONTENT TAB ───
function ContentTab({topic}){
  const stats=useStats();const [mode,setMode]=useState('browse');const [srsReview,setSrsReview]=useState(false);
  const topicCards=topic?CARDS.filter(c=>CATEGORIES[c.cat]?.topic===topic):CARDS;
  const dueCats=stats.getDueCats().filter(k=>!topic||CATEGORIES[k]?.topic===topic);
  const dueCards=dueCats.flatMap(cat=>CARDS.filter(c=>c.cat===cat));

  if(srsReview&&dueCards.length>0)return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
      <h3 style={{fontFamily:'var(--font-display)',fontSize:'1.1rem',color:'var(--orange)'}}>🔁 SRS Review — {dueCats.length} subtopic{dueCats.length>1?'s':''}</h3>
      <button className="btn btn-ghost btn-sm" onClick={()=>setSrsReview(false)}>← Back</button>
    </div>
    <RecallMode items={topicCards} topicFilter={topic} modeName="SRS Review" forcedCards={dueCards} key={'srs-'+dueCards.length}/>
  </div>;

  return <div>
    <DueBanner topicFilter={topic} onStart={()=>setSrsReview(true)}/>
    <div className="mode-bar">
      {['story','browse','recall','mastery','typeIt'].map(m=><button key={m} className={`mode-btn ${mode===m?'active':''}`} onClick={()=>{setMode(m);setSrsReview(false)}}>
        {m==='typeIt'?'Type It':m==='story'?'📖 Story':m.charAt(0).toUpperCase()+m.slice(1)}
      </button>)}
    </div>
    {mode==='story'&&<StoryMode topicFilter={topic}/>}
    {mode==='browse'&&<BrowseMode items={topicCards} topicFilter={topic}/>}
    {mode==='recall'&&<RecallMode items={topicCards} topicFilter={topic} key={topic+'r'}/>}
    {mode==='mastery'&&<MasteryMode items={topicCards} topicFilter={topic} key={topic+'m'}/>}
    {mode==='typeIt'&&<TypeItMode items={topicCards} topicFilter={topic} key={topic+'t'}/>}
  </div>
}

// ─── APP ───
function App(){
  const [tab,setTab]=useState('all');const [isMobile,setIsMobile]=useState(window.innerWidth<640);
  const [stats]=useState(()=>createStatsStore());
  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<640);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);
  const tabs=[{id:'all',label:'All Topics',icon:'📚'},{id:'coldWar',label:isMobile?'Cold War':'Cold War',icon:'❄️'},{id:'authStates',label:isMobile?'Auth.':'Authoritarian States',icon:'⚔️'},{id:'reconquest',label:isMobile?'Reconquest':'Reconquest & Conquest',icon:'🌎'},{id:'exam',label:'Exam',icon:'📝'},{id:'stats',label:'Stats',icon:'📊'}];
  const dueCats=stats.getDueCats();
  const hasDue=t=>t?dueCats.some(k=>CATEGORIES[k]?.topic===t):dueCats.length>0;

  return <MobileContext.Provider value={isMobile}><StatsContext.Provider value={stats}>
    {!isMobile&&<div className="header"><h1>IB History SL</h1><p>Final Exam Revision Tool</p></div>}
    <div className="tab-bar">{tabs.map(t=><button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>{setTab(t.id);SFX.tap()}}>
      {isMobile?t.icon:<>{t.icon} {t.label}</>}
      <span className={`dot ${(t.id==='all'&&hasDue(null))||(t.id==='coldWar'&&hasDue('coldWar'))||(t.id==='authStates'&&hasDue('authStates'))||(t.id==='reconquest'&&hasDue('reconquest'))?'show':''}`}/>
    </button>)}</div>
    <div className="app-wrap">
      {tab==='all'&&<ContentTab topic={null}/>}
      {tab==='coldWar'&&<ContentTab topic="coldWar" key="cw"/>}
      {tab==='authStates'&&<ContentTab topic="authStates" key="as"/>}
      {tab==='reconquest'&&<ContentTab topic="reconquest" key="rc"/>}
      {tab==='exam'&&<ExamTab/>}
      {tab==='stats'&&<StatsTab/>}
    </div>
  </StatsContext.Provider></MobileContext.Provider>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
